        _it: Pro rata al prezzo
        _nl: Pro rata naar prijs
    quantities_hint/bag:
      _en: The total quantity will be calculated automatically according to the number of bags and the quantity of each size.
      _fr: La quantité totale sera calculée automatiquement selon le nombre de sacs et la quantité de chaque taille.
      _de: Die Gesamtmenge wird automatisch berechnet, basierend auf der Anzahl der Taschen und der Menge jeder Grösse.
      _it: La quantità totale sarà calcolata automaticamente in base al numero di borse e alla quantità di ciascuna dimensione.
      _nl: De totale hoeveelheid wordt automatisch berekend op basis van het aantal tassen en de hoeveelheid van elke grootte.
    quantities_hint/basket:
      _en: The total quantity will be calculated automatically according to the number of baskets and the quantity of each size.
      _fr: La quantité totale sera calculée automatiquement selon le nombre de paniers et la quantité de chaque taille.
