      _it: Valore indicativo, non salvato. Distribuito tra le dimensioni delle borse tramite i cursori. La quantità finale dipende dalle consegne effettive.
      _nl: Hulpwaarde, wordt niet opgeslagen. Verdeeld over de tasgroottes via de schuifregelaars. De uiteindelijke hoeveelheid hangt af van de werkelijke leveringen.
