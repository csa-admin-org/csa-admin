    percentages_hint:
      _en: The system optimizes the distribution to minimize surplus, so the final distribution may differ from the above percentages.
      _fr: Le système optimise la répartition afin de minimiser le surplus, à cause de cela la distribution finale peut différer des pourcentages ci-dessus.
      _de: Das System optimiert die Verteilung, um den Überschuss zu minimieren, daher kann die endgültige Verteilung von den oben genannten Prozentsätzen abweichen.
      _it: Il sistema ottimizza la distribuzione per minimizzare il surplus, quindi la distribuzione finale può differire dai percentuali sopra.
      _nl: Het systeem optimaliseert de verdeling om overschotten te minimaliseren, daardoor kan de uiteindelijke verdeling afwijken van de bovenstaande percentages.
