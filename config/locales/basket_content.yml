      _it: La quantità totale sarà calcolata automaticamente in base al numero di ceste e alla quantità di ciascuna dimensione.
      _nl: De totale hoeveelheid wordt automatisch berekend op basis van het aantal manden en de hoeveelheid van elke grootte.
