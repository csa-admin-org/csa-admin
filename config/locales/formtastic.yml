            _en: Week number based on the year at the end of the fiscal year.
            _fr: Numéro de semaine basé sur l'année de la fin de l'année fiscale.
            _de: Wochennummer basierend auf dem Jahr am Ende des Geschäftsjahres.
            _it: Numero di settimana basato sull'anno alla fine dell'anno fiscale.
            _nl: Weeknummer gebaseerd op het jaar aan het einde van het boekjaar.
          standard:
            _en: Week number of the last delivery.
