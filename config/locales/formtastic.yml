            _de: Wochennummer der letzten Lieferung.
            _it: Numero di settimana dell'ultima consegna.
            _nl: Weeknummer van de laatste levering.
        price:
          _en: All price changes are only valid for new memberships and are not applied retroactively.
          _fr: Tout changement de prix est uniquement valable pour les nouveaux abonnements et n'est pas rétroactivement appliqué.
          _de: Alle Preisänderungen gelten nur für neue Abonnements und werden nicht rückwirkend angewendet.
          _it: Tutte le modifiche al prezzo sono valide solo per i nuovi abbonamenti e non sono applicate retroattivamente.
          _nl: Alle prijswijzigingen zijn alleen geldig voor nieuwe lidmaatschappen en worden niet met terugwerkende kracht toegepast.
        price_zero/bag:
          _en: A price of 0.00 means "complements only"; the bag quantity will be automatically set to 0.
          _fr: Un prix à 0.00 signifie "compléments uniquement"; la quantité de sac sera automatiquement mise à 0.
          _de: Ein Preis von 0.00 bedeutet "nur Zusätze"; die Korbmenge wird automatisch auf 0 gesetzt.
          _it: Un prezzo di 0.00 significa "solo aggiunte"; la quantità della borsa sarà automaticamente impostata a 0.
          _nl: Een prijs van 0.00 betekent "alleen aanvullingen"; de tasaantal wordt automatisch op 0 gezet.
        price_zero/basket:
          _en: A price of 0.00 means "complements only"; the basket quantity will be automatically set to 0.
          _fr: Un prix à 0.00 signifie "compléments uniquement"; la quantité de panier sera automatiquement mise à 0.
          _de: Ein Preis von 0.00 bedeutet "nur Zusätze"; die Korbmenge wird automatisch auf 0 gesetzt.
          _it: Un prezzo di 0.00 significa "solo aggiunte"; la quantità della cesta sarà automaticamente impostata a 0.
          _nl: Een prijs van 0.00 betekent "alleen aanvullingen"; de mandaantal wordt automatisch op 0 gezet.
        price_zero/cone:
          _en: A price of 0.00 means "complements only"; the cone quantity will be automatically set to 0.
          _fr: Un prix à 0.00 signifie "compléments uniquement"; la quantité de cornet sera automatiquement mise à 0.
          _de: Ein Preis von 0.00 bedeutet "nur Zusätze"; die Korbmenge wird automatisch auf 0 gesetzt.
          _it: Un prezzo di 0.00 significa "solo aggiunte"; la quantità del cono sarà automaticamente impostata a 0.
          _nl: Een prijs van 0.00 betekent "alleen aanvullingen"; de zakaantal wordt automatisch op 0 gezet.
        price_zero/package:
          _en: A price of 0.00 means "complements only"; the package quantity will be automatically set to 0.
          _fr: Un prix à 0.00 signifie "compléments uniquement"; la quantité de colis sera automatiquement mise à 0.
          _de: Ein Preis von 0.00 bedeutet "nur Zusätze"; die Korbmenge wird automatisch auf 0 gesetzt.
          _it: Un prezzo di 0.00 significa "solo aggiunte"; la quantità del pacco sarà automaticamente impostata a 0.
          _nl: Een prijs van 0.00 betekent "alleen aanvullingen"; de pakketaantal wordt automatisch op 0 gezet.
        price_zero/share:
