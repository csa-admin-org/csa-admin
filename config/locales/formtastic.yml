          _fr: Conserve l'ajustement de prix appliqué aux paniers. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Körbe bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato ai cesti. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op manden. Deze aanpassing verschijnt als een aparte regel op de factuur.
        baskets_annual_price_change/cone:
          _en: Keeps any price adjustment applied to cones. This adjustment appears as a separate line on the invoice.
          _fr: Conserve l'ajustement de prix appliqué aux cornets. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Tüten bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato ai coni. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op zakken. Deze aanpassing verschijnt als een aparte regel op de factuur.
        baskets_annual_price_change/package:
          _en: Keeps any price adjustment applied to packages. This adjustment appears as a separate line on the invoice.
          _fr: Conserve l'ajustement de prix appliqué aux colis. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Pakete bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato ai pacchi. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op pakketten. Deze aanpassing verschijnt als een aparte regel op de factuur.
        baskets_annual_price_change/share:
          _en: Keeps any price adjustment applied to shares. This adjustment appears as a separate line on the invoice.
          _fr: Conserve l'ajustement de prix appliqué aux parts. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Anteile bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato alle parti. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op delen. Deze aanpassing verschijnt als een aparte regel op de factuur.
      memberships_basket_complement:
        delivery_cycle:
          _en: If a delivery cycle is selected, only the intersections of the deliveries of the membership, the supplement, and the cycle will be considered.
          _fr: Si un cycle de livraisons est sélectionné, seule l'intersection des livraisons de l'abonnement, du complément et de ce cycle seront considérées.
          _de: Wenn ein Lieferzyklus ausgewählt ist, werden nur die Überschneidungen der Lieferungen des Abonnements, des Zusatzes und des Lieferzyklus berücksichtigt.
          _it: Se si seleziona un ciclo di consegna, verrà considerato solo l'incrocio delle consegne dell'abbonamento, della ricarica e di questo ciclo.
          _nl: Als een leveringscyclus is geselecteerd, worden alleen de kruisingen van de leveringen van het lidmaatschap, de aanvulling en de cyclus in overweging genomen.
      newsletter:
        from_html:
          _en: Leave blank to use the default address, must end with <i>@%{domain}</i>.
          _fr: Laisser vide pour utiliser l'adresse par défaut, doit finir par <i>@%{domain}</i>.
          _de: Leer lassen, um die Standardadresse zu verwenden, muss mit <i>@%{domain}</i> enden.
          _it: Lasciare vuoto per utilizzare l'indirizzo predefinito, deve terminare con <i>@%{domain}</i>.
          _nl: Laat leeg om het standaardadres te gebruiken, moet eindigen met <i>@%{domain}</i>.
        scheduled_at:
          _en: Leave blank for sending it manually. If set, the newsletter will be sent automatically during the night of the specified date.
          _fr: Laisser vide pour l'envoyer manuellement. Si défini, la newsletter sera envoyée automatiquement pendant la nuit du jour spécifié.
          _de: Lassen Sie es leer, um es manuell zu senden. Wenn es festgelegt ist, wird die Newsletter automatisch während der Nacht des angegebenen Datums gesendet.
          _it: Lasciare vuoto per inviarlo manualmente. Se impostato, la newsletter verrà inviata automaticamente durante la notte del giorno specificato.
          _nl: Laat leeg om deze handmatig te verzenden. Indien ingesteld, wordt de nieuwsbrief automatisch verzonden tijdens de nacht van de opgegeven datum.
      newsletter/segment:
        basket_complement_ids/bag:
