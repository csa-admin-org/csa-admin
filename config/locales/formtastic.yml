          _en: Percentage of the maximum price of the share size that a member can pledge to pay. 0% = normal price (no extra possible), 100% = twice the normal price, 200% = three times the normal price
          _fr: Pourcentage du prix maximum de la taille de la part que le membre peut s'engager de payer. 0% = prix normal (aucun supplément possible), 100% = deux fois le prix normal, 200% = trois fois le prix normal
          _de: Prozentwert des maximalen Beitrags pro Anteilsgrösse, den ein Mitglied zusagen kann. 0% = Richtwert (kein Mehrbeitrag möglich), 100% = doppelter Richtwert, 200% = dreifacher Richtwert
          _it: Percentuale del prezzo massimo della dimensione del carrello che un socio può promettere di pagare. 0% = prezzo normale (nessun aggiuntivo possibile), 100% = due volte il prezzo normale, 200% = tre volte il prezzo normale
          _nl: Percentage van de maximumprijs van de deelgrootte die een lid kan beloven te betalen. 0% = normale prijs (geen extra mogelijk), 100% = twee keer de normale prijs, 200% = drie keer de normale prijs
        bidding_round_basket_size_price_min_percentage/bag:
          _en: Percentage of the minimum price of the bag size that a member can pledge to pay. 0% = free, 100% = normal price (no discount possible)
          _fr: Pourcentage du prix minimum de la taille du sac que le membre peut s'engager à payer. 0% = gratuit, 100% = prix normal (pas de remise possible)
          _de: Prozentwert des Mindestbeitrags pro Taschengrösse, den ein Mitglied zusagen kann. 0% = kostenlos, 100% = Richtwert (keine Ermässigung möglich)
          _it: Percentuale del prezzo minimo della dimensione del carrello che un socio può promettere di pagare. 0% = gratuito, 100% = prezzo normale (nessuno sconto possibile)
          _nl: Percentage van de minimumprijs van de tasgrootte die een lid kan beloven te betalen. 0% = gratis, 100% = normale prijs (geen korting mogelijk)
        bidding_round_basket_size_price_min_percentage/basket:
          _en: Percentage of the minimum price of the basket size that a member can pledge to pay. 0% = free, 100% = normal price (no discount possible)
          _fr: Pourcentage du prix minimum de la taille du panier que le membre peut s'engager à payer. 0% = gratuit, 100% = prix normal (pas de remise possible)
          _de: Prozentwert des Mindestbeitrags pro Korbgrösse, den ein Mitglied zusagen kann. 0% = kostenlos, 100% = Richtwert (keine Ermässigung möglich)
          _it: Percentuale del prezzo minimo della dimensione del carrello che un socio può promettere di pagare. 0% = gratuito, 100% = prezzo normale (nessuno sconto possibile)
          _nl: Percentage van de minimumprijs van de mandgrootte die een lid kan beloven te betalen. 0% = gratis, 100% = normale prijs (geen korting mogelijk)
        bidding_round_basket_size_price_min_percentage/cone:
          _en: Percentage of the minimum price of the cone size that a member can pledge to pay. 0% = free, 100% = normal price (no discount possible)
          _fr: Pourcentage du prix minimum de la taille du cornet que le membre peut s'engager à payer. 0% = gratuit, 100% = prix normal (pas de remise possible)
          _de: Prozentwert des Mindestbeitrags pro Tütengrösse, den ein Mitglied zusagen kann. 0% = kostenlos, 100% = Richtwert (keine Ermässigung möglich)
          _it: Percentuale del prezzo minimo della dimensione del carrello che un socio può promettere di pagare. 0% = gratuito, 100% = prezzo normale (nessuno sconto possibile)
          _nl: Percentage van de minimumprijs van de zakgrootte die een lid kan beloven te betalen. 0% = gratis, 100% = normale prijs (geen korting mogelijk)
        bidding_round_basket_size_price_min_percentage/package:
          _en: Percentage of the minimum price of the package size that a member can pledge to pay. 0% = free, 100% = normal price (no discount possible)
          _fr: Pourcentage du prix minimum de la taille du colis que le membre peut s'engager à payer. 0% = gratuit, 100% = prix normal (pas de remise possible)
          _de: Prozentwert des Mindestbeitrags pro Paketgrösse, den ein Mitglied zusagen kann. 0% = kostenlos, 100% = Richtwert (keine Ermässigung möglich)
          _it: Percentuale del prezzo minimo della dimensione del carrello che un socio può promettere di pagare. 0% = gratuito, 100% = prezzo normale (nessuno sconto possibile)
          _nl: Percentage van de minimumprijs van de pakketgrootte die een lid kan beloven te betalen. 0% = gratis, 100% = normale prijs (geen korting mogelijk)
        bidding_round_basket_size_price_min_percentage/share:
          _en: Percentage of the minimum price of the share size that a member can pledge to pay. 0% = free, 100% = normal price (no discount possible)
          _fr: Pourcentage du prix minimum de la taille de la part que le membre peut s'engager à payer. 0% = gratuit, 100% = prix normal (pas de remise possible)
          _de: Prozentwert des Mindestbeitrags pro Anteilsgrösse, den ein Mitglied zusagen kann. 0% = kostenlos, 100% = Richtwert (keine Ermässigung möglich)
          _it: Percentuale del prezzo minimo della dimensione del carrello che un socio può promettere di pagare. 0% = gratuito, 100% = prezzo normale (nessuno sconto possibile)
          _nl: Percentage van de minimumprijs van de deelgrootte die een lid kan beloven te betalen. 0% = gratis, 100% = normale prijs (geen korting mogelijk)
        billing_ends_on_last_delivery_fy_month:
          _en: If disabled, billing extends until the end of the membership.
          _fr: Si désactivée, la facturation s'étend jusqu'à la date de fin de l'abonnement.
          _de: Wenn deaktiviert, erstreckt sich die Rechnungsstellung bis zum Ende des Abonnements.
          _it: Se disattivato, la fatturazione si estende fino alla data di fine dell'abbonamento.
          _nl: Indien uitgeschakeld, loopt de facturering door tot het einde van het lidmaatschap.
        billing_starts_after_first_delivery:
          _en: If disabled, billing starts from the beginning of the membership.
          _fr: Si désactivée, la facturation commence dès la date du début de l'abonnement.
          _de: Wenn deaktiviert, beginnt die Rechnungsstellung mit dem Beginn des Abonnements.
          _it: Se disattivato, la fatturazione inizia con l'inizio dell'abbonamento.
          _nl: Indien uitgeschakeld, begint de facturering vanaf het begin van het lidmaatschap.
        billing_year_divisions:
          _en: Payment interval(s) offered to members in the registration or renewal form.
          _fr: Intervalle(s) de paiement proposé(s) aux membres dans le formulaire d'inscription ou de renouvellement.
          _de: Zahlungsintervall(e), das/die Mitgliedern im Anmelde- oder Verlängerungsformular angeboten wird/werden.
          _it: Intervallo(i) di pagamento proposto(i) ai soci nel modulo di registrazione o di rinnovo.
          _nl: Betalingsinterval(len) aangeboden aan leden in het registratie- of vernieuwingsformulier.
        delivery_cycles_member_order_mode:
          _en: Sets the order of delivery cycles in the registration form after considering their individual priority.
          _fr: Permet de définir l'ordre d'affichage des cycles de livraison dans le formulaire d'inscription, après avoir pris en compte leur priorité individuelle.
          _de: Legt die Reihenfolge der Lieferzyklen im Anmeldeformular fest, nachdem ihre individuelle Priorität berücksichtigt wurde.
          _it: Permette di definire l'ordine di visualizzazione dei cicli di consegna nel modulo di iscrizione, dopo aver preso in considerazione la loro priorità individuale.
          _nl: Stelt de volgorde van leveringscycli in het registratieformulier in na het in overweging nemen van hun individuele prioriteit.
        delivery_pdf_member_info:
          _en: Information displayed under each member's name.
          _fr: Information affichée en dessous du nom de chaque membre.
          _de: Information, die unter dem Namen jedes Mitglieds angezeigt wird.
          _it: Informazione visualizzata sotto il nome di ogni socio.
          _nl: Informatie weergegeven onder de naam van elk lid.
        depots_member_order_mode:
          _en: Sets the order of depots in the registration form after considering their individual priority.
          _fr: Permet de définir l'ordre d'affichage des dépôts dans le formulaire d'inscription, après avoir pris en compte leur priorité individuelle.
          _de: Legt die Reihenfolge der Depots im Anmeldeformular fest, nachdem ihre individuelle Priorität berücksichtigt wurde.
          _it: Permette di definire l'ordine di visualizzazione dei punti di ritiro nel modulo di iscrizione, dopo aver preso in considerazione la loro priorità individuale.
          _nl: Stelt de volgorde van depots in het registratieformulier in na het in overweging nemen van hun individuele prioriteit.
        email:
          _en: Address displayed in the footer of the members page.
          _fr: Adresse affichée dans le bas de page de la page des membres.
          _de: Adresse, die im Footer der Mitgliederseite angezeigt wird.
          _it: Indirizzo visualizzato nel piè di pagina della pagina dei soci.
          _nl: Adres weergegeven in de voettekst van de ledenpagina.
        email_default_from_html:
          _en: Must end with <i>@%{domain}</i>.
          _fr: Doit finir par <i>@%{domain}</i>.
          _de: Muss mit <i>@%{domain}</i> enden.
          _it: Deve terminare con <i>@%{domain}</i>.
          _nl: Moet eindigen met <i>@%{domain}</i>.
        fiscal_year_start_month:
          _en: Please contact me for changes.
          _fr: Merci de me contacter pour tout changement.
          _de: Bitte kontaktieren Sie mich für Änderungen.
          _it: Grazie di contattarmi per qualsiasi modifica.
          _nl: Neem contact met mij op voor wijzigingen.
        iban_html:
          _en: A QR-IBAN is required to generate Swiss QR invoices with reference numbers. This number is different from your regular bank account IBAN and must be requested from your bank. <a href="/handbook/billing">Learn more</a>
          _fr: Un QR-IBAN est nécessaire pour générer des factures-QR suisses avec numéro de référence. Ce numéro est différent de l'IBAN de votre compte bancaire et doit être demandé à votre banque. <a href="/handbook/billing">En savoir plus</a>
          _de: Ein QR-IBAN ist erforderlich, um Schweizer QR-Rechnungen mit Referenznummern zu erstellen. Diese Nummer unterscheidet sich von Ihrer regulären Bankkontonummer (IBAN) und muss bei Ihrer Bank angefordert werden. <a href="/handbook/billing">Mehr erfahren</a>
          _it: Un QR-IBAN è necessario per generare fatture-QR svizzere con numero di riferimento. Questo numero è diverso dall'IBAN del vostro conto bancario e deve essere richiesto alla vostra banca. <a href="/handbook/billing">Scopri di più</a>
          _nl: Een QR-IBAN is vereist om Zwitserse QR-facturen met referentienummers te genereren. Dit nummer verschilt van uw reguliere bankrekeningnummer (IBAN) en moet bij uw bank worden aangevraagd. <a href="/handbook/billing">Meer informatie</a>
        invoice_document_name_html:
          _en: For tax purposes (especially VAT), changing the name of the PDF documents generated for invoices can be beneficial. Be sure to also update the content of the <a href="mail_templates?scope=invoice">automated billing emails</a> to keep them consistent with this change.
          _fr: Pour des raisons fiscales (notamment la TVA), il peut être bénéfique de modifier le nom des documents PDF générés pour les factures. Pensez également à mettre à jour le contenu des <a href="mail_templates?scope=invoice">e-mails automatiques de facturation</a> afin qu'ils restent cohérents avec ce changement.
          _de: Aus steuerlichen Gründen (insbesondere der Mehrwertsteuer) kann es sinnvoll sein, den Namen der für Rechnungen erstellten PDF-Dokumente zu ändern. Denken Sie daran, auch den Inhalt der <a href="mail_templates?scope=invoice">automatischen Rechnungs-E-Mails</a> anzupassen, damit sie mit dieser Änderung übereinstimmen.
          _it: Per motivi fiscali (soprattutto l'IVA), può essere utile modificare il nome dei documenti PDF generati per le fatture. Ricorda di aggiornare anche il contenuto delle <a href="mail_templates?scope=invoice">e-mail di fatturazione automatiche</a> per mantenerle coerenti con questa modifica.
          _nl: Voor belastingdoeleinden (vooral btw) kan het wijzigen van de naam van de PDF-documenten gegenereerd voor facturen voordelig zijn. Zorg ervoor dat u ook de inhoud van de <a href="mail_templates?scope=invoice">geautomatiseerde factuur-e-mails</a> bijwerkt om deze consistent te houden met deze wijziging.
        invoice_footer:
          _en: Text displayed at the bottom of the invoice, before the payment section.
          _fr: Texte affiché en bas de la facture, avant la section concernant son paiement.
          _de: Text, der am Ende der Rechnung, vor dem Abschnitt über die Zahlung, angezeigt wird.
          _it: Testo visualizzato in fondo alla fattura, prima della sezione relativa al pagamento.
          _nl: Tekst weergegeven onderaan de factuur, voor de betalingssectie.
        invoice_info:
          _en: Text displayed in italics after the invoice amount.
          _fr: Texte affiché en italique après le montant de la facture.
          _de: Text, der kursiv nach dem Rechnungsbetrag angezeigt wird.
          _it: Testo visualizzato in corsivo dopo l'importo della fattura.
          _nl: Tekst weergegeven in cursief na het factuurbedrag.
        invoice_logos:
          _en: Optional label/certification logo(s) that is/are displayed at the bottom right of the invoice, above the footer. Useful, for example, for an "Organic" or "Demeter" label.
          _fr: Image(s) optionnelle(s) d'un ou plusieurs logos d'étiquette ou de certification qui sont affichés en bas à droite de la facture, au-dessus du pied de page. Utile, par exemple, pour un label "Bio" ou "Demeter".
          _de: Optionales Etikett oder Zertifikat Logo(s), das unten rechts auf der Rechnung angezeigt wird, über dem Fußzeile. Nützlich, zum Beispiel, für ein "Organisch" oder "Demeter" Etikett.
          _it: Opzionale logo di etichetta o di certificazione che viene visualizzato in basso a destra della fattura, sopra il piè di pagina. Utile, ad esempio, per un "Bio" o un "Demeter".
          _nl: Optioneel label/certificering logo('s) dat/die wordt/worden weergegeven rechtsonder op de factuur, boven de voettekst. Handig, bijvoorbeeld, voor een "Biologisch" of "Demeter" label.
        invoice_membership_summary_only/bag:
          _en: When enabled, membership invoices will display a single "Annual overview" line instead of showing a detailed breakdown of bags, complements, and other items.
          _fr: Lorsque cette option est activée, les factures d'abonnement n'afficheront qu'une seule ligne «Récapitulatif annuel» au lieu de détailler les sacs, les compléments et les autres éléments.
          _de: Wenn aktiviert, zeigen Mitgliedschaftsrechnungen nur eine einzelne Zeile «Jahresübersicht» an, anstatt eine detaillierte Aufschlüsselung der Körbe, Ergänzungen und anderer Posten darzustellen.
          _it: Quando abilitato, le fatture di abbonamento mostreranno solo una riga «Riepilogo annuale» invece di visualizzare un dettaglio di borse, complementi e altri articoli.
          _nl: Indien ingeschakeld, tonen abonnementsfacturen alleen een regel «Jaaroverzicht» in plaats van een gedetailleerde uitsplitsing van manden, aanvullingen en andere items.
        invoice_membership_summary_only/basket:
          _en: When enabled, membership invoices will display a single "Annual overview" line instead of showing a detailed breakdown of baskets, complements, and other items.
          _fr: Lorsque cette option est activée, les factures d'abonnement n'afficheront qu'une seule ligne «Récapitulatif annuel» au lieu de détailler les paniers, les compléments et les autres éléments.
          _de: Wenn aktiviert, zeigen Mitgliedschaftsrechnungen nur eine einzelne Zeile «Jahresübersicht» an, anstatt eine detaillierte Aufschlüsselung der Körbe, Ergänzungen und anderer Posten darzustellen.
          _it: Quando abilitato, le fatture di abbonamento mostreranno solo una riga «Riepilogo annuale» invece di visualizzare un dettaglio di ceste, complementi e altri articoli.
          _nl: Indien ingeschakeld, tonen abonnementsfacturen alleen een regel «Jaaroverzicht» in plaats van een gedetailleerde uitsplitsing van manden, aanvullingen en andere items.
        invoice_membership_summary_only/cone:
          _en: When enabled, membership invoices will display a single "Annual overview" line instead of showing a detailed breakdown of cones, complements, and other items.
          _fr: Lorsque cette option est activée, les factures d'abonnement n'afficheront qu'une seule ligne «Récapitulatif annuel» au lieu de détailler les cornets, les compléments et les autres éléments.
          _de: Wenn aktiviert, zeigen Mitgliedschaftsrechnungen nur eine einzelne Zeile «Jahresübersicht» an, anstatt eine detaillierte Aufschlüsselung der Körbe, Ergänzungen und anderer Posten darzustellen.
          _it: Quando abilitato, le fatture di abbonamento mostreranno solo una riga «Riepilogo annuale» invece di visualizzare un dettaglio di coni, complementi e altri articoli.
          _nl: Indien ingeschakeld, tonen abonnementsfacturen alleen een regel «Jaaroverzicht» in plaats van een gedetailleerde uitsplitsing van manden, aanvullingen en andere items.
        invoice_membership_summary_only/package:
          _en: When enabled, membership invoices will display a single "Annual overview" line instead of showing a detailed breakdown of packages, complements, and other items.
          _fr: Lorsque cette option est activée, les factures d'abonnement n'afficheront qu'une seule ligne «Récapitulatif annuel» au lieu de détailler les colis, les compléments et les autres éléments.
          _de: Wenn aktiviert, zeigen Mitgliedschaftsrechnungen nur eine einzelne Zeile «Jahresübersicht» an, anstatt eine detaillierte Aufschlüsselung der Körbe, Ergänzungen und anderer Posten darzustellen.
          _it: Quando abilitato, le fatture di abbonamento mostreranno solo una riga «Riepilogo annuale» invece di visualizzare un dettaglio di pacchi, complementi e altri articoli.
          _nl: Indien ingeschakeld, tonen abonnementsfacturen alleen een regel «Jaaroverzicht» in plaats van een gedetailleerde uitsplitsing van manden, aanvullingen en andere items.
        invoice_membership_summary_only/share:
          _en: When enabled, membership invoices will display a single "Annual overview" line instead of showing a detailed breakdown of shares, complements, and other items.
          _fr: Lorsque cette option est activée, les factures d'abonnement n'afficheront qu'une seule ligne «Récapitulatif annuel» au lieu de détailler les parts, les compléments et les autres éléments.
          _de: Wenn aktiviert, zeigen Mitgliedschaftsrechnungen nur eine einzelne Zeile «Jahresübersicht» an, anstatt eine detaillierte Aufschlüsselung der Körbe, Ergänzungen und anderer Posten darzustellen.
          _it: Quando abilitato, le fatture di abbonamento mostreranno solo una riga «Riepilogo annuale» invece di visualizzare un dettaglio di parti, complementi e altri articoli.
          _nl: Indien ingeschakeld, tonen abonnementsfacturen alleen een regel «Jaaroverzicht» in plaats van een gedetailleerde uitsplitsing van manden, aanvullingen en andere items.
        invoice_sepa_info:
          _en: Text displayed in italics after the invoice amount. When set, used in place of the "Information text", but only for SEPA invoices.
          _fr: Texte affiché en italique après le montant de la facture. Lorsqu'il est défini, il est utilisé à la place du "Texte d'information", mais uniquement pour les factures SEPA.
          _de: Text, der kursiv nach dem Rechnungsbetrag angezeigt wird. Wenn festgelegt, wird er anstelle die "Informationszeile" verwendet, aber nur für SEPA-Rechnungen.
          _it: Testo visualizzato in corsivo dopo l'importo della fattura. Quando impostato, viene utilizzato al posto del "Testo informativo", ma solo per le fatture SEPA.
          _nl: Tekst weergegeven in cursief na het factuurbedrag. Wanneer ingesteld, gebruikt in plaats van de "Informatietekst", maar alleen voor SEPA-facturen.
        languages:
          _en: Please contact me for changes.
          _fr: Merci de me contacter pour tout changement.
          _de: Bitte kontaktieren Sie mich für Änderungen.
          _it: Grazie di contattarmi per qualsiasi modifica.
          _nl: Neem contact met mij op voor wijzigingen.
        local_currency_membership_annual_fee_only:
          _en: When enabled, only membership and annual fee invoices are issued in local currency. Other invoice types (shop orders, shares, etc.) will use the national currency. When disabled, all invoices are issued in local currency.
          _fr: Lorsque cette option est activée, seules les factures d'abonnement et de cotisation annuelle sont émises en monnaie locale. Les autres types de factures (commandes d'épicerie, parts sociales, etc.) utilisent la monnaie nationale. Lorsque désactivée, toutes les factures sont émises en monnaie locale.
          _de: Wenn aktiviert, werden nur Abonnement- und Jahresbeitragsrechnungen in lokaler Währung ausgestellt. Andere Rechnungsarten (Hofladen-Bestellungen, Anteilscheine usw.) verwenden die nationale Währung. Wenn deaktiviert, werden alle Rechnungen in lokaler Währung ausgestellt.
          _it: Quando abilitato, solo le fatture di abbonamento e quota annuale vengono emesse in valuta locale. Gli altri tipi di fattura (ordini drogheria, quote sociali, ecc.) utilizzeranno la valuta nazionale. Quando disabilitato, tutte le fatture vengono emesse in valuta locale.
          _nl: Indien ingeschakeld, worden alleen lidmaatschaps- en jaarlijkse bijdragefacturen uitgegeven in lokale valuta. Andere factuurtypen (winkelbestellingen, aandelen, enz.) gebruiken de nationale valuta. Indien uitgeschakeld, worden alle facturen uitgegeven in lokale valuta.
        member_come_from_form_mode:
          _en: Defines the display mode of this field in the registration form.
          _fr: Définis le mode d'affichage de ce champ dans le formulaire d'inscription.
          _de: Definiert den Anzeigemodus dieses Feldes im Anmeldeformular.
          _it: Definisce la modalità di visualizzazione di questo campo nel modulo di registrazione.
          _nl: Definieert de weergavemodus van dit veld in het registratieformulier.
        member_form_activity_participations_text:
          _en: This optional text is inserted before the activity participations input in the registration/renewal form if the min/max number of participations can be changed by the member.
          _fr: Ce texte optionnel est inséré avant le champ de saisie des participations dans le formulaire d'inscription/renouvellement si le nombre min/max de participation peut être modifié par le membre.
          _de: Dieser optionale Text wird vor dem Eingabefeld für die Teilnahmen im Anmelde-/Verlängerungsformular eingefügt, wenn die Min/Max Anzahl der Teilnahmen vom Mitglied geändert werden kann.
          _it: Questo testo opzionale è inserito prima del campo di inserimento delle partecipazioni nel modulo di registrazione/rinnovo se il numero min/max di partecipazioni può essere modificato dal socio.
          _nl: Deze optionele tekst wordt ingevoegd voor het invoerveld van de deelnames in het registratie-/vernieuwingsformulier als het min/max aantal deelnames door het lid kan worden gewijzigd.
        member_form_complement_quantities:
          _en: If disabled, only checkboxes are displayed (quantity 0 or 1).
          _fr: Si désactivé, seules des cases à cocher sont affichées (quantité 0 ou 1).
          _de: Wenn deaktiviert, werden nur Kontrollkästchen angezeigt (Menge 0 oder 1).
          _it: Se disattivato, vengono visualizzate solo caselle di controllo (quantità 0 o 1).
          _nl: Indien uitgeschakeld, worden alleen selectievakjes weergegeven (hoeveelheid 0 of 1).
        member_form_complements_text/bag:
          _en: This optional text is inserted before the list of bag complements.
          _fr: Ce texte optionnel est inséré avant la liste des compléments sac.
          _de: Dieser optionale Text wird vor der Liste der Taschenzusätze eingefügt.
          _it: Questo testo opzionale è inserito prima dell'elenco degli extra borsa.
          _nl: Deze optionele tekst wordt ingevoegd voor de lijst van tasaanvullingen.
        member_form_complements_text/basket:
          _en: This optional text is inserted before the list of basket complements.
          _fr: Ce texte optionnel est inséré avant la liste des compléments panier.
          _de: Dieser optionale Text wird vor der Liste der Korbzusätze eingefügt.
          _it: Questo testo opzionale è inserito prima dell'elenco degli extra cesta.
          _nl: Deze optionele tekst wordt ingevoegd voor de lijst van mandaanvullingen.
        member_form_complements_text/cone:
          _en: This optional text is inserted before the list of cone complements.
          _fr: Ce texte optionnel est inséré avant la liste des compléments cornet.
          _de: Dieser optionale Text wird vor der Liste der Tütenzusätze eingefügt.
          _it: Questo testo opzionale è inserito prima dell'elenco degli extra cono.
          _nl: Deze optionele tekst wordt ingevoegd voor de lijst van zakaanvullingen.
        member_form_complements_text/package:
          _en: This optional text is inserted before the list of package complements.
          _fr: Ce texte optionnel est inséré avant la liste des compléments colis.
          _de: Dieser optionale Text wird vor der Liste der Paketzusätze eingefügt.
          _it: Questo testo opzionale è inserito prima dell'elenco degli extra pacco.
          _nl: Deze optionele tekst wordt ingevoegd voor de lijst van pakketaanvullingen.
        member_form_complements_text/share:
          _en: This optional text is inserted before the list of share complements.
          _fr: Ce texte optionnel est inséré avant la liste des compléments part.
          _de: Dieser optionale Text wird vor der Liste der Anteilszusätze eingefügt.
          _it: Questo testo opzionale è inserito prima dell'elenco degli extra parte.
          _nl: Deze optionele tekst wordt ingevoegd voor de lijst van deelaanvullingen.
        member_form_delivery_cycle_label:
          _en: Label displayed above delivery cycles on the registration form.
          _fr: Libellé affiché au-dessus des cycles de livraisons sur le formulaire d'inscription.
          _de: Bezeichnung, die über den Lieferzyklen im Anmeldeformular angezeigt wird.
          _it: Etichetta visualizzata sopra i cicli di consegna nel modulo di registrazione.
          _nl: Label weergegeven boven leveringscycli op het registratieformulier.
        member_form_extra_text:
          _en: This optional text is inserted after the default generated explanation text.
          _fr: Ce texte optionnel est inséré après le texte d'explication généré par défaut.
          _de: Dieser optionale Text wird nach dem standardmäßig erzeugten Erklärungstext eingefügt.
          _it: Questo testo opzionale è inserito dopo il testo di spiegazione generato di default.
          _nl: Deze optionele tekst wordt ingevoegd na de standaard gegenereerde uitlegtekst.
        member_form_extra_text_only:
          _en: Removes the default generated explanation text and displays only the additional explanations.
          _fr: Enlève le texte d'explication généré par défaut et affiche uniquement les explications supplémentaires.
          _de: Entfernt den standardmäßig generierten Erklärungstext und zeigt nur die zusätzlichen Erklärungen an.
          _it: Rimuove il testo di spiegazione generato di default e visualizza solo le spiegazioni supplementari.
          _nl: Verwijdert de standaard gegenereerde uitlegtekst en toont alleen de aanvullende uitleg.
        member_form_subtitle:
          _en: Text displayed below the title of the registration form.
          _fr: Texte affiché en dessous du titre du formulaire d'inscription.
          _de: Text, der unter dem Titel des Anmeldeformulars angezeigt wird.
          _it: Testo visualizzato sotto il titolo del modulo di registrazione.
          _nl: Tekst weergegeven onder de titel van het registratieformulier.
        member_information_text:
          _en: If present, the content of this field will be displayed on the member's account under the "Information" section. You can use it, for example, to share confidential information with your members.
          _fr: Si présent, le contenu de ce champ sera affiché sur le compte du membre sous la section "Informations". Vous pouvez l'utiliser, par exemple, pour partager des informations confidentielles avec vos membres.
          _de: Wenn vorhanden, wird der Inhalt dieses Feldes im Mitgliederkonto unter dem Punkt "Informationen" angezeigt. Sie können es z.B. verwenden, um vertrauliche Informationen mit Ihren Mitgliedern zu teilen.
          _it: Se presente, il contenuto di questo campo verrà visualizzato sul conto del socio sotto la sezione "Informazioni". Puoi usarlo, ad esempio, per condividere informazioni riservate con i tuoi soci.
          _nl: Indien aanwezig, wordt de inhoud van dit veld weergegeven op het ledenaccount onder de sectie "Informatie". U kunt het bijvoorbeeld gebruiken om vertrouwelijke informatie met uw leden te delen.
        member_information_title:
          _en: Leave blank to use the default title.
          _fr: Laisser blanc pour utiliser l'intitulé par défaut.
          _de: Lassen Sie es leer, um den Standardtitel zu verwenden.
          _it: Lasciare vuoto per utilizzare il titolo predefinito.
          _nl: Laat leeg om de standaardtitel te gebruiken.
        member_order_priority_html:
          _en: Allows forcing the position before applying the order defined in <a href='/settings#registration'>the settings</a>.
          _fr: Permet de forcer la position avant l'application de l'ordre défini dans <a href='/settings#registration'>les paramètres</a>.
          _de: Ermöglicht das Erzwingen der Position, bevor die in <a href='/settings#registration'>den Einstellungen</a> festgelegte Reihenfolge angewendet wird.
          _it: Utilizzato per forzare la posizione prima di applicare l'ordine definito <a href='/settings#registration'>nei parametri</a>.
          _nl: Stelt u in staat de positie te forceren voordat de volgorde gedefinieerd in <a href='/settings#registration'>de instellingen</a> wordt toegepast.
        member_profession_form_mode:
          _en: Defines the display mode of this field in the registration form.
          _fr: Définis le mode d'affichage de ce champ dans le formulaire d'inscription.
          _de: Definiert den Anzeigemodus dieses Feldes im Anmeldeformular.
          _it: Definisce la modalità di visualizzazione di questo campo nel modulo di registrazione.
          _nl: Definieert de weergavemodus van dit veld in het registratieformulier.
        membership_complements_update_allowed:
          _en: Only the modification of future deliveries is allowed. The modification is only possible per delivery and not for the entire membership.
          _fr: Seule la modification des futures livraisons est autorisée. La modification est uniquement possible par livraison et non pour l'ensemble de l'abonnement.
          _de: Nur die Änderung zukünftiger Lieferungen ist erlaubt. Die Änderung ist nur pro Lieferung und nicht für das gesamte Abonnement möglich.
          _it: È consentita solo la modifica delle consegne future. La modifica è possibile solo per consegna e non per l'intero abbonamento.
          _nl: Alleen wijziging van toekomstige leveringen is toegestaan. De wijziging is alleen mogelijk per levering en niet voor het hele lidmaatschap.
        membership_depot_update_allowed:
          _en: Only the modification of future deliveries is allowed.
          _fr: Seule la modification des futures livraisons est autorisée.
          _de: Nur die Änderung zukünftiger Lieferungen ist erlaubt.
          _it: È consentita solo la modifica delle consegne future.
          _nl: Alleen wijziging van toekomstige leveringen is toegestaan.
        membership_renewal_depot_update:
          _en: Allows members to change the depot when renewing their membership via the form.
          _fr: Permettre au membre de changer de dépôt lors du renouvellement de son abonnement via le formulaire.
          _de: Ermöglicht es Mitgliedern, das Depot bei der Verlängerung ihres Abonnements über das Formular zu ändern.
          _it: Permettere al socio di cambiare il punto di ritiro al momento del rinnovo dell'abbonamento tramite il modulo.
          _nl: Stelt leden in staat het depot te wijzigen bij het vernieuwen van hun lidmaatschap via het formulier.
        membership_renewed_attributes/bag:
          _en: The selected configurations will be automatically carried over when renewing the membership. If the bag size or complements are changed by the member, the corresponding configurations will be deleted anyway.
          _fr: Les configurations sélectionnées seront automatiquement reprises lors du renouvellement de l'abonnement tel quel. Si la taille du sac ou les compléments sont modifiés par le membre, alors les configurations correspondantes seront de toute façon effacées.
          _de: Die ausgewählten Konfigurationen werden beim Erneuern des Abonnements automatisch übernommen. Wenn die Taschengrösse oder die Zusätze vom Mitglied geändert werden, werden die entsprechenden Konfigurationen trotzdem gelöscht.
          _it: Le configurazioni selezionate saranno automaticamente riprese al momento del rinnovo dell'abbonamento. Se la dimensione della borsa o gli extra vengono modificati dal socio, le configurazioni corrispondenti saranno comunque cancellate.
          _nl: De geselecteerde configuraties worden automatisch overgenomen bij het vernieuwen van het lidmaatschap. Als de tasgrootte of aanvullingen door het lid worden gewijzigd, worden de overeenkomstige configuraties toch verwijderd.
        membership_renewed_attributes/basket:
          _en: The selected configurations will be automatically carried over when renewing the membership. If the basket size or complements are changed by the member, the corresponding configurations will be deleted anyway.
          _fr: Les configurations sélectionnées seront automatiquement reprises lors du renouvellement de l'abonnement tel quel. Si la taille du panier ou les compléments sont modifiés par le membre, alors les configurations correspondantes seront de toute façon effacées.
          _de: Die ausgewählten Konfigurationen werden beim Erneuern des Abonnements automatisch übernommen. Wenn die Korbgrösse oder die Zusätze vom Mitglied geändert werden, werden die entsprechenden Konfigurationen trotzdem gelöscht.
          _it: Le configurazioni selezionate saranno automaticamente riprese al momento del rinnovo dell'abbonamento. Se la dimensione del cesto o gli extra vengono modificati dal socio, le configurazioni corrispondenti saranno comunque cancellate.
          _nl: De geselecteerde configuraties worden automatisch overgenomen bij het vernieuwen van het lidmaatschap. Als de mandgrootte of aanvullingen door het lid worden gewijzigd, worden de overeenkomstige configuraties toch verwijderd.
        membership_renewed_attributes/cone:
          _en: The selected configurations will be automatically carried over when renewing the membership. If the cone size or complements are changed by the member, the corresponding configurations will be deleted anyway.
          _fr: Les configurations sélectionnées seront automatiquement reprises lors du renouvellement de l'abonnement tel quel. Si la taille du cornet ou les compléments sont modifiés par le membre, alors les configurations correspondantes seront de toute façon effacées.
          _de: Die ausgewählten Konfigurationen werden beim Erneuern des Abonnements automatisch übernommen. Wenn die Tütengrösse oder die Zusätze vom Mitglied geändert werden, werden die entsprechenden Konfigurationen trotzdem gelöscht.
          _it: Le configurazioni selezionate saranno automaticamente riprese al momento del rinnovo dell'abbonamento. Se la dimensione del cono o gli extra vengono modificati dal socio, le configurazioni corrispondenti saranno comunque cancellate.
          _nl: De geselecteerde configuraties worden automatisch overgenomen bij het vernieuwen van het lidmaatschap. Als de zakgrootte of aanvullingen door het lid worden gewijzigd, worden de overeenkomstige configuraties toch verwijderd.
        membership_renewed_attributes/package:
          _en: The selected configurations will be automatically carried over when renewing the membership. If the package size or complements are changed by the member, the corresponding configurations will be deleted anyway.
          _fr: Les configurations sélectionnées seront automatiquement reprises lors du renouvellement de l'abonnement tel quel. Si la taille du colis ou les compléments sont modifiés par le membre, alors les configurations correspondantes seront de toute façon effacées.
          _de: Die ausgewählten Konfigurationen werden beim Erneuern des Abonnements automatisch übernommen. Wenn die Paketgrösse oder die Zusätze vom Mitglied geändert werden, werden die entsprechenden Konfigurationen trotzdem gelöscht.
          _it: Le configurazioni selezionate saranno automaticamente riprese al momento del rinnovo dell'abbonamento. Se la dimensione del pacco o gli extra vengono modificati dal socio, le configurazioni corrispondenti saranno comunque cancellate.
          _nl: De geselecteerde configuraties worden automatisch overgenomen bij het vernieuwen van het lidmaatschap. Als de pakketgrootte of aanvullingen door het lid worden gewijzigd, worden de overeenkomstige configuraties toch verwijderd.
        membership_renewed_attributes/share:
          _en: The selected configurations will be automatically carried over when renewing the membership. If the share size or complements are changed by the member, the corresponding configurations will be deleted anyway.
          _fr: Les configurations sélectionnées seront automatiquement reprises lors du renouvellement de l'abonnement tel quel. Si la taille de la part ou les compléments sont modifiés par le membre, alors les configurations correspondantes seront de toute façon effacées.
          _de: Die ausgewählten Konfigurationen werden beim Erneuern des Abonnements automatisch übernommen. Wenn die Anteilsgrösse oder die Zusätze vom Mitglied geändert werden, werden die entsprechenden Konfigurationen trotzdem gelöscht.
          _it: Le configurazioni selezionate saranno automaticamente riprese al momento del rinnovo dell'abbonamento. Se la dimensione della parte o gli extra vengono modificati dal socio, le configurazioni corrispondenti saranno comunque cancellate.
          _nl: De geselecteerde configuraties worden automatisch overgenomen bij het vernieuwen van het lidmaatschap. Als de deelgrootte of aanvullingen door het lid worden gewijzigd, worden de overeenkomstige configuraties toch verwijderd.
        membership_update_text/bag:
          _en: Optional text displayed on the member page above the membership or bag modification form.
          _fr: Texte optionnel affiché sur la page de membre au-dessus du formulaire de modification de l'abonnement ou du sac.
          _de: Optionaler Text, der auf der Mitgliederseite über dem Formular zur Änderung des Abonnements oder der Tasche angezeigt wird.
          _it: Testo opzionale visualizzato nella pagina del socio sopra il modulo di iscrizione o di modifica della borsa.
          _nl: Optionele tekst weergegeven op de ledenpagina boven het lidmaatschap- of taswijzigingsformulier.
        membership_update_text/basket:
          _en: Optional text displayed on the member page above the membership or basket modification form.
          _fr: Texte optionnel affiché sur la page de membre au-dessus du formulaire de modification de l'abonnement ou du panier.
          _de: Optionaler Text, der auf der Mitgliederseite über dem Formular zur Änderung des Abonnements oder der Korb angezeigt wird.
          _it: Testo opzionale visualizzato nella pagina del socio sopra il modulo di iscrizione o di modifica della cesta.
          _nl: Optionele tekst weergegeven op de ledenpagina boven het lidmaatschap- of mandwijzigingsformulier.
        membership_update_text/cone:
          _en: Optional text displayed on the member page above the membership or cone modification form.
          _fr: Texte optionnel affiché sur la page de membre au-dessus du formulaire de modification de l'abonnement ou du cornet.
          _de: Optionaler Text, der auf der Mitgliederseite über dem Formular zur Änderung des Abonnements oder der Tüte angezeigt wird.
          _it: Testo opzionale visualizzato nella pagina del socio sopra il modulo di iscrizione o di modifica del cono.
          _nl: Optionele tekst weergegeven op de ledenpagina boven het lidmaatschap- of zakwijzigingsformulier.
        membership_update_text/package:
          _en: Optional text displayed on the member page above the membership or package modification form.
          _fr: Texte optionnel affiché sur la page de membre au-dessus du formulaire de modification de l'abonnement ou du colis.
          _de: Optionaler Text, der auf der Mitgliederseite über dem Formular zur Änderung des Abonnements oder der Paket angezeigt wird.
          _it: Testo opzionale visualizzato nella pagina del socio sopra il modulo di iscrizione o di modifica del pacco.
          _nl: Optionele tekst weergegeven op de ledenpagina boven het lidmaatschap- of pakketwijzigingsformulier.
        membership_update_text/share:
          _en: Optional text displayed on the member page above the membership or share modification form.
          _fr: Texte optionnel affiché sur la page de membre au-dessus du formulaire de modification de l'abonnement ou de la part.
          _de: Optionaler Text, der auf der Mitgliederseite über dem Formular zur Änderung des Abonnements oder der Anteil angezeigt wird.
          _it: Testo opzionale visualizzato nella pagina del socio sopra il modulo di iscrizione o di modifica della parte.
          _nl: Optionele tekst weergegeven op de ledenpagina boven het lidmaatschap- of deelwijzigingsformulier.
        new_member_fee_description:
          _en: Title of the item on the invoice sent to new members.
          _fr: Intitulé de l'article sur la facture envoyée aux nouveaux membres.
          _de: Titel des Artikels auf der Rechnung, die an neue Mitglieder gesendet wird.
          _it: Titolo dell'articolo sulla fattura inviata ai nuovi soci.
          _nl: Titel van het item op de factuur verzonden naar nieuwe leden.
        open_bidding_round_reminder_sent_after_in_days:
          _en: The reminder is sent only once, X days after the bidding round is opened. Leave blank if no reminder.
          _fr: Le rappel n'est envoyé qu'une seule fois, X jours après l'ouverture du tour d'engagement. Laisser vide si aucun rappel.
          _de: Die Erinnerung wird nur einmal verschickt, und zwar X Tage nach Eröffnung der Beitragsrunde. Leer lassen, wenn keine Erinnerung gewünscht ist.
          _it: Il promemoria è inviato una sola volta, X giorni dopo l'apertura del turno di impegno. Lasciare vuoto se non c'è alcun promemoria.
          _nl: De herinnering wordt slechts één keer verzonden, X dagen nadat de biedronde is geopend. Laat leeg als er geen herinnering is.
        open_renewal_reminder_sent_after_in_days:
          _en: The reminder is sent only once, X days after the renewal request is sent. Leave blank if no reminder.
          _fr: Le rappel n'est envoyé qu'une seule fois, X jours après l'envoi de la demande de renouvellement. Laisser vide si aucun rappel.
          _de: Die Erinnerung wird nur einmal verschickt, und zwar X Tage, nachdem der Verlängerungsantrag abgeschickt wurde. Lassen Sie das Feld leer, wenn keine Erinnerung erfolgt.
          _it: Il promemoria è inviato una sola volta, X giorni prima dell'invio della domanda di rinnovo. Lasciare vuoto se non c'è alcun promemoria.
          _nl: De herinnering wordt slechts één keer verzonden, X dagen na het verzenden van het vernieuwingsverzoek. Laat leeg als er geen herinnering is.
        open_renewal_text:
          _en: Text displayed on the member page above the renewal request form.
          _fr: Texte affiché sur la page de membre au-dessus du formulaire de demande du renouvellement.
          _de: Text, der auf der Mitgliederseite oberhalb des Verlängerungsantragsformulars angezeigt wird.
          _it: Testo visibile sulla pagina dei soci sotto il formulario con la domanda di rinnovo.
          _nl: Tekst weergegeven op de ledenpagina boven het vernieuwingsverzoekformulier.
        phone:
          _en: Number displayed in the footer of the members page.
          _fr: Numéro affiché dans le bas de page de la page des membres.
          _de: Nummer, die im Footer der Mitgliederseite angezeigt wird.
          _it: Numero visualizzato nel piè di pagina della pagina dei soci.
          _nl: Nummer weergegeven in de voettekst van de ledenpagina.
        recurring_billing_wday_html:
          _en: Automatic billing is done every week at the beginning of the chosen day. Invoices created this way are also sent automatically. <u>It is advisable to choose a day other than the delivery day.</u>
          _fr: La facturation automatique est effectuée chaque semaine au début du jour choisi. Les factures ainsi créées sont également automatiquement envoyées. <u>Il est préférable de choisir un jour différent de celui de la livraison.</u>
          _de: Die Rechnungsstellung erfolgt automatisch jede Woche zu Beginn des gewählten Tages. Auf diese Weise erstellte Rechnungen werden ebenfalls automatisch versendet. <u>Es ist ratsam, einen anderen Tag als den Lieferungstag zu wählen.</u>
          _it: La fatturazione automatica è effettuata ogni settimana all'inizio del giorno scelto. Le fatture create sono inviate automaticamente. <u>È consigliabile scegliere un giorno diverso da quello della consegna.</u>
          _nl: Automatische facturering wordt elke week uitgevoerd aan het begin van de gekozen dag. Facturen die op deze manier worden gemaakt, worden ook automatisch verzonden. <u>Het is raadzaam een andere dag dan de leveringsdag te kiezen.</u>
        send_closed_invoice:
          _en: If disabled, new invoices considered already paid due to a positive balance are not sent by automatic billing.
          _fr: Si désactivée, les nouvelles factures considérées comme déjà payées à cause d'une balance positive ne sont pas envoyées par la facturation automatique.
          _de: Wenn deaktiviert, werden neue Rechnungen, die aufgrund eines positiven Saldos als bereits bezahlt gelten, nicht über die automatische Rechnungsstellung versendet.
          _it: Se disattivato, le nuove fatture considerate già pagate a causa di un saldo positivo non vengono inviate dalla fatturazione automatica.
          _nl: Indien uitgeschakeld, worden nieuwe facturen die als reeds betaald worden beschouwd vanwege een positief saldo niet verzonden door automatische facturering.
        share_price:
          _en: Leave blank if no shares.
          _fr: Laisser vide si pas de part sociale.
          _de: Leer lassen, wenn keine Anteilscheine.
          _it: Lasciare vuoto se non ci sono quote sociali cooperative.
          _nl: Laat leeg als er geen aandelen zijn.
        shares_number/bag:
          _en: Minimum number of shares required at registration, this number can also be adjusted by bag size. Leave blank if no shares.
          _fr: Nombre de parts sociales minimum requises lors de l'inscription, ce nombre peut également être ajusté par taille sac. Laisser vide si pas de part sociale.
          _de: Mindestanzahl an Anteilscheinen, die bei der Anmeldung erforderlich ist, diese Anzahl kann auch nach Taschengrösse angepasst werden. Leer lassen, wenn keine Anteilscheine.
          _it: Numero minimo di quote sociali richieste all'iscrizione, questo numero può anche essere regolato per dimensione della borsa. Lasciare vuoto se non ci sono quote sociali.
          _nl: Minimum aantal aandelen vereist bij registratie, dit aantal kan ook worden aangepast per tasgrootte. Laat leeg als er geen aandelen zijn.
        shares_number/basket:
          _en: Minimum number of shares required at registration, this number can also be adjusted by basket size. Leave blank if no shares.
          _fr: Nombre de parts sociales minimum requises lors de l'inscription, ce nombre peut également être ajusté par taille de panier. Laisser vide si pas de part sociale.
          _de: Mindestanzahl an Anteilscheinen, die bei der Anmeldung erforderlich ist, diese Anzahl kann auch nach Korbgrösse angepasst werden. Leer lassen, wenn keine Anteilscheine.
          _it: Numero minimo di quote sociali richieste all'iscrizione, questo numero può anche essere regolato per dimensione del cesto. Lasciare vuoto se non ci sono quote sociali.
          _nl: Minimum aantal aandelen vereist bij registratie, dit aantal kan ook worden aangepast per mandgrootte. Laat leeg als er geen aandelen zijn.
        shares_number/cone:
          _en: Minimum number of shares required at registration, this number can also be adjusted by cone size. Leave blank if no shares.
          _fr: Nombre de parts sociales minimum requises lors de l'inscription, ce nombre peut également être ajusté par taille cornet. Laisser vide si pas de part sociale.
          _de: Mindestanzahl an Anteilscheinen, die bei der Anmeldung erforderlich ist, diese Anzahl kann auch nach Tütengrösse angepasst werden. Leer lassen, wenn keine Anteilscheine.
          _it: Numero minimo di quote sociali richieste all'iscrizione, questo numero può anche essere regolato per dimensione del cono. Lasciare vuoto se non ci sono quote sociali.
          _nl: Minimum aantal aandelen vereist bij registratie, dit aantal kan ook worden aangepast per zakgrootte. Laat leeg als er geen aandelen zijn.
        shares_number/package:
          _en: Minimum number of shares required at registration, this number can also be adjusted by package size. Leave blank if no shares.
          _fr: Nombre de parts sociales minimum requises lors de l'inscription, ce nombre peut également être ajusté par taille colis. Laisser vide si pas de part sociale.
          _de: Mindestanzahl an Anteilscheinen, die bei der Anmeldung erforderlich ist, diese Anzahl kann auch nach Paketgrösse angepasst werden. Leer lassen, wenn keine Anteilscheine.
          _it: Numero minimo di quote sociali richieste all'iscrizione, questo numero può anche essere regolato per dimensione del pacco. Lasciare vuoto se non ci sono quote sociali.
          _nl: Minimum aantal aandelen vereist bij registratie, dit aantal kan ook worden aangepast per pakketgrootte. Laat leeg als er geen aandelen zijn.
        shares_number/share:
          _en: Minimum number of shares required at registration, this number can also be adjusted by share size. Leave blank if no shares.
          _fr: Nombre de parts sociales minimum requises lors de l'inscription, ce nombre peut également être ajusté par taille part. Laisser vide si pas de part sociale.
          _de: Mindestanzahl an Anteilscheinen, die bei der Anmeldung erforderlich ist, diese Anzahl kann auch nach Anteilsgrösse angepasst werden. Leer lassen, wenn keine Anteilscheine.
          _it: Numero minimo di quote sociali richieste all'iscrizione, questo numero può anche essere regolato per dimensione della parte. Lasciare vuoto se non ci sono quote sociali.
          _nl: Minimum aantal aandelen vereist bij registratie, dit aantal kan ook worden aangepast per deelgrootte. Laat leeg als er geen aandelen zijn.
        shop_admin_only:
          _en: Allows you to hide the farm shop from members while products are being set up. Only admins accessing a member's account can see the farm shop in the menu.
          _fr: Permet de cacher l'épicerie aux membres pendant la mise en place des produits. Seuls les admins accédant au compte d'un membre peuvent voir l'épicerie dans le menu.
          _de: Ermöglicht es Ihnen, das Hofladen vor den Mitgliedern zu verbergen, während die Produkte aufgestellt werden. Nur Admins, die auf das Konto eines Mitglieds zugreifen, können das Hofladen im Menü sehen.
          _it: Permette di nascondere la drogheria ai soci mentre i prodotti vengono piazzati. Solo gli admin che accedono all'account di un socio possono vedere la spesa nel menu.
          _nl: Stelt u in staat de winkel te verbergen voor leden terwijl producten worden ingesteld. Alleen beheerders die toegang hebben tot een ledenaccount kunnen de winkel in het menu zien.
        shop_delivery_open_delay_in_days:
          _en: Leave blank if orders can still be placed on the day of delivery.
          _fr: Laisser vide si les commandes peuvent encore être faites le jour de livraison.
          _de: Leer lassen, wenn am Tag der Lieferung noch bestellt werden kann.
          _it: Lasciare vuoto se gli ordini possono ancora essere fatti il giorno della consegna.
          _nl: Laat leeg als bestellingen nog kunnen worden geplaatst op de dag van levering.
        shop_delivery_open_last_day_end_time:
          _en: Leave blank if orders can be placed until midnight.
          _fr: Laisser vide si les commandes peuvent être faites jusqu'à minuit.
          _de: Leer lassen, wenn bis Mitternacht bestellt werden kann.
          _it: Lasciare vuoto se gli ordini possono essere fatti fino a mezzanotte.
          _nl: Laat leeg als bestellingen kunnen worden geplaatst tot middernacht.
        shop_invoice_info:
          _en: The variable "%{date}" is replaced by the delivery date.
          _fr: La variable "%{date}" est remplacée par la date de la livraison.
          _de: Die Variable "%{date}" wird durch das Datum der Lieferung ersetzt.
          _it: La variabile "%{date}" è sostituita dalla data di consegna.
          _nl: De variabele "%{date}" wordt vervangen door de leveringsdatum.
        shop_member_percentages:
          _en: Separated by commas. Allows members to increase (support) or decrease (discount) the final price of their order by the available percentages.
          _fr: Séparés par une virgule. Permet aux membres d'augmenter (soutien) ou de diminuer (rabais) lui-même le prix final de sa commande par les pourcentages disponibles.
          _de: Durch Komma getrennt. Ermöglicht es Mitgliedern, den Endpreis seiner Bestellung selbst um die verfügbaren Prozentsätze zu erhöhen (Unterstützung) oder zu senken (Rabatt).
          _it: Separati da una virgola. Consente ai soci di aumentare (supporto) o diminuire (sconto) il prezzo finale dell'ordine in base alle percentuali disponibili.
          _nl: Gescheiden door komma's. Stelt leden in staat de eindprijs van hun bestelling te verhogen (ondersteuning) of te verlagen (korting) met de beschikbare percentages.
        shop_order_automatic_invoicing_delay_in_days:
          _en: Allows you to automatically invoice orders X days after or before (-X) the delivery date. Leave blank to manually invoice orders.
          _fr: Permet de facturer automatiquement, durant la nuit, les commandes X jours après ou avant (-X) la date de livraison. Laisser vide pour facturer manuellement les commandes.
          _de: Ermöglicht es Ihnen, die Bestellungen X Tage nach oder vor (-X) dem Lieferdatum automatisch zu fakturieren. Lassen Sie das Feld leer, um die Bestellungen manuell zu fakturieren.
          _it: Permette di fatturare automaticamente, durante la notte, gli ordini X giorni dopo o prima (-X) la data di consegna. Lasciare vuoto per fatturare manualmente gli ordini.
          _nl: Stelt u in staat bestellingen automatisch te factureren X dagen na of voor (-X) de leveringsdatum. Laat leeg om bestellingen handmatig te factureren.
        shop_order_maximum_weight_in_kg:
          _en: Leave blank if no limit.
          _fr: Laisser vide si aucune limite.
          _de: Leer lassen, wenn keine Begrenzung.
          _it: Lasciare vuoto se non ci sono limiti.
          _nl: Laat leeg indien geen limiet.
        shop_order_minimal_amount:
          _en: Leave blank if no limit.
          _fr: Laisser vide si aucune limite.
          _de: Leer lassen, wenn keine Begrenzung.
          _it: Lasciare vuoto se non ci sono limiti.
          _nl: Laat leeg indien geen limiet.
        shop_terms_of_sale_url:
          _en: Link to the terms of sale displayed at the bottom of the member page of the farm shop.
          _fr: Lien sur les conditions de vente affiché en bas de la page de membre de l'épicerie.
          _de: Link zu den Geschäftsbedingungen, der unten auf der Mitgliederseite des Hofladens angezeigt wird.
          _it: Link alle condizioni di vendita pubblicate in fondo alla pagina dei soci del drogheria.
          _nl: Link naar de verkoopvoorwaarden weergegeven onderaan de ledenpagina van de winkel.
        shop_text:
          _en: Text displayed at the top of the member page of the farm shop.
          _fr: Texte affiché en haut de la page de membre de l'épicerie.
          _de: Text, der oben auf der Mitgliederseite des Hofladens angezeigt wird.
          _it: Testo visibile nella parte superiore della pagina di socio del droghiere.
          _nl: Tekst weergegeven bovenaan de ledenpagina van de winkel.
        social_network_urls:
          _en: Separated by a comma. Links (logos) displayed in the footer of the members page and emails.
          _fr: Séparés par une virgule. Liens (logos) affichés dans le bas de page de la page des membres et des emails.
          _de: Durch Komma getrennt. Links (Logos) im Fußbereich der Mitgliederseite und E-Mails angezeigt.
          _it: Separati da una virgola. Link (loghi) visualizzati nel piè di pagina della pagina dei soci e delle email.
          _nl: Gescheiden door komma's. Links (logo's) weergegeven in de voettekst van de ledenpagina en e-mails.
        trial_baskets_count/bag_html:
          _en: The membership is billed once all trial bags have been delivered. If the membership is terminated during or at the end of the trial period, only the delivered bags are billed. If the member renews later, the number of trial bags already used is reset, regardless of the duration of the interruption. <a href="/handbook/billing#trial-bags">Learn more</a>
          _fr: L'abonnement est facturé une fois que tous les sacs à l'essai ont été livrés. Si l'abonnement est arrêté pendant ou à la fin de la période d'essai, alors seulement les sacs livrés sont facturés. Si le membre se réinscrit ultérieurement, le nombre de sacs à l'essai déjà utilisés est réinitialisé, peu importe la durée de l'interruption. <a href="/handbook/billing#trial-baskets">En savoir plus</a>
          _de: Das Abonnement wird in Rechnung gestellt, sobald alle Probetaschen ausgeliefert wurden. Wenn das Abonnement während oder am Ende der Probezeit beendet wird, dann werden nur die gelieferten Taschen in Rechnung gestellt. Wenn das Mitglied später erneut eintritt, wird die Anzahl der bereits verwendeten Probetaschen zurückgesetzt, unabhängig von der Dauer der Unterbrechung. <a href="/handbook/billing#trial-baskets">Mehr erfahren</a>
          _it: L'abbonamento viene fatturato una volta che tutte le borse di prova sono state consegnate. Se l'abbonamento viene interrotto durante o alla fine del periodo di prova, vengono addebitate solo le borse consegnate. Se il socio si rinnova in seguito, il numero delle borse di prova già utilizzate viene azzerato, indipendentemente dalla durata dell'interruzione. <a href="/handbook/billing#trial-baskets">Scopri di più</a>
          _nl: Het lidmaatschap wordt gefactureerd zodra alle proeftassen zijn geleverd. Als het lidmaatschap wordt beëindigd tijdens of aan het einde van de proefperiode, worden alleen de geleverde tassen gefactureerd. Als het lid zich later vernieuwt, wordt het aantal reeds gebruikte proeftassen gereset, ongeacht de duur van de onderbreking. <a href="/handbook/billing#trial-baskets">Meer informatie</a>
