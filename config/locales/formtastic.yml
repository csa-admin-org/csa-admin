          _fr: Toutes les tailles part sont incluses si aucune n'est sélectionnée.
          _de: Alle Anteilsgrössen sind enthalten, wenn keine ausgewählt ist.
          _it: Tutte le dimensioni della parte sono incluse se nessuna è selezionata.
