_:
  formtastic:
    actions:
      bidding_round:
        create:
          _en: Create draft
          _fr: Créer Brouillon
          _de: Entwurf erstellen
          _it: Crea Bozza
          _nl: Concept aanmaken
        update:
          _en: Update draft
          _fr: Mettre à jour Brouillon
          _de: Entwurf aktualisieren
          _it: Aggiorna bozza
          _nl: Concept bijwerken
      newsletter:
        create:
          _en: Create draft
          _fr: Créer Brouillon
          _de: Entwurf erstellen
          _it: Crea Bozza
          _nl: Concept aanmaken
        update:
          _en: Update draft
          _fr: Mettre à jour Brouillon
          _de: Entwurf aktualisieren
          _it: Aggiorna bozza
          _nl: Concept bijwerken
    cancel:
      _en: Cancel
      _fr: Annuler
      _de: Abbrechen
      _it: Annullare
      _nl: Annuleren
    create:
      _en: Create %{model}
      _fr: Créer %{model}
      _de: "%{model} erstellen"
      _it: Creare %{model}
      _nl: "%{model} aanmaken"
    hints:
      activity:
        description:
          _en: 'Bad example: Come weeding! You will see, it feels good.'
          _fr: 'Mauvais exemple: Arrachage de mauvaises herbes, vous verrez ça fait du bien.'
          _de: 'Schlechtes Beispiel: Kommt jäten! Ihr werdet sehen, das tut gut.'
          _it: 'Cattivo exemple: vedrete che lavorare sul campo vi farà bene.'
          _nl: 'Slecht voorbeeld: Kom wieden! U zult zien, het voelt goed.'
        participants_limit:
          _en: Leave blank if no limit.
          _fr: Laisser vide si aucune limite.
          _de: Leer lassen, wenn keine Grenze.
          _it: Lasciare vuoto se non ci sono limiti.
          _nl: Laat leeg indien geen limiet.
        place_url:
          _en: Google Maps or other.
          _fr: Google Maps ou autre.
          _de: Google Maps oder anderes.
          _it: Google Maps o altro.
          _nl: Google Maps of andere.
        visible:
          _en: Select "No" if this activity should only be visible to admins.
          _fr: Sélectionner "Non" si cette activité ne doit être visible que pour les admins.
          _de: Wählen Sie "Nein", wenn diese Aktivität nur für Administratoren sichtbar sein soll.
          _it: Selezionare "No" se questa attività deve essere visibile solo agli amministratori.
          _nl: Selecteer "Nee" als deze activiteit alleen zichtbaar moet zijn voor beheerders.
      activity_preset:
        place_url:
          _en: Google Maps or other.
          _fr: Google Maps ou autre.
          _de: Google Maps oder anderes.
          _it: Google Maps o altro.
          _nl: Google Maps of andere.
      announcement:
        text_html:
          _en: Please check that the display on the sheets does not overflow.<br/>The announcement will be displayed on the sheets (PDF) of the depot/delivery pairs listed below.
          _fr: Merci de vérifier que l'affichage sur les fiches ne déborde pas.<br/>L'annonce sera affichée sur les fiches (PDF) des paires dépôts/livraisons ci-dessous.
          _de: Bitte überprüfen Sie, dass die Anzeige auf den Blättern nicht überläuft.<br/>Die Ankündigung wird auf den Blättern (PDF) der unten aufgeführten Depots/Lieferungspaare angezeigt.
          _it: Controlla che l'annuncio non esca dal foglio.<br/>L'annuncio verrà visualizzato sulla coppia di fogli punti di ritiro/consegne (PDF) qui sotto.
          _nl: Controleer dat de weergave op de bladen niet overloopt.<br/>De aankondiging wordt weergegeven op de bladen (PDF) van de onderstaande depot/levering-paren.
      attributes:
        admin_name:
          _en: If present, replaces the name displayed in the administration interface. The name for members remains unchanged.
          _fr: Si présent, remplace le nom affiché dans l'interface d'administration. Le nom pour les membres reste inchangé.
          _de: Wenn vorhanden, ersetzt den Namen in der Administrationsoberfläche. Der Name für die Mitglieder bleibt unverändert.
          _it: Se presente, sostituisce il nome visualizzato nell'interfaccia di amministrazione. Il nome per i soci rimane inalterato.
          _nl: Indien aanwezig, vervangt de naam die wordt weergegeven in de beheerinterface. De naam voor leden blijft ongewijzigd.
      basket:
        basket_size_price:
          _en: Leave blank for the default price.
          _fr: Laisser blanc pour le prix par défaut.
          _de: Leer lassen für den Standardpreis.
          _it: Lasciare vuoto per il prezzo standard.
          _nl: Laat leeg voor de standaardprijs.
        delivery_cycle_price:
          _en: Leave blank for the default price (delivery cycle).
          _fr: Laisser blanc pour le prix par défaut (cycle de livraison).
          _de: Leer lassen für den Standardpreis (Lieferzyklus).
          _it: Lasciare vuoto per il prezzo standard (ciclo di consegna).
          _nl: Laat leeg voor de standaardprijs (leveringscyclus).
        depot_price:
          _en: Leave blank for the default price.
          _fr: Laisser blanc pour le prix par défaut.
          _de: Leer lassen für den Standardpreis.
          _it: Lasciare vuoto per il prezzo standard.
          _nl: Laat leeg voor de standaardprijs.
        shift_target_basket_id/bag:
          _en: Only deliveries with a similar content (bag size and complements) are usable.
          _fr: Seules les livraisons avec un contenu similaire (taille sac et compléments) sont utilisables.
          _de: Nur Lieferungen mit einem ähnlichen Inhalt (Taschengrösse und Ergänzungen) sind nutzbar.
          _it: Solo le consegne con un contenuto simile (dimensione della borsa e complementi) sono utilizzabili.
          _nl: Alleen leveringen met vergelijkbare inhoud (tasgrootte en aanvullingen) zijn bruikbaar.
        shift_target_basket_id/basket:
          _en: Only deliveries with a similar content (basket size and complements) are usable.
          _fr: Seules les livraisons avec un contenu similaire (taille de panier et compléments) sont utilisables.
          _de: Nur Lieferungen mit einem ähnlichen Inhalt (Korbgrösse und Ergänzungen) sind nutzbar.
          _it: Solo le consegne con un contenuto simile (dimensione della cesta e complementi) sono utilizzabili.
          _nl: Alleen leveringen met vergelijkbare inhoud (mandgrootte en aanvullingen) zijn bruikbaar.
        shift_target_basket_id/cone:
          _en: Only deliveries with a similar content (cone size and complements) are usable.
          _fr: Seules les livraisons avec un contenu similaire (taille cornet et compléments) sont utilisables.
          _de: Nur Lieferungen mit einem ähnlichen Inhalt (Tütengrösse und Ergänzungen) sind nutzbar.
          _it: Solo le consegne con un contenuto simile (dimensione del cono e complementi) sono utilizzabili.
          _nl: Alleen leveringen met vergelijkbare inhoud (zakgrootte en aanvullingen) zijn bruikbaar.
        shift_target_basket_id/package:
          _en: Only deliveries with a similar content (package size and complements) are usable.
          _fr: Seules les livraisons avec un contenu similaire (taille colis et compléments) sont utilisables.
          _de: Nur Lieferungen mit einem ähnlichen Inhalt (Paketgrösse und Ergänzungen) sind nutzbar.
          _it: Solo le consegne con un contenuto simile (dimensione del pacco e complementi) sono utilizzabili.
          _nl: Alleen leveringen met vergelijkbare inhoud (pakketgrootte en aanvullingen) zijn bruikbaar.
        shift_target_basket_id/share:
          _en: Only deliveries with a similar content (share size and complements) are usable.
          _fr: Seules les livraisons avec un contenu similaire (taille part et compléments) sont utilisables.
          _de: Nur Lieferungen mit einem ähnlichen Inhalt (Anteilsgrösse und Ergänzungen) sind nutzbar.
          _it: Solo le consegne con un contenuto simile (dimensione della parte e complementi) sono utilizzabili.
          _nl: Alleen leveringen met vergelijkbare inhoud (deelgrootte en aanvullingen) zijn bruikbaar.
      basket_complement:
        activity_participations_demanded_annually/bag:
          _en: Will be added to those of the bag size.
          _fr: Seront ajoutées à celles de la taille sac.
          _de: Werden zu denen der Taschengrösse hinzugefügt.
          _it: Saranno aggiunti a quelli della dimensione della borsa.
          _nl: Worden toegevoegd aan die van de tasgrootte.
        activity_participations_demanded_annually/basket:
          _en: Will be added to those of the basket size.
          _fr: Seront ajoutées à celles de la taille de panier.
          _de: Werden zu denen der Korbgrösse hinzugefügt.
          _it: Saranno aggiunti a quelli della dimensione della cesta.
          _nl: Worden toegevoegd aan die van de mandgrootte.
        activity_participations_demanded_annually/cone:
          _en: Will be added to those of the cone size.
          _fr: Seront ajoutées à celles de la taille cornet.
          _de: Werden zu denen der Tütengrösse hinzugefügt.
          _it: Saranno aggiunti a quelli della dimensione del cono.
          _nl: Worden toegevoegd aan die van de zakgrootte.
        activity_participations_demanded_annually/package:
          _en: Will be added to those of the package size.
          _fr: Seront ajoutées à celles de la taille colis.
          _de: Werden zu denen der Paketgrösse hinzugefügt.
          _it: Saranno aggiunti a quelli della dimensione del pacco.
          _nl: Worden toegevoegd aan die van de pakketgrootte.
        activity_participations_demanded_annually/share:
          _en: Will be added to those of the share size.
          _fr: Seront ajoutées à celles de la taille part.
          _de: Werden zu denen der Anteilsgrösse hinzugefügt.
          _it: Saranno aggiunti a quelli della dimensione della parte.
          _nl: Worden toegevoegd aan die van de deelgrootte.
        current_deliveries_html:
          _en: All memberships with this supplement will be automatically updated in case of changes. <b>Attention, <a href='/handbook/billing#price-change'>the billing of these memberships may be affected.</a></b>
          _fr: Tous les abonnements qui ont souscrit à ce complément seront automatiquement mis à jour en cas de changement. <b>Attention, <a href='/handbook/billing#price-change'>la facturation de ces abonnements peut-être affectée.</a></b>
          _de: Jede Abonnements mit diesem Zusatz werden bei Änderungen automatisch aktualisiert. <b>Achtung, <a href='/handbook/billing#price-change'>die Rechnungung dieser Abonnements kann beeinflusst werden.</a></b>
          _it: Tutti gli abbonamenti che hanno sottoscritto questo supplemento verranno automaticamente aggiornati in caso di modifica. <b>Attenzione, <a href='/handbook/billing#price-change'>la fatturazione di questi abbonamenti potrebbe essere influenzata.</a></b>
          _nl: Alle lidmaatschappen met deze aanvulling worden automatisch bijgewerkt bij wijzigingen. <b>Let op, <a href='/handbook/billing#price-change'>de facturering van deze lidmaatschappen kan worden beïnvloed.</a></b>
        form_detail:
          _en: Leave blank for the default text.
          _fr: Laisser blanc pour le texte par défaut.
          _de: Leer lassen für den Standardtext.
          _it: Lasciare vuoto per il testo predefinito.
          _nl: Laat leeg voor de standaardtekst.
        future_deliveries:
          _en: All memberships with this supplement will be automatically updated in case of changes.
          _fr: Tous les abonnements qui ont souscrit à ce complément seront automatiquement mis à jour en cas de changement.
          _de: Jede Abonnements mit diesem Zusatz werden bei Änderungen automatisch aktualisiert.
          _it: Tutti gli abbonamenti che hanno sottoscritto questo supplemento verranno automaticamente aggiornati in caso di modifica.
          _nl: Alle lidmaatschappen met deze aanvulling worden automatisch bijgewerkt bij wijzigingen.
        price:
          _en: All price changes are only valid for new memberships and are not applied retroactively.
          _fr: Tout changement de prix est uniquement valable pour les nouveaux abonnements et n'est pas rétroactivement appliqué.
          _de: Alle Preisänderungen gelten nur für neue Abonnements und werden nicht rückwirkend angewendet.
          _it: Tutte le modifiche al prezzo sono valide solo per i nuovi abbonamenti e non sono applicate retroattivamente.
          _nl: Alle prijswijzigingen zijn alleen geldig voor nieuwe lidmaatschappen en worden niet met terugwerkende kracht toegepast.
        visible:
          _en: Select "No" if the supplement is not available during registration.
          _fr: Sélectionner "Non" si le complément n'est pas disponible lors de l'inscription.
          _de: '"Nein" auswählen, wenn der Zusatz nicht vorhanden ist bei der Anmeldung.'
          _it: Seleziona "No" se il supplemento non è disponibile durante la registrazione.
          _nl: Selecteer "Nee" als de aanvulling niet beschikbaar is tijdens registratie.
      basket_content:
        basket_size_ids_quantities:
          _en: g or pieces.
          _fr: En g ou en pièce.
          _de: In g oder Stück.
          _it: g o pezzi.
          _nl: g of stuks.
        depots/bag:
          _en: Depots without delivered bags are automatically ignored.
          _fr: Les dépôts sans sacs livrés sont automatiquement ignorés.
          _de: Die Depots ohne gelieferte Taschen werden automatisch ignoriert.
          _it: I punti di ritiro senza borse consegnate vengono automaticamente ignorati.
          _nl: Depots zonder geleverde tassen worden automatisch genegeerd.
        depots/basket:
          _en: Depots without delivered baskets are automatically ignored.
          _fr: Les dépôts sans paniers livrés sont automatiquement ignorés.
          _de: Die Depots ohne gelieferte Körbe werden automatisch ignoriert.
          _it: I punti di ritiro senza ceste consegnate vengono automaticamente ignorati.
          _nl: Depots zonder geleverde manden worden automatisch genegeerd.
        depots/cone:
          _en: Depots without delivered cones are automatically ignored.
          _fr: Les dépôts sans cornets livrés sont automatiquement ignorés.
          _de: Die Depots ohne gelieferte Tüten werden automatisch ignoriert.
          _it: I punti di ritiro senza coni consegnati vengono automaticamente ignorati.
          _nl: Depots zonder geleverde zakken worden automatisch genegeerd.
        depots/package:
          _en: Depots without delivered packages are automatically ignored.
          _fr: Les dépôts sans colis livrés sont automatiquement ignorés.
          _de: Die Depots ohne gelieferte Pakete werden automatisch ignoriert.
          _it: I punti di ritiro senza pacchi consegnati vengono automaticamente ignorati.
          _nl: Depots zonder geleverde pakketten worden automatisch genegeerd.
        depots/share:
          _en: Depots without delivered shares are automatically ignored.
          _fr: Les dépôts sans parts livrés sont automatiquement ignorés.
          _de: Die Depots ohne gelieferte Anteile werden automatisch ignoriert.
          _it: I punti di ritiro senza parti consegnate vengono automaticamente ignorati.
          _nl: Depots zonder geleverde delen worden automatisch genegeerd.
        quantity:
          _en: Kg or pieces.
          _fr: En kg ou en pièces.
          _de: In kg oder Stück.
          _it: In kg o pezzi.
          _nl: Kg of stuks.
        unit_price:
          _en: Per kg or per piece.
          _fr: Au kg ou à la pièce.
          _de: Pro kg oder pro Stück.
          _it: Per kg o per pezzo.
          _nl: Per kg of per stuk.
      basket_content/product:
        defaults_intro/bag:
          _en: When not set, the unit and price from the last bag content using this product will be used.
          _fr: Si non définis, l'unité et le prix du dernier contenu de sac utilisant ce produit seront utilisés.
          _de: Wenn nicht gesetzt, werden die Einheit und der Preis des letzten Tascheninhalts mit diesem Produkt verwendet.
          _it: Se non impostati, verranno utilizzati l'unità e il prezzo dell'ultimo contenuto borsa che utilizza questo prodotto.
          _nl: Indien niet ingesteld, worden de eenheid en prijs van de laatste tasinhoud met dit product gebruikt.
        defaults_intro/basket:
          _en: When not set, the unit and price from the last basket content using this product will be used.
          _fr: Si non définis, l'unité et le prix du dernier contenu de panier utilisant ce produit seront utilisés.
          _de: Wenn nicht gesetzt, werden die Einheit und der Preis des letzten Korbinhalts mit diesem Produkt verwendet.
          _it: Se non impostati, verranno utilizzati l'unità e il prezzo dell'ultimo contenuto cesta che utilizza questo prodotto.
          _nl: Indien niet ingesteld, worden de eenheid en prijs van de laatste mandinhoud met dit product gebruikt.
        defaults_intro/cone:
          _en: When not set, the unit and price from the last cone content using this product will be used.
          _fr: Si non définis, l'unité et le prix du dernier contenu de cornet utilisant ce produit seront utilisés.
          _de: Wenn nicht gesetzt, werden die Einheit und der Preis des letzten Tüteninhalts mit diesem Produkt verwendet.
          _it: Se non impostati, verranno utilizzati l'unità e il prezzo dell'ultimo contenuto cono che utilizza questo prodotto.
          _nl: Indien niet ingesteld, worden de eenheid en prijs van de laatste zakinhoud met dit product gebruikt.
        defaults_intro/package:
          _en: When not set, the unit and price from the last package content using this product will be used.
          _fr: Si non définis, l'unité et le prix du dernier contenu de colis utilisant ce produit seront utilisés.
          _de: Wenn nicht gesetzt, werden die Einheit und der Preis des letzten Paketinhalts mit diesem Produkt verwendet.
          _it: Se non impostati, verranno utilizzati l'unità e il prezzo dell'ultimo contenuto pacco che utilizza questo prodotto.
          _nl: Indien niet ingesteld, worden de eenheid en prijs van de laatste pakketinhoud met dit product gebruikt.
        defaults_intro/share:
          _en: When not set, the unit and price from the last share content using this product will be used.
          _fr: Si non définis, l'unité et le prix du dernier contenu de part utilisant ce produit seront utilisés.
          _de: Wenn nicht gesetzt, werden die Einheit und der Preis des letzten Anteilsinhalts mit diesem Produkt verwendet.
          _it: Se non impostati, verranno utilizzati l'unità e il prezzo dell'ultimo contenuto parte che utilizza questo prodotto.
          _nl: Indien niet ingesteld, worden de eenheid en prijs van de laatste deelinhoud met dit product gebruikt.
        url:
          _en: For example, a page referencing the sale price.
          _fr: Par exemple, une page référençant le prix de vente.
          _de: Zum Beispiel eine Seite, die auf den Verkaufspreis verweist.
          _it: Per esempio, una pagina che fa riferimento al prezzo di vendita.
          _nl: Bijvoorbeeld een pagina met de verkoopprijs.
      basket_size:
        delivery_cycle/bag:
          _en: Allows you to force a specific delivery cycle for this bag size. The choice will not be offered to members during registration.
          _fr: Permet de forcer un cycle de livraisons spécifique pour cette taille sac. Le choix ne sera pas proposé aux membres lors de l'inscription.
          _de: Ermöglicht es Ihnen, einen bestimmten Lieferzyklus für diese Taschengrösse zu erzwingen. Die Auswahl wird den Mitgliedern bei der Registrierung nicht angezeigt.
          _it: Permette di forzare un ciclo di consegna specifico per questa dimensione della borsa. La scelta non verrà proposta ai soci durante la registrazione.
          _nl: Hiermee kunt u een specifieke leveringscyclus forceren voor deze tasgrootte. De keuze wordt niet aangeboden aan leden tijdens registratie.
        delivery_cycle/basket:
          _en: Allows you to force a specific delivery cycle for this basket size. The choice will not be offered to members during registration.
          _fr: Permet de forcer un cycle de livraisons spécifique pour cette taille de panier. Le choix ne sera pas proposé aux membres lors de l'inscription.
          _de: Ermöglicht es Ihnen, einen bestimmten Lieferzyklus für diese Korbgrösse zu erzwingen. Die Auswahl wird den Mitgliedern bei der Registrierung nicht angezeigt.
          _it: Permette di forzare un ciclo di consegna specifico per questa dimensione della cesta. La scelta non verrà proposta ai soci durante la registrazione.
          _nl: Hiermee kunt u een specifieke leveringscyclus forceren voor deze mandgrootte. De keuze wordt niet aangeboden aan leden tijdens registratie.
        delivery_cycle/cone:
          _en: Allows you to force a specific delivery cycle for this cone size. The choice will not be offered to members during registration.
          _fr: Permet de forcer un cycle de livraisons spécifique pour cette taille cornet. Le choix ne sera pas proposé aux membres lors de l'inscription.
          _de: Ermöglicht es Ihnen, einen bestimmten Lieferzyklus für diese Tütengrösse zu erzwingen. Die Auswahl wird den Mitgliedern bei der Registrierung nicht angezeigt.
          _it: Permette di forzare un ciclo di consegna specifico per questa dimensione del cono. La scelta non verrà proposta ai soci durante la registrazione.
          _nl: Hiermee kunt u een specifieke leveringscyclus forceren voor deze zakgrootte. De keuze wordt niet aangeboden aan leden tijdens registratie.
        delivery_cycle/package:
          _en: Allows you to force a specific delivery cycle for this package size. The choice will not be offered to members during registration.
          _fr: Permet de forcer un cycle de livraisons spécifique pour cette taille colis. Le choix ne sera pas proposé aux membres lors de l'inscription.
          _de: Ermöglicht es Ihnen, einen bestimmten Lieferzyklus für diese Paketgrösse zu erzwingen. Die Auswahl wird den Mitgliedern bei der Registrierung nicht angezeigt.
          _it: Permette di forzare un ciclo di consegna specifico per questa dimensione del pacco. La scelta non verrà proposta ai soci durante la registrazione.
          _nl: Hiermee kunt u een specifieke leveringscyclus forceren voor deze pakketgrootte. De keuze wordt niet aangeboden aan leden tijdens registratie.
        delivery_cycle/share:
          _en: Allows you to force a specific delivery cycle for this share size. The choice will not be offered to members during registration.
