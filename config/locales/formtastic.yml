          _nl: Behoudt het aangepaste aantal gevraagde deelnames en de bijbehorende prijsaanpassing. Indien niet aangevinkt, wordt de standaardwaarde berekend op basis van deelgrootte en aanvullingen.
        basket_complements_annual_price_change:
          _en: Keeps any price adjustment applied to complements. This adjustment appears as a separate line on the invoice.
          _fr: Conserve l'ajustement de prix appliqué aux compléments. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Zusätze bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato agli extra. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op aanvullingen. Deze aanpassing verschijnt als een aparte regel op de factuur.
        baskets_annual_price_change/bag:
          _en: Keeps any price adjustment applied to bags. This adjustment appears as a separate line on the invoice.
          _fr: Conserve l'ajustement de prix appliqué aux sacs. Cet ajustement apparaît comme une ligne distincte sur la facture.
          _de: Behält Preisanpassungen für Taschen bei. Diese Anpassung erscheint als separate Zeile auf der Rechnung.
          _it: Mantiene l'aggiustamento di prezzo applicato alle borse. Questo aggiustamento appare come una riga separata sulla fattura.
          _nl: Behoudt prijsaanpassingen toegepast op tassen. Deze aanpassing verschijnt als een aparte regel op de factuur.
        baskets_annual_price_change/basket:
