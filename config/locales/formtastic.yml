        bank_reference:
          _en: Leave blank if your bank does not provide one, it will be included in the invoice reference number.
          _fr: Laisser vide si votre banque n'en fournit pas, sera inclus dans le numéro de référence de la facture.
          _de: Lassen Sie es leer, wenn Ihre Bank keine bereitstellt, wird in die Rechnungsreferenznummer aufgenommen.
          _it: Lasciare vuoto se la tua banca non ne fornisce, sarà incluso nel numero di riferimento della fattura.
          _nl: Laat leeg als uw bank er geen verstrekt, het wordt opgenomen in het factuurreferentienummer.
        basket_complements_member_order_mode/bag:
          _en: Sets the order of bag complements in the registration form after considering their individual priority.
          _fr: Définit l'ordre des compléments de sac dans le formulaire d'inscription après avoir pris en compte leur priorité individuelle.
          _de: Legt die Reihenfolge der Taschenzusätze im Anmeldeformular fest, nachdem ihre individuelle Priorität berücksichtigt wurde.
          _it: Permette di definire l'ordine di visualizzazione delle aggiunte di borse nel modulo di iscrizione, dopo aver preso in considerazione la loro priorità individuale.
          _nl: Stelt de volgorde van tasaanvullingen in het registratieformulier in na het in overweging nemen van hun individuele prioriteit.
        basket_complements_member_order_mode/basket:
          _en: Sets the order of basket complements in the registration form after considering their individual priority.
          _fr: Définit l'ordre des compléments de panier dans le formulaire d'inscription après avoir pris en compte leur priorité individuelle.
          _de: Legt die Reihenfolge der Korbzusätze im Anmeldeformular fest, nachdem ihre individuelle Priorität berücksichtigt wurde.
          _it: Permette di definire l'ordine di visualizzazione delle aggiunte di ceste nel modulo di iscrizione, dopo aver preso in considerazione la loro priorità individuale.
          _nl: Stelt de volgorde van mandaanvullingen in het registratieformulier in na het in overweging nemen van hun individuele prioriteit.
        basket_complements_member_order_mode/cone:
          _en: Sets the order of cone complements in the registration form after considering their individual priority.
          _fr: Définit l'ordre des compléments de cornet dans le formulaire d'inscription après avoir pris en compte leur priorité individuelle.
          _de: Legt die Reihenfolge der Tütenzusätze im Anmeldeformular fest, nachdem ihre individuelle Priorität berücksichtigt wurde.
          _it: Permette di definire l'ordine di visualizzazione dei aggiunte di coni nel modulo di iscrizione, dopo aver preso in considerazione la loro priorità individuale.
