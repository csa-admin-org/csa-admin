          _fr: Conserve le nombre personnalisé de participations demandées et son ajustement de prix. Si décochée, la valeur par défaut sera calculée selon la taille du cornet et les compléments.
          _de: Behält die benutzerdefinierte Anzahl geforderter Teilnahmen und die Preisanpassung bei. Wenn nicht aktiviert, wird der Standardwert basierend auf Tütengrösse und Zusätzen berechnet.
          _it: Mantiene il numero personalizzato di partecipazioni richieste e il relativo aggiustamento di prezzo. Se non selezionato, il valore predefinito sarà calcolato in base alla dimensione del cono e agli extra.
          _nl: Behoudt het aangepaste aantal gevraagde deelnames en de bijbehorende prijsaanpassing. Indien niet aangevinkt, wordt de standaardwaarde berekend op basis van zakgrootte en aanvullingen.
        activity_participations/package:
