          _de: Mitglieder können ihren Korb bis Mitternacht ändern, X Tage vor dem Lieferdatum (z.B. 3 Tage = Sonntag Mitternacht für eine Mittwochslieferung). Null bedeutet, dass Änderungen am Liefertag möglich sind.
