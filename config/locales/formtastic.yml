          _fr: Toutes les tailles colis sont incluses si aucune n'est sélectionnée.
          _de: Alle Paketgrössen sind enthalten, wenn keine ausgewählt ist.
          _it: Tutte le dimensioni del pacco sono incluse se nessuna è selezionata.
