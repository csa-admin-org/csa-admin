      membership_renewed_attributes:
        absences_included_annually:
          _en: Keeps the custom number of included absences. If unchecked, the default value from the delivery cycle will be used.
          _fr: Conserve le nombre personnalisé d'absences incluses. Si décochée, la valeur par défaut du cycle de livraison sera utilisée.
          _de: Behält die benutzerdefinierte Anzahl enthaltener Abwesenheiten bei. Wenn nicht aktiviert, wird der Standardwert des Lieferzyklus verwendet.
          _it: Mantiene il numero personalizzato di assenze incluse. Se non selezionato, verrà utilizzato il valore predefinito del ciclo di consegna.
          _nl: Behoudt het aangepaste aantal inbegrepen afwezigheden. Indien niet aangevinkt, wordt de standaardwaarde van de leveringscyclus gebruikt.
        activity_participations/bag:
          _en: Keeps the custom number of demanded participations and its price adjustment. If unchecked, the default value will be calculated based on the bag size and complements.
          _fr: Conserve le nombre personnalisé de participations demandées et son ajustement de prix. Si décochée, la valeur par défaut sera calculée selon la taille du sac et les compléments.
          _de: Behält die benutzerdefinierte Anzahl geforderter Teilnahmen und die Preisanpassung bei. Wenn nicht aktiviert, wird der Standardwert basierend auf Taschengrösse und Zusätzen berechnet.
          _it: Mantiene il numero personalizzato di partecipazioni richieste e il relativo aggiustamento di prezzo. Se non selezionato, il valore predefinito sarà calcolato in base alla dimensione della borsa e agli extra.
          _nl: Behoudt het aangepaste aantal gevraagde deelnames en de bijbehorende prijsaanpassing. Indien niet aangevinkt, wordt de standaardwaarde berekend op basis van tasgrootte en aanvullingen.
        activity_participations/basket:
          _en: Keeps the custom number of demanded participations and its price adjustment. If unchecked, the default value will be calculated based on the basket size and complements.
          _fr: Conserve le nombre personnalisé de participations demandées et son ajustement de prix. Si décochée, la valeur par défaut sera calculée selon la taille du panier et les compléments.
          _de: Behält die benutzerdefinierte Anzahl geforderter Teilnahmen und die Preisanpassung bei. Wenn nicht aktiviert, wird der Standardwert basierend auf Korbgrösse und Zusätzen berechnet.
          _it: Mantiene il numero personalizzato di partecipazioni richieste e il relativo aggiustamento di prezzo. Se non selezionato, il valore predefinito sarà calcolato in base alla dimensione del cesto e agli extra.
          _nl: Behoudt het aangepaste aantal gevraagde deelnames en de bijbehorende prijsaanpassing. Indien niet aangevinkt, wordt de standaardwaarde berekend op basis van mandgrootte en aanvullingen.
        activity_participations/cone:
