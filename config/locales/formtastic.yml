          _de: Ermöglicht es Ihnen, einen bestimmten Lieferzyklus für diese Anteilsgrösse zu erzwingen. Die Auswahl wird den Mitgliedern bei der Registrierung nicht angezeigt.
          _it: Permette di forzare un ciclo di consegna specifico per questa dimensione della parte. La scelta non verrà proposta ai soci durante la registrazione.
          _nl: Hiermee kunt u een specifieke leveringscyclus forceren voor deze deelgrootte. De keuze wordt niet aangeboden aan leden tijdens registratie.
