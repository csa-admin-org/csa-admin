        basket_content_member_visible_hours_before/bag:
          _en: Number of hours before midnight on the delivery day when the bag contents become visible to members. For example, 12 hours means noon the day before. If set to 0, the bag content will only be visible on the delivery day itself.
          _fr: Nombre d'heures avant minuit le jour de la livraison à partir duquel le contenu du sac devient visible pour les membres. Par exemple, 12 heures signifie midi la veille. Si réglé sur 0, le contenu du sac ne sera visible que le jour même de la livraison.
          _de: Anzahl der Stunden vor Mitternacht am Liefertag, ab wann der Tascheninhalt für die Mitglieder sichtbar wird. Zum Beispiel bedeuten 12 Stunden Mittag am Vortag. Bei 0 wird der Tascheninhalt erst am Liefertag selbst sichtbar.
          _it: Numero di ore prima della mezzanotte del giorno di consegna in cui il contenuto della borsa diventa visibile ai soci. Ad esempio, 12 ore significa mezzogiorno del giorno prima. Se impostato su 0, il contenuto della borsa sarà visibile solo il giorno stesso della consegna.
          _nl: Aantal uren vóór middernacht op de leveringsdag waarop de tasinhoud zichtbaar wordt voor leden. Bijvoorbeeld, 12 uur betekent 's middags de dag ervoor. Indien ingesteld op 0, wordt de tasinhoud pas op de leveringsdag zelf zichtbaar.
