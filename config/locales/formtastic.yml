        billing_year_division:
          _en: Differentiates active members based on the period in which they receive their bills.
          _fr: Permet de différencier les membres actifs par l'intervalle de paiement de leur abonnement.
          _de: Unterscheidet aktive Mitglieder anhand des Zeitraums, in dem sie ihre Rechnungen erhalten.
          _it: Permette di differenziare i soci attivi in base all'intervallo di pagamento del loro abbonamento.
          _nl: Onderscheidt actieve leden op basis van de periode waarin zij hun rekeningen ontvangen.
        city:
          _en: Filters active members by their city (exact match).
          _fr: Permet de filtrer les membres actifs par leur ville (correspondance exacte).
          _de: Filtert aktive Mitglieder nach ihrer Stadt (exakte Übereinstimmung).
          _it: Filtra i soci attivi per la loro città (corrispondenza esatta).
          _nl: Filtert actieve leden op hun stad (exacte overeenkomst).
        coming_deliveries_in_days/bag:
          _en: Differentiates active members based on the date of their next bag delivery.
          _fr: Permet de différencier les membres actifs par la date de leur prochaine livraison de sac.
          _de: Unterscheidet aktive Mitglieder anhand des Datums ihrer nächsten Taschenlieferung.
          _it: Permette di differenziare i soci attivi in base alla data di consegna del prossimo carrello.
          _nl: Onderscheidt actieve leden op basis van de datum van hun volgende taslevering.
        coming_deliveries_in_days/basket:
          _en: Differentiates active members based on the date of their next basket delivery.
          _fr: Permet de différencier les membres actifs par la date de leur prochaine livraison de panier.
          _de: Unterscheidet aktive Mitglieder anhand des Datums ihrer nächsten Körbelieferung.
          _it: Permette di differenziare i soci attivi in base alla data di consegna del prossimo carrello.
          _nl: Onderscheidt actieve leden op basis van de datum van hun volgende mandlevering.
        coming_deliveries_in_days/cone:
          _en: Differentiates active members based on the date of their next cone delivery.
          _fr: Permet de différencier les membres actifs par la date de leur prochaine livraison de cornet.
          _de: Unterscheidet aktive Mitglieder anhand des Datums ihrer nächsten Tütenlieferung.
          _it: Permette di differenziare i soci attivi in base alla data di consegna del prossimo carrello.
          _nl: Onderscheidt actieve leden op basis van de datum van hun volgende zaklevering.
        coming_deliveries_in_days/package:
          _en: Differentiates active members based on the date of their next package delivery.
          _fr: Permet de différencier les membres actifs par la date de leur prochaine livraison de colis.
          _de: Unterscheidet aktive Mitglieder anhand des Datums ihrer nächsten Paketelieferung.
          _it: Permette di differenziare i soci attivi in base alla data di consegna del prossimo carrello.
          _nl: Onderscheidt actieve leden op basis van de datum van hun volgende pakketlevering.
        coming_deliveries_in_days/share:
          _en: Differentiates active members based on the date of their next share delivery.
          _fr: Permet de différencier les membres actifs par la date de leur prochaine livraison de part.
          _de: Unterscheidet aktive Mitglieder anhand des Datums ihrer nächsten Anteilslieferung.
          _it: Permette di differenziare i soci attivi in base alla data di consegna del prossimo carrello.
          _nl: Onderscheidt actieve leden op basis van de datum van hun volgende deellevering.
        delivery_cycle_ids:
          _en: All delivery cycles are included if none are selected.
          _fr: Tous les cycles de livraison sont inclus si aucun n'est sélectionné.
          _de: Alle Zyklen von Lieferungen sind enthalten, wenn keiner ausgewählt ist.
          _it: Tutti i cicli di consegna sono inclusi se nessuno è selezionato.
          _nl: Alle leveringscycli zijn inbegrepen als er geen zijn geselecteerd.
        depot_ids:
          _en: All depots are included if none are selected.
          _fr: Tous les dépôts sont inclus si aucun n'est sélectionné.
          _de: Alle Depots sind enthalten, wenn keines ausgewählt ist.
          _it: Tutti i punti di ritiro sono inclusi se nessuno è selezionato.
          _nl: Alle depots zijn inbegrepen als er geen zijn geselecteerd.
        first_membership:
          _en: Differentiates new active members from old ones who were already subscribed in previous years.
          _fr: Permet de différencier les nouveaux membres actifs des anciens qui étaient déjà abonnés les années précédentes.
          _de: Unterscheidet neue Mitglieder von alten, die bereits mehrere Abonnements haben.
          _it: Permette di distinguere tra nuovi soci attivi e vecchi soci che erano già abbonati negli anni precedenti.
          _nl: Onderscheidt nieuwe actieve leden van oude die al geabonneerd waren in voorgaande jaren.
        membership_ids:
          _en: List of membership IDs separated by a comma. Useful for precise targeting of members, when the other criteria are not sufficient.
          _fr: Liste d'IDs d'abonnements séparés par une virgule. Utile pour une ciblage précis des membres, lorsque les autres critères ne sont pas suffisants.
          _de: Liste von Abonnement-IDs, getrennt durch ein Komma. Nützlich für eine präzise Zielgruppenauswahl von Mitgliedern, wenn die anderen Kriterien nicht ausreichen.
          _it: Lista di ID di abbonamento separati da una virgola. Utile per una cibazione precisa dei soci, quando gli altri criteri non sono sufficienti.
          _nl: Lijst van lidmaatschap-ID's gescheiden door een komma. Handig voor nauwkeurig targeten van leden, wanneer de andere criteria niet voldoende zijn.
        membership_scope:
          _en: Determines which membership to consider when filtering members.
          _fr: Détermine quel abonnement considérer lors du filtrage des membres.
          _de: Bestimmt, welches Abonnement beim Filtern der Mitglieder berücksichtigt wird.
          _it: Determina quale abbonamento considerare durante il filtraggio dei soci.
          _nl: Bepaalt welk lidmaatschap in aanmerking wordt genomen bij het filteren van leden.
        renewal_state:
          _en: Differentiates active members by the renewal status of their current or future membership.
          _fr: Permet de différencier les membres actifs par l'état de renouvellement de leur abonnement actuel ou future.
          _de: Unterscheidet aktive Mitglieder nach dem Erneuerungsstatus ihres aktuellen oder zukünftigen Abonnements.
          _it: Permette di differenziare i soci attivi in base allo stato di rinnovo dell'abbonamento attuale o futuro.
          _nl: Onderscheidt actieve leden op basis van de vernieuwingsstatus van hun huidige of toekomstige lidmaatschap.
      organization:
        absence_extra_text:
          _en: This optional text is inserted before the explanation text that is generated by default on the form for announcing absence available on the member's account.
          _fr: Ce texte optionnel est inséré avant le texte d'explication généré par défaut sur le formulaire d'annonce d'absence disponible sur le compte du membre.
          _de: Dieser optionale Text wird vor dem Standardtext eingefügt, der auf dem Formular für die Ankündigung der Abwesenheit auf dem Mitgliedskonto generiert wird.
          _it: Questo testo opzionale viene inserito prima del testo di spiegazione generato di default sul form per l'annuncio di assenza disponibile sul conto del socio.
          _nl: Deze optionele tekst wordt ingevoegd voor de uitlegtekst die standaard wordt gegenereerd op het formulier voor het melden van afwezigheid beschikbaar op het ledenaccount.
        absence_extra_text_only:
          _en: Removes the explanation text generated by default on the member's account and displays only the additional explanations.
          _fr: Enlève le texte d'explication généré par défaut sur le compte du membre et affiche uniquement les explications supplémentaires.
          _de: Entfernt den standardmäßig im Mitgliedskonto generierten Erklärungstext und zeigt nur die zusätzlichen Erklärungen an.
          _it: Rimuove il testo di spiegazione generato di default sull'account del socio e visualizza solo le spiegazioni supplementari.
          _nl: Verwijdert de uitlegtekst die standaard wordt gegenereerd op het ledenaccount en toont alleen de aanvullende uitleg.
        absence_notice_period_in_days:
          _en: Members can report an absence until midnight, X days before the delivery date (e.g., 3 days = Sunday midnight for a Wednesday delivery).
          _fr: 'Les membres peuvent annoncer une absence jusqu''à minuit, X jours avant la date de livraison (ex: 3 jours = dimanche minuit pour une livraison mercredi).'
          _de: Mitglieder können eine Abwesenheit bis Mitternacht melden, X Tage vor dem Lieferdatum (z.B. 3 Tage = Sonntag Mitternacht für eine Mittwochslieferung).
          _it: 'I soci possono annunciare un''assenza fino a mezzanotte, X giorni prima della data di consegna (es: 3 giorni = domenica mezzanotte per una consegna di mercoledì).'
          _nl: Leden kunnen een afwezigheid melden tot middernacht, X dagen voor de leveringsdatum (bijv. 3 dagen = zondag middernacht voor een levering op woensdag).
        absences_billed/bag:
          _en: If enabled, bags are billed even when the member is absent. If disabled, absences are deducted from the membership price.
          _fr: Si activé, les sacs sont facturés même lorsque le membre est absent. Si désactivé, les absences sont déduites du prix de l'abonnement.
          _de: Wenn aktiviert, werden Taschen auch bei Abwesenheit des Mitglieds in Rechnung gestellt. Wenn deaktiviert, werden Abwesenheiten vom Abonnementpreis abgezogen.
          _it: Se attivato, le borse vengono fatturate anche quando il socio è assente. Se disattivato, le assenze vengono detratte dal prezzo dell'abbonamento.
          _nl: Indien ingeschakeld, worden tassen gefactureerd zelfs wanneer het lid afwezig is. Indien uitgeschakeld, worden afwezigheden afgetrokken van de lidmaatschapsprijs.
        absences_billed/basket:
          _en: If enabled, baskets are billed even when the member is absent. If disabled, absences are deducted from the membership price.
          _fr: Si activé, les paniers sont facturés même lorsque le membre est absent. Si désactivé, les absences sont déduites du prix de l'abonnement.
          _de: Wenn aktiviert, werden Körbe auch bei Abwesenheit des Mitglieds in Rechnung gestellt. Wenn deaktiviert, werden Abwesenheiten vom Abonnementpreis abgezogen.
          _it: Se attivato, le ceste vengono fatturate anche quando il socio è assente. Se disattivato, le assenze vengono detratte dal prezzo dell'abbonamento.
          _nl: Indien ingeschakeld, worden manden gefactureerd zelfs wanneer het lid afwezig is. Indien uitgeschakeld, worden afwezigheden afgetrokken van de lidmaatschapsprijs.
        absences_billed/cone:
          _en: If enabled, cones are billed even when the member is absent. If disabled, absences are deducted from the membership price.
          _fr: Si activé, les cornets sont facturés même lorsque le membre est absent. Si désactivé, les absences sont déduites du prix de l'abonnement.
          _de: Wenn aktiviert, werden Tüten auch bei Abwesenheit des Mitglieds in Rechnung gestellt. Wenn deaktiviert, werden Abwesenheiten vom Abonnementpreis abgezogen.
          _it: Se attivato, i coni vengono fatturati anche quando il socio è assente. Se disattivato, le assenze vengono detratte dal prezzo dell'abbonamento.
          _nl: Indien ingeschakeld, worden zakken gefactureerd zelfs wanneer het lid afwezig is. Indien uitgeschakeld, worden afwezigheden afgetrokken van de lidmaatschapsprijs.
        absences_billed/package:
          _en: If enabled, packages are billed even when the member is absent. If disabled, absences are deducted from the membership price.
          _fr: Si activé, les colis sont facturés même lorsque le membre est absent. Si désactivé, les absences sont déduites du prix de l'abonnement.
          _de: Wenn aktiviert, werden Pakete auch bei Abwesenheit des Mitglieds in Rechnung gestellt. Wenn deaktiviert, werden Abwesenheiten vom Abonnementpreis abgezogen.
          _it: Se attivato, i pacchi vengono fatturati anche quando il socio è assente. Se disattivato, le assenze vengono detratte dal prezzo dell'abbonamento.
          _nl: Indien ingeschakeld, worden pakketten gefactureerd zelfs wanneer het lid afwezig is. Indien uitgeschakeld, worden afwezigheden afgetrokken van de lidmaatschapsprijs.
        absences_billed/share:
          _en: If enabled, shares are billed even when the member is absent. If disabled, absences are deducted from the membership price.
          _fr: Si activé, les parts sont facturés même lorsque le membre est absent. Si désactivé, les absences sont déduites du prix de l'abonnement.
          _de: Wenn aktiviert, werden Anteile auch bei Abwesenheit des Mitglieds in Rechnung gestellt. Wenn deaktiviert, werden Abwesenheiten vom Abonnementpreis abgezogen.
          _it: Se attivato, le parti vengono fatturate anche quando il socio è assente. Se disattivato, le assenze vengono detratte dal prezzo dell'abbonamento.
          _nl: Indien ingeschakeld, worden delen gefactureerd zelfs wanneer het lid afwezig is. Indien uitgeschakeld, worden afwezigheden afgetrokken van de lidmaatschapsprijs.
        absences_included_reminder_weeks_before_html:
          _en: Number of weeks before the first unused provisional absence when the <a href='/mail_templates/absence_included_reminder'>reminder email</a> is sent to the member.
          _fr: Nombre de semaines avant la première absence provisoire non utilisée lorsque <a href='/mail_templates/absence_included_reminder'>l'email de rappel</a> est envoyé au membre.
          _de: Anzahl der Wochen vor der ersten ungenutzten vorläufigen Abwesenheit, wenn die <a href='/mail_templates/absence_included_reminder'>Erinnerungs-E-Mail</a> an das Mitglied gesendet wird.
          _it: Numero di settimane prima della prima assenza provvisoria non utilizzata quando <a href='/mail_templates/absence_included_reminder'>l'email di promemoria</a> viene inviata al socio.
          _nl: Aantal weken voor de eerste ongebruikte voorlopige afwezigheid wanneer de <a href='/mail_templates/absence_included_reminder'>herinneringsmail</a> naar het lid wordt gestuurd.
        activity_availability_limit_in_days:
          _en: Members can register until midnight, X days before the activity date (e.g., 3 days = Sunday midnight for a Wednesday activity). Leave at zero if there is no limit.
          _fr: 'Les membres peuvent s''inscrire jusqu''à minuit, X jours avant la date de l''activité (ex: 3 jours = dimanche minuit pour une activité mercredi). Laisser à zéro si aucune limite.'
          _de: Mitglieder können sich bis Mitternacht anmelden, X Tage vor dem Aktivitätsdatum (z.B. 3 Tage = Sonntag Mitternacht für eine Mittwochsaktivität). Auf 0 belassen, wenn kein Grenzwert.
          _it: 'I soci possono iscriversi fino a mezzanotte, X giorni prima della data dell''attività (es: 3 giorni = domenica mezzanotte per un''attività di mercoledì). Lasciare a zero se non ci sono limiti.'
          _nl: Leden kunnen zich registreren tot middernacht, X dagen voor de activiteitsdatum (bijv. 3 dagen = zondag middernacht voor een activiteit op woensdag). Laat op nul staan als er geen limiet is.
        activity_i18n_scope_html:
          _en: Please <a href="/handbook/activity">consult the manual</a> for more information about each designation.
          _fr: Merci de <a href="/handbook/activity">consulter le manuel</a> pour plus d'informations sur chaque appellation.
          _de: Bitte <a href="/handbook/activity">konsultieren Sie das Handbuch</a> für weitere Informationen zu jeder Bezeichnung.
          _it: Si prega di <a href="/handbook/activity">consultare il manuale</a> per ulteriori informazioni su ciascuna denominazione.
          _nl: Raadpleeg <a href="/handbook/activity">de handleiding</a> voor meer informatie over elke benaming.
        activity_participation_deletion_deadline_in_days:
          _en: Leave blank if no deadline is desired, in any case, deregistration is possible within the first 24 hours.
          _fr: Laisser vide si aucun délai, dans tous les cas la désinscription est possible pendant les premières 24h.
          _de: Leer lassen wenn keinen Frist gewünscht ist, eine Abmeldung während der ersten 24h ist in jedem Fall möglich.
          _it: Lasciare vuoto se non vuoi una scadenza, in ogni caso la disiscrizione è possibile nelle prime 24h.
          _nl: Laat leeg als geen deadline gewenst is, in elk geval is afmelding mogelijk binnen de eerste 24 uur.
        activity_participations_demanded_annually_form_detail:
          _en: Text displayed in the registration/renewal form if the min/max number of participations can be changed by the member. Leave blank for the default text.
          _fr: Texte affiché dans le formulaire d'inscription/renouvellement si le nombre min/max de participation peut être modifié par le membre. Laisser blanc pour le texte par défaut.
          _de: Text, der im Anmelde-/Verlängerungsformular angezeigt wird, wenn die Min/Max Anzahl der Teilnahmen vom Mitglied geändert werden kann. Leer lassen für den Standardtext.
          _it: Testo visualizzato nel modulo di registrazione/rinnovo se il numero min/max di partecipazioni può essere modificato dal socio. Lasciare vuoto per il testo predefinito.
          _nl: Tekst weergegeven in het registratie-/vernieuwingsformulier als het min/max aantal deelnames door het lid kan worden gewijzigd. Laat leeg voor de standaardtekst.
        activity_participations_demanded_logic_html:
          _en: 'Logic using <a href=''https://shopify.github.io/liquid/'' target=''_blank''>the Liquid syntax</a> to calculate the number of participations required for a membership.</br>The following variables are available:</br>– <b>member.salary_basket</b>: Member with salary basket</br>– <b>full_year_max_deliveries</b>: Maximum number of deliveries for a whole year, regardless of the cycle</br>– <b>membership.full_year_deliveries</b>: Number of deliveries for a whole year (membership)</br>– <b>membership.baskets</b>: Number of baskets of the membership</br>– <b>membership.depot_id</b>: Depot ID of the membership</br>– <b>membership.depot_group_id</b>: Depot group ID of the membership</br>– <b>member.full_year_activity_participations</b>: Number of participations required for the membership for a whole year'
          _fr: 'Logique utilisant <a href=''https://shopify.github.io/liquid/'' target=''_blank''>la syntaxe Liquid</a> qui permet de calculer le nombre de participations demandées pour un abonnement.</br>Les variables suivantes sont disponibles:</br>– <b>member.salary_basket</b>: Membre avec panier-salaire</br>– <b>full_year_max_deliveries</b>: Nombre maximum de livraisons pour une année complète tout cycles confondus</br>– <b>membership.full_year_deliveries</b>: Nombre de livraisons pour une année complète (abonnement)</br>– <b>membership.baskets</b>: Nombre de paniers de l''abonnement</br>– <b>membership.depot_id</b>: ID du dépôt de l''abonnement</br>– <b>membership.depot_group_id</b>: ID du groupe de dépôt de l''abonnement</br>– <b>member.full_year_activity_participations</b>: Nombre de participations demandées de l''abonnement pour une année complète'
          _de: 'Logik, die <a href=''https://shopify.github.io/liquid/'' target=''_blank''>die Liquid-Syntax</a> verwendet, um die Anzahl der Teilnahmen für ein Abonnement zu berechnen.</br>Die folgenden Variablen stehen zur Verfügung:</br>– <b>member.salary_basket</b>: Mitglied mit Lohntasche</br>– <b>full_year_max_deliveries</b>: Maximale Anzahl von Lieferungen für ein ganzes Jahr, unabhängig vom Zyklus</br>– <b>membership.full_year_deliveries</b>: Anzahl der Lieferungen für ein ganzes Jahr (Abonnement)</br>– <b>membership.baskets</b>: Anzahl der Taschen des Abonnements</br>– <b>membership.depot_id</b>: Depot-ID des Abonnements</br>– <b>membership.depot_group_id</b>: Depotgruppen-ID des Abonnements</br>– <b>member.full_year_activity_participations</b>: Anzahl der Teilnahmen des Abonnements für ein ganzes Jahr'
          _it: 'Logica che utilizza <a href=''https://shopify.github.io/liquid/'' target=''_blank''>la sintassi Liquid</a> per calcolare il numero di partecipazioni richieste per un abbonamento.</br>Le seguenti variabili sono disponibili:</br>– <b>member.salary_basket</b>: Socio con cesto salariale</br>– <b>full_year_max_deliveries</b>: Numero massimo di consegne per un anno completo, indipendentemente dal ciclo</br>– <b>membership.full_year_deliveries</b>: Numero di consegne per un anno completo (abbonamento)</br>– <b>membership.baskets</b>: Numero di cesti dell''abbonamento</br>– <b>membership.depot_id</b>: ID del deposito dell''abbonamento</br>– <b>membership.depot_group_id</b>: ID del gruppo di deposito dell''abbonamento</br>– <b>member.full_year_activity_participations</b>: Numero di partecipazioni richieste dell''abbonamento per un anno completo'
          _nl: 'Logica die <a href=''https://shopify.github.io/liquid/'' target=''_blank''>de Liquid-syntaxis</a> gebruikt om het aantal vereiste deelnames voor een lidmaatschap te berekenen.</br>De volgende variabelen zijn beschikbaar:</br>– <b>member.salary_basket</b>: Lid met salarispakket</br>– <b>full_year_max_deliveries</b>: Maximum aantal leveringen voor een heel jaar, ongeacht de cyclus</br>– <b>membership.full_year_deliveries</b>: Aantal leveringen voor een heel jaar (lidmaatschap)</br>– <b>membership.baskets</b>: Aantal pakketten van het lidmaatschap</br>– <b>membership.depot_id</b>: Depot-ID van het lidmaatschap</br>– <b>membership.depot_group_id</b>: Depotgroep-ID van het lidmaatschap</br>– <b>member.full_year_activity_participations</b>: Aantal vereiste deelnames van het lidmaatschap voor een heel jaar'
        activity_participations_form_max:
          _en: Leave blank if the member cannot increase the number of participations via the registration/renewal form.
          _fr: Laissez blanc si le membre ne peux pas augmenter le nombre de participation via le formulaire d'inscription/renouvellement.
          _de: Leer lassen, wenn das Mitglied die Anzahl der Teilnahmen nicht über das Anmelde-/Verlängerungsformular erhöhen kann.
          _it: Lasciare vuoto se il socio non può aumentare il numero di partecipazioni tramite il modulo di registrazione/rinnovo.
          _nl: Laat leeg als het lid het aantal deelnames niet kan verhogen via het registratie-/vernieuwingsformulier.
        activity_participations_form_min:
          _en: Leave blank if the member cannot reduce the number of participations via the registration/renewal form.
          _fr: Laissez blanc si le membre ne peux pas réduire le nombre de participation via le formulaire d'inscription/renouvellement.
          _de: Leer lassen, wenn das Mitglied die Anzahl der Teilnahmen nicht über das Anmelde-/Verlängerungsformular reduzieren kann.
          _it: Lasciare vuoto se il socio non può ridurre il numero di partecipazioni tramite il modulo di registrazione/rinnovo.
          _nl: Laat leeg als het lid het aantal deelnames niet kan verlagen via het registratie-/vernieuwingsformulier.
        activity_participations_form_step:
          _en: If the member can modify the number of participations via the registration/renewal form, this parameter allows you to define the step of the selection. For example, if the step is 2, the member will be able to choose 0, 2, 4, 6, etc. Please make sure that the min and max are multiples of this step.
          _fr: Si le membre peut modifier le nombre de participations via le formulaire d'inscription/renouvellement, ce paramètre permet de définir le pas de la sélection. Par exemple, si le pas est de 2, le membre pourra choisir 0 ,2, 4, 6, etc. Merci de veiller à ce que le min et le max soient des multiples de ce pas.
          _de: Wenn das Mitglied die Anzahl der Teilnahmen über das Anmelde-/Verlängerungsformular ändern kann, ermöglicht dieser Parameter die Definition des Schritts der Auswahl. Wenn der Schritt beispielsweise 2 beträgt, kann das Mitglied 0, 2, 4, 6 usw. wählen. Bitte stellen Sie sicher, dass min und max Vielfache dieses Schritts sind.
          _it: Se il socio può modificare il numero di partecipazioni tramite il modulo di registrazione/rinnovo, questo parametro ti permette di definire il passo della selezione. Ad esempio, se il passo è 2, il socio potrà scegliere 0, 2, 4, 6, ecc. Assicurati che il min e il max siano multipli di questo passo.
          _nl: Als het lid het aantal deelnames kan wijzigen via het registratie-/vernieuwingsformulier, stelt deze parameter u in staat de stap van de selectie te definiëren. Bijvoorbeeld, als de stap 2 is, kan het lid 0, 2, 4, 6, enz. kiezen. Zorg ervoor dat het minimum en maximum veelvouden van deze stap zijn.
        activity_phone_html:
          _en: Number displayed in <a href="/mail_templates?scope=activity">the activity email templates</a>.
          _fr: Numéro affiché dans <a href="/mail_templates?scope=activity">les templates email des activités</a>.
          _de: Nummer, die in <a href="/mail_templates?scope=activity">den E-Mail-Vorlagen der Aktivitäten</a> angezeigt wird.
          _it: Numero visualizzato in <a href="/mail_templates?scope=activity">i template email delle attività</a>.
          _nl: Nummer weergegeven in <a href="/mail_templates?scope=activity">de activiteit e-mailsjablonen</a>.
        activity_price:
          _en: Leave at zero if missing or excess participations are not billed.
          _fr: Laisser à zéro si les participations manquantes ou excédentaires ne sont pas facturées.
          _de: Lassen Sie es auf Null, wenn fehlende oder überschüssige Teilnahmen nicht in Rechnung gestellt werden.
          _it: Lasciare a zero se le partecipazioni mancanti o eccedenti non vengono fatturate.
          _nl: Laat op nul als ontbrekende of overtollige deelnames niet worden gefactureerd.
        allow_alternative_depots:
          _en: Allows you to choose one or more alternative depots during registration. Useful if the first choice is already full.
          _fr: Permet de choisir un ou plusieurs dépôts alternatifs lors de l'inscription. Utile si le premier choix est déjà complet.
          _de: Ermöglicht es Ihnen, bei der Registrierung eine oder mehrere alternative Depots zu wählen. Nützlich, wenn die erste Auswahl bereits voll ist.
          _it: Permette di scegliere uno più luoghi di deposito alternativi durante la registrazione. Utile se la prima scelta è giâ completa.
          _nl: Stelt u in staat een of meer alternatieve depots te kiezen tijdens registratie. Handig als de eerste keuze al vol is.
        annual_fee:
          _en: Leave blank at zero if no annual fee. Any change will be automatically applied to all existing members, but only to those who have exactly the previous amount.
          _fr: Laisser vide si aucune cotisation annuelle. Tout changement sera automatiquement appliqué aux membres existants, mais uniquement à ceux qui ont exactement le montant précédent.
          _de: Leer lassen, wenn kein Jahresbeitrag anfällt. Änderungen werden automatisch auf alle bestehenden Mitglieder angewendet, jedoch nur auf diejenigen, die genau den vorherigen Betrag haben.
          _it: Lasciare vuoto se non c'è nessuna quota annuale. Eventuali modifiche saranno applicate automaticamente a tutti i soci esistenti, ma solo a quelli che hanno esattamente l'importo precedente.
          _nl: Laat leeg op nul als er geen jaarlijkse bijdrage is. Elke wijziging wordt automatisch toegepast op alle bestaande leden, maar alleen op degenen die precies het vorige bedrag hebben.
        annual_fee_member_form/bag:
          _en: Allow supporting members to choose the amount of their annual fee at registration. Active members (choosing a bag size) cannot modify this amount.
          _fr: Permet aux membres de soutien de choisir le montant de leur cotisation annuelle lors de l'inscription. Les membres actifs (choisissant une taille sac) ne peuvent pas modifier ce montant.
          _de: Ermöglicht Fördermitgliedern, den Betrag ihres Jahresbeitrags bei der Anmeldung selbst festzulegen. Aktive Mitglieder (die eine Taschengrösse wählen) können diesen Betrag nicht ändern.
          _it: Consente ai soci sostenitori di scegliere l'importo della loro quota annuale all'iscrizione. I soci attivi (che scelgono una dimensione della borsa) non possono modificare questo importo.
          _nl: Stelt ondersteunende leden in staat het bedrag van hun jaarlijkse bijdrage bij registratie te kiezen. Actieve leden (die een tasgrootte kiezen) kunnen dit bedrag niet wijzigen.
