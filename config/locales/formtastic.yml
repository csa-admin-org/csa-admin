      baskets_basket_complement:
        price:
          _en: Leave blank for the default price.
          _fr: Laisser blanc pour le prix par défaut.
          _de: Leer lassen für den Standardpreis.
          _it: Lasciare vuoto per il prezzo standard.
          _nl: Laat leeg voor de standaardprijs.
      bidding_round:
        information_text:
          _en: Information text displayed in the member account when pledging for the bidding round. It's also included in the email sent to the member by default.
          _fr: Texte d'information affiché dans le compte membre lors de la participation à un tour d'engagement. Il est également inclus par défaut dans l'email envoyé au membre.
          _de: Informationstext, der im Mitgliedskonto angezeigt wird, wenn für eine Beitragsrunde zugesagt wird. Er ist standardmäßig auch in der an das Mitglied gesendeten E-Mail enthalten.
          _it: Testo informativo visualizzato nell'account del socio durante la partecipazione a un turno di impegno. Per impostazione predefinita è incluso anche nell'email inviata al socio.
          _nl: Informatietekst die wordt weergegeven in het ledenaccount bij het doen van een bod voor de biedronde. Het wordt ook standaard opgenomen in de e-mail die naar het lid wordt gestuurd.
      delivery:
        basket_complements:
          _en: All memberships that have subscribed to these supplements and include this/these new date(s) will be automatically updated.
          _fr: Tous les abonnements qui ont souscrit à ces compléments et qui incluent cette/ces nouvelle(s) date(s) seront mis à jour automatiquement.
          _de: Alle Abonnements, die diese Zusätze abonniert haben und diese/n neue/n Datum/Daten beinhalten, werden automatisch aktualisiert.
          _it: Tutti gli abbonamenti che hanno sottoscritto questi supplementi e che includono questa/data nuova saranno automaticamente aggiornati.
          _nl: Alle lidmaatschappen die deze aanvullingen hebben geabonneerd en deze nieuwe datum(s) bevatten, worden automatisch bijgewerkt.
        basket_size_price_percentage/bag:
          _en: Adjusts the bag size price for bags on this delivery. E.g., set 50% to halve the price (useful for smaller bags in winter).
          _fr: Ajuste le prix de la taille du sac pour les sacs de cette livraison. Par exemple, définissez 50% pour réduire le prix de moitié (utile pour des sacs plus petits en hiver).
          _de: Passt den Preis der Taschengrösse für die Taschen dieser Lieferung an. Z.B. 50% setzen, um den Preis zu halbieren (nützlich für kleinere Taschen im Winter).
          _it: Regola il prezzo della dimensione della borsa per le borse di questa consegna. Ad esempio, imposta 50% per dimezzare il prezzo (utile per borse più piccole in inverno).
          _nl: Past de prijs van de tasgrootte aan voor de tassen van deze levering. Bijv. stel 50% in om de prijs te halveren (handig voor kleinere tassen in de winter).
        basket_size_price_percentage/basket:
          _en: Adjusts the basket size price for baskets on this delivery. E.g., set 50% to halve the price (useful for smaller baskets in winter).
          _fr: Ajuste le prix de la taille du panier pour les paniers de cette livraison. Par exemple, définissez 50% pour réduire le prix de moitié (utile pour des paniers plus petits en hiver).
          _de: Passt den Preis der Korbgrösse für die Körbe dieser Lieferung an. Z.B. 50% setzen, um den Preis zu halbieren (nützlich für kleinere Körbe im Winter).
          _it: Regola il prezzo della dimensione della cesta per le ceste di questa consegna. Ad esempio, imposta 50% per dimezzare il prezzo (utile per ceste più piccole in inverno).
          _nl: Past de prijs van de mandgrootte aan voor de manden van deze levering. Bijv. stel 50% in om de prijs te halveren (handig voor kleinere manden in de winter).
        basket_size_price_percentage/cone:
          _en: Adjusts the cone size price for cones on this delivery. E.g., set 50% to halve the price (useful for smaller cones in winter).
          _fr: Ajuste le prix de la taille du cornet pour les cornets de cette livraison. Par exemple, définissez 50% pour réduire le prix de moitié (utile pour des cornets plus petits en hiver).
          _de: Passt den Preis der Tütengrösse für die Tüten dieser Lieferung an. Z.B. 50% setzen, um den Preis zu halbieren (nützlich für kleinere Tüten im Winter).
          _it: Regola il prezzo della dimensione del cono per i coni di questa consegna. Ad esempio, imposta 50% per dimezzare il prezzo (utile per coni più piccoli in inverno).
          _nl: Past de prijs van de zakgrootte aan voor de zakken van deze levering. Bijv. stel 50% in om de prijs te halveren (handig voor kleinere zakken in de winter).
        basket_size_price_percentage/package:
          _en: Adjusts the package size price for packages on this delivery. E.g., set 50% to halve the price (useful for smaller packages in winter).
          _fr: Ajuste le prix de la taille du colis pour les colis de cette livraison. Par exemple, définissez 50% pour réduire le prix de moitié (utile pour des colis plus petits en hiver).
          _de: Passt den Preis der Paketgrösse für die Pakete dieser Lieferung an. Z.B. 50% setzen, um den Preis zu halbieren (nützlich für kleinere Pakete im Winter).
          _it: Regola il prezzo della dimensione del pacco per i pacchi di questa consegna. Ad esempio, imposta 50% per dimezzare il prezzo (utile per pacchi più piccoli in inverno).
          _nl: Past de prijs van de pakketgrootte aan voor de pakketten van deze levering. Bijv. stel 50% in om de prijs te halveren (handig voor kleinere pakketten in de winter).
        basket_size_price_percentage/share:
          _en: Adjusts the share size price for shares on this delivery. E.g., set 50% to halve the price (useful for smaller shares in winter).
          _fr: Ajuste le prix de la taille de la part pour les parts de cette livraison. Par exemple, définissez 50% pour réduire le prix de moitié (utile pour des parts plus petits en hiver).
          _de: Passt den Preis der Anteilsgrösse für die Anteile dieser Lieferung an. Z.B. 50% setzen, um den Preis zu halbieren (nützlich für kleinere Anteile im Winter).
          _it: Regola il prezzo della dimensione della parte per le parti di questa consegna. Ad esempio, imposta 50% per dimezzare il prezzo (utile per parti più piccole in inverno).
          _nl: Past de prijs van de deelgrootte aan voor de delen van deze levering. Bijv. stel 50% in om de prijs te halveren (handig voor kleinere delen in de winter).
        date_html:
          _en: In case of change, all affected memberships, based on their start and end dates as well as their delivery cycle, will be automatically updated. <b>Attention, <a href='/handbook/billing#price-change'>the billing of these memberships may be affected.</a></b>
          _fr: En cas de changement, tous les abonnements concernés, en fonction de leurs dates de début et de fin ainsi que leur cycle de livraisons, seront automatiquement mis à jour. <b>Attention, <a href='/handbook/billing#price-change'>la facturation de ces abonnements peut-être affectée.</a></b>
          _de: Im Falle einer Änderung werden alle betroffenen Abonnements, basierend auf ihrem Anfangs- und Enddatum sowie ihrem Lieferungszyklus, automatisch aktualisiert. <b>Achtung, <a href='/handbook/billing#price-change'>die Rechnung für diese Abonnements kann beeinflusst werden.</a></b>
          _it: In caso di modifica, tutti gli abbonamenti interessati, secondo le loro date di inizio e fine e il loro ciclo di consegna, saranno automaticamente aggiornati. <b>Attenzione, <a href='/handbook/billing#price-change'>la fatturazione di questi abbonamenti potrebbe essere influenzata.</a></b>
          _nl: Bij wijziging worden alle getroffen lidmaatschappen, gebaseerd op hun begin- en einddata evenals hun leveringscyclus, automatisch bijgewerkt. <b>Let op, <a href='/handbook/billing#price-change'>de facturering van deze lidmaatschappen kan worden beïnvloed.</a></b>
        depots/bag:
          _en: The bags in these depots will be automatically deleted or created in case of change.
          _fr: Les sacs des dépôts seront automatiquement effacés ou créés en cas de changement.
          _de: Die Taschen in diese Depots werden bei einer Änderung automatisch gelöscht oder angelegt.
          _it: Le borse in questi punti di ritiro vengono automaticamente cancellate o create in caso di modifica.
          _nl: De tassen in deze depots worden automatisch verwijderd of aangemaakt bij wijziging.
        depots/basket:
          _en: The baskets in these depots will be automatically deleted or created in case of change.
          _fr: Les paniers des dépôts seront automatiquement effacés ou créés en cas de changement.
          _de: Die Körbe in diese Depots werden bei einer Änderung automatisch gelöscht oder angelegt.
          _it: Le ceste in questi punti di ritiro vengono automaticamente cancellate o create in caso di modifica.
          _nl: De manden in deze depots worden automatisch verwijderd of aangemaakt bij wijziging.
        depots/cone:
          _en: The cones in these depots will be automatically deleted or created in case of change.
          _fr: Les cornets des dépôts seront automatiquement effacés ou créés en cas de changement.
          _de: Die Tüten in diese Depots werden bei einer Änderung automatisch gelöscht oder angelegt.
          _it: Le coni in questi punti di ritiro vengono automaticamente cancellate o create in caso di modifica.
          _nl: De zakken in deze depots worden automatisch verwijderd of aangemaakt bij wijziging.
        depots/package:
          _en: The packages in these depots will be automatically deleted or created in case of change.
          _fr: Les colis des dépôts seront automatiquement effacés ou créés en cas de changement.
          _de: Die Pakete in diese Depots werden bei einer Änderung automatisch gelöscht oder angelegt.
          _it: Le pacchi in questi punti di ritiro vengono automaticamente cancellate o create in caso di modifica.
          _nl: De pakketten in deze depots worden automatisch verwijderd of aangemaakt bij wijziging.
        depots/share:
          _en: The shares in these depots will be automatically deleted or created in case of change.
          _fr: Les parts des dépôts seront automatiquement effacés ou créés en cas de changement.
          _de: Die Anteile in diese Depots werden bei einer Änderung automatisch gelöscht oder angelegt.
          _it: Le parti in questi punti di ritiro vengono automaticamente cancellate o create in caso di modifica.
          _nl: De delen in deze depots worden automatisch verwijderd of aangemaakt bij wijziging.
        note:
          _en: Information displayed on the administration dashboard and the summary page but not on the member page.
          _fr: Information affichée sur le tableau de bord d'administration et la fiche de récapitulatif et non sur la page de membre.
          _de: Information, die auf dem Administrations-Dashboard und der Zusammenfassungsseite angezeigt wird, aber nicht auf der Mitgliederseite.
          _it: Informazioni visualizzate sulla dashboard di amministrazione e sulla pagina di riepilogo e non sulla pagina del socio.
          _nl: Informatie weergegeven op het administratiedashboard en de samenvattingspagina maar niet op de ledenpagina.
        shop_open:
          _en: Controls whether members can place farm shop orders for this delivery or not.
          _fr: Permet de contrôler si les membres peuvent passer des commandes d'épicerie pour cette livraison ou non.
          _de: Steuert, ob Mitglieder für diese Lieferung Bestellungen vom Hofladen aufgeben können oder nicht.
          _it: Controlla se i soci possono fare ordini di alimentari per questa consegna o no.
          _nl: Bepaalt of leden winkelbestellingen kunnen plaatsen voor deze levering of niet.
      delivery_cycle:
        absences_included_annually:
          _en: Allows you to automatically exclude a certain number of deliveries, enabling members to plan a limited number of non-billed absences.
          _fr: Permet d'exclure automatiquement un certain nombre de livraisons, laissant aux membres la planification d'un nombre limité d'absences non-facturées.
          _de: Ermöglicht es Ihnen, eine bestimmte Anzahl von Lieferungen automatisch auszuschließen, wodurch den Mitgliedern die Planung einer begrenzten Anzahl von nicht in Rechnung gestellten Abwesenheiten ermöglicht wird.
          _it: Consente di escludere automaticamente un certo numero di consegne, consentendo ai soci di pianificare un numero limitato di assenze non fatturate.
          _nl: Stelt u in staat om automatisch een bepaald aantal leveringen uit te sluiten, waardoor leden een beperkt aantal niet-gefactureerde afwezigheden kunnen plannen.
        depots:
          _en: Select the depots where this delivery cycle is available at registration.
          _fr: Sélectionnez les dépôts pour lesquels ce cycle de livraisons est disponible à l'inscription.
          _de: Wählen Sie die Depots aus, für die dieser Lieferzyklus bei der Anmeldung verfügbar ist.
          _it: Seleziona i punti di ritiro per i quali questo ciclo di consegna è disponibile al momento della registrazione.
          _nl: Selecteer de depots waarvoor deze leveringscyclus beschikbaar is bij registratie.
        exclude_cweek_range:
          _en: Exclude deliveries within the week range instead of outside.
          _fr: Exclure les livraisons à l'intérieur de la plage de semaines plutôt qu'à l'extérieur.
          _de: Lieferungen innerhalb des Wochenbereichs ausschließen statt außerhalb.
          _it: Escludere le consegne all'interno dell'intervallo di settimane anziché all'esterno.
          _nl: Leveringen binnen het weekbereik uitsluiten in plaats van erbuiten.
        first_cweek:
          cross_year:
            _en: Week number based on the year at the start of the fiscal year.
            _fr: Numéro de semaine basé sur l'année du début de l'année fiscale.
            _de: Wochennummer basierend auf dem Jahr zu Beginn des Geschäftsjahres.
            _it: Numero di settimana basato sull'anno all'inizio dell'anno fiscale.
            _nl: Weeknummer gebaseerd op het jaar aan het begin van het boekjaar.
          standard:
            _en: Week number of the first delivery.
            _fr: Numéro de semaine de la première livraison.
            _de: Wochennummer der ersten Lieferung.
            _it: Numero di settimana della prima consegna.
            _nl: Weeknummer van de eerste levering.
        form_detail:
          _en: Leave blank for the default text.
          _fr: Laisser blanc pour le texte par défaut.
          _de: Leer lassen für den Standardtext.
          _it: Lasciare vuoto per il testo predefinito.
          _nl: Laat leeg voor de standaardtekst.
        invoice_name:
          _en: If present, replaces the name displayed in the invoice.
          _fr: Si présent, remplace le nom affiché dans la facture.
          _de: Wenn vorhanden, ersetzt den Namen auf der Rechnung.
          _it: Se presente, sostituisce il nome visualizzato nella fattura.
          _nl: Indien aanwezig, vervangt de naam die wordt weergegeven op de factuur.
        last_cweek:
          cross_year:
            _en: Week number based on the year at the end of the fiscal year.
            _fr: Numéro de semaine basé sur l'année de la fin de l'année fiscale.
            _de: Wochennummer basierend auf dem Jahr am Ende des Geschäftsjahres.
            _it: Numero di settimana basato sull'anno alla fine dell'anno fiscale.
            _nl: Weeknummer gebaseerd op het jaar aan het einde van het boekjaar.
          standard:
            _en: Week number of the last delivery.
            _fr: Numéro de semaine de la dernière livraison.
            _de: Wochennummer der letzten Lieferung.
            _it: Numero di settimana dell'ultima consegna.
            _nl: Weeknummer van de laatste levering.
        periods_intro:
          _en: Periods divide the fiscal year into segments with their own filtering rules. Each period applies to a range of months and can have its own delivery selection criteria.
          _fr: Les périodes divisent l'année fiscale en segments avec leurs propres règles de filtrage. Chaque période s'applique à une plage de mois et peut avoir ses propres critères de sélection des livraisons.
          _de: Zeiträume unterteilen das Geschäftsjahr in Segmente mit eigenen Filterregeln. Jeder Zeitraum gilt für einen Bereich von Monaten und kann eigene Kriterien für die Lieferungsauswahl haben.
          _it: I periodi dividono l'anno fiscale in segmenti con le proprie regole di filtraggio. Ogni periodo si applica a un intervallo di mesi e può avere i propri criteri di selezione delle consegne.
          _nl: Periodes verdelen het boekjaar in segmenten met hun eigen filterregels. Elke periode is van toepassing op een reeks maanden en kan eigen leveringsselectiecriteria hebben.
        price:
          _en: Supplement for the management and/or delivery with this cycle.
          _fr: Supplément pour la gestion et/ou la livraison avec ce cycle.
          _de: Zuschlag für die Verwaltung und/oder Lieferung mit diesem Zyklus.
          _it: Supplemento per la gestione e/o la consegna con questo ciclo.
          _nl: Toeslag voor het beheer en/of levering met deze cyclus.
        settings_intro:
          _en: These settings define which deliveries are initially selected for this cycle (days, weeks, etc.). The periods below then apply additional filtering.
          _fr: Ces paramètres définissent quelles livraisons sont initialement sélectionnées pour ce cycle (jours, semaines, etc.). Les périodes ci-dessous appliquent ensuite un filtrage supplémentaire.
          _de: Diese Einstellungen legen fest, welche Lieferungen zunächst für diesen Zyklus ausgewählt werden (Tage, Wochen usw.). Die unten aufgeführten Zeiträume wenden dann eine zusätzliche Filterung an.
          _it: Queste impostazioni definiscono quali consegne vengono inizialmente selezionate per questo ciclo (giorni, settimane, ecc.). I periodi seguenti applicano quindi un filtraggio aggiuntivo.
          _nl: Deze instellingen bepalen welke leveringen aanvankelijk worden geselecteerd voor deze cyclus (dagen, weken, enz.). De onderstaande periodes passen vervolgens extra filtering toe.
        visible:
          _en: Will be visible in any case if only one depot is selected.
          _fr: Sera de toute façon visible si un seul dépôt est sélectionné.
          _de: Wird auf jeden Fall sichtbar sein, wenn nur eine Depot ausgewählt wurde.
          _it: Sarà comunque visibile se è selezionato un solo punto di ritiro.
          _nl: Zal in elk geval zichtbaar zijn als slechts één depot is geselecteerd.
        week_numbers:
          _en: ⚠️ Filters by even/odd week number. Prefer "Delivery selection" in periods in most cases.
          _fr: ⚠️ Filtre par numéro de semaine pair/impair. Préférez "Sélection des livraisons" dans les périodes dans la plupart des cas.
          _de: ⚠️ Filtert nach gerader/ungerader Wochennummer. In den meisten Fällen "Lieferungsauswahl" in Perioden bevorzugen.
          _it: ⚠️ Filtra per numero di settimana pari/dispari. Preferire "Selezione delle consegne" nei periodi nella maggior parte dei casi.
          _nl: ⚠️ Filtert op even/oneven weeknummer. Gebruik bij voorkeur "Leveringsselectie" in periodes in de meeste gevallen.
      delivery_cycle/period:
        fy_months_next_year:
          _en: "* next calendar year"
          _fr: "* année civile suivante"
          _de: "* nächstes Kalenderjahr"
          _it: "* anno civile successivo"
          _nl: "* volgend kalenderjaar"
        results:
          _en: Within this period's month range, determines which deliveries are kept (e.g., all, every other, first of each month).
          _fr: 'Dans la plage de mois de cette période, détermine quelles livraisons sont gardées (ex: toutes, une sur deux, première de chaque mois).'
          _de: Innerhalb des Monatsbereichs dieser Periode wird festgelegt, welche Lieferungen behalten werden (z.B. alle, jede zweite, erste jedes Monats).
          _it: Nell'intervallo di mesi di questo periodo, determina quali consegne vengono mantenute (es. tutte, una su due, prima di ogni mese).
          _nl: Binnen het maandbereik van deze periode bepaalt welke leveringen worden behouden (bijv. alle, om de andere, eerste van elke maand).
      depot:
        delivery_cycles:
          _en: Delivery cycles available to members at registration for this depot. In any case, the choice of delivery cycle is only offered to members if at least two delivery cycles are available for a depot.
          _fr: Cycles de livraisons disponibles aux membres les membres lors de l'inscription pour ce dépôt. Dans tous les cas, le choix du cycle de livraisons est proposé aux membres uniquement si au moins deux cycles de livraisons sont disponibles pour un dépôt.
          _de: Lieferzyklen, die bei der Anmeldung für Mitglieder für dieses Depot verfügbar sind. In jedem Fall wird die Auswahl des Lieferzyklus den Mitgliedern nur angeboten, wenn mindestens zwei Lieferzyklen für ein Depot verfügbar sind.
          _it: Cicli di consegna disponibili per i soci al momento della registrazione per questo punto di ritiro. In ogni caso, la scelta del ciclo di consegna viene proposta ai soci solo se sono disponibili almeno due cicli di consegna per un punto di ritiro.
          _nl: Leveringscycli beschikbaar voor leden bij registratie voor dit depot. In elk geval wordt de keuze van leveringscyclus alleen aan leden voorgesteld als er minstens twee leveringscycli beschikbaar zijn voor een depot.
        emails/bag:
          _en: Each email (separated by a comma) receives, the day before delivery, the list of members receiving a bag.
          _fr: Chaque email (séparé par une virgule) reçoit, le jour précédant la livraison, la liste des membres recevant un sac.
          _de: Jede E-Mail-Adresse (durch Komma getrennt) bekommt ein Tag vor der Lieferung eine Liste der Abonnenten, die eine Tasche bekommen.
          _it: Ogni email (separata da una virgola) riceve, il giorno precedente la consega, la lista dei soci che ritireranno una borsa.
          _nl: Elke e-mail (gescheiden door een komma) ontvangt, de dag voor de levering, de lijst van leden die een tas zullen ophalen.
        emails/basket:
          _en: Each email (separated by a comma) receives, the day before delivery, the list of members receiving a basket.
          _fr: Chaque email (séparé par une virgule) reçoit, le jour précédant la livraison, la liste des membres recevant un panier.
          _de: Jede E-Mail-Adresse (durch Komma getrennt) bekommt ein Tag vor der Lieferung eine Liste der Abonnenten, die eine Korb bekommen.
          _it: Ogni email (separata da una virgola) riceve, il giorno precedente la consega, la lista dei soci che ritireranno una cesta.
          _nl: Elke e-mail (gescheiden door een komma) ontvangt, de dag voor de levering, de lijst van leden die een mand zullen ophalen.
        emails/cone:
          _en: Each email (separated by a comma) receives, the day before delivery, the list of members receiving a cone.
          _fr: Chaque email (séparé par une virgule) reçoit, le jour précédant la livraison, la liste des membres recevant un cornet.
          _de: Jede E-Mail-Adresse (durch Komma getrennt) bekommt ein Tag vor der Lieferung eine Liste der Abonnenten, die eine Tüte bekommen.
          _it: Ogni email (separata da una virgola) riceve, il giorno precedente la consega, la lista dei soci che ritireranno un cono.
          _nl: Elke e-mail (gescheiden door een komma) ontvangt, de dag voor de levering, de lijst van leden die een zak zullen ophalen.
        emails/package:
          _en: Each email (separated by a comma) receives, the day before delivery, the list of members receiving a package.
          _fr: Chaque email (séparé par une virgule) reçoit, le jour précédant la livraison, la liste des membres recevant un colis.
          _de: Jede E-Mail-Adresse (durch Komma getrennt) bekommt ein Tag vor der Lieferung eine Liste der Abonnenten, die eine Paket bekommen.
          _it: Ogni email (separata da una virgola) riceve, il giorno precedente la consega, la lista dei soci che ritireranno un pacco.
          _nl: Elke e-mail (gescheiden door een komma) ontvangt, de dag voor de levering, de lijst van leden die een pakket zullen ophalen.
        emails/share:
          _en: Each email (separated by a comma) receives, the day before delivery, the list of members receiving a share.
          _fr: Chaque email (séparé par une virgule) reçoit, le jour précédant la livraison, la liste des membres recevant un part.
          _de: Jede E-Mail-Adresse (durch Komma getrennt) bekommt ein Tag vor der Lieferung eine Liste der Abonnenten, die eine Anteil bekommen.
          _it: Ogni email (separata da una virgola) riceve, il giorno precedente la consega, la lista dei soci che ritireranno una parte.
          _nl: Elke e-mail (gescheiden door een komma) ontvangt, de dag voor de levering, de lijst van leden die een deel zullen ophalen.
        form_detail:
          _en: Leave blank for the default text.
          _fr: Laisser blanc pour le texte par défaut.
          _de: Leer lassen für den Standardtext.
          _it: Lasciare vuoto per il testo predefinito.
          _nl: Laat leeg voor de standaardtekst.
        group_html:
          _en: Allows you to display depots by <a href='/depot_groups'>group</a> on the registration form.
          _fr: Permet d'afficher les dépôts par <a href='/depot_groups'>groupe</a> sur le formulaire d'inscription.
          _de: Ermöglicht es Ihnen, die Depots nach <a href='/depot_groups'>Gruppe</a> im Anmeldeformular anzuzeigen.
          _it: Permette di visualizzare i punti di ritiro per <a href='/depot_groups'>gruppo</a> nel modulo di registrazione.
          _nl: Stelt u in staat depots per <a href='/depot_groups'>groep</a> weer te geven op het registratieformulier.
        phones:
          _en: Separated by a comma.
          _fr: Séparés par une virgule.
          _de: Durch Komma getrennt.
          _it: Separate da una virgola.
          _nl: Gescheiden door komma's.
        price/bag:
          _en: Price for the preparation and/or delivery of a bag.
          _fr: Prix pour la préparation et/ou livraison d'un sac.
          _de: Preis für die Abpackung und/oder Lieferung einer Tasche.
          _it: Prezzo per la preparazione e/o consegna di una borsa.
          _nl: Prijs voor de voorbereiding en/of levering van een tas.
        price/basket:
          _en: Price for the preparation and/or delivery of a basket.
          _fr: Prix pour la préparation et/ou livraison d'un panier.
          _de: Preis für die Abpackung und/oder Lieferung einer Korb.
          _it: Prezzo per la preparazione e/o consegna di una cesta.
          _nl: Prijs voor de voorbereiding en/of levering van een mand.
        price/cone:
          _en: Price for the preparation and/or delivery of a cone.
          _fr: Prix pour la préparation et/ou livraison d'un cornet.
          _de: Preis für die Abpackung und/oder Lieferung einer Tüte.
          _it: Prezzo per la preparazione e/o consegna di un cono.
          _nl: Prijs voor de voorbereiding en/of levering van een zak.
        price/package:
          _en: Price for the preparation and/or delivery of a package.
          _fr: Prix pour la préparation et/ou livraison d'un colis.
          _de: Preis für die Abpackung und/oder Lieferung einer Paket.
          _it: Prezzo per la preparazione e/o consegna di un pacco.
          _nl: Prijs voor de voorbereiding en/of levering van een pakket.
        price/share:
          _en: Price for the preparation and/or delivery of a share.
          _fr: Prix pour la préparation et/ou livraison d'une part.
          _de: Preis für die Abpackung und/oder Lieferung einer Anteil.
          _it: Prezzo per la preparazione e/o consegna di una parte.
          _nl: Prijs voor de voorbereiding en/of levering van een deel.
        public_note:
          _en: Information displayed at the top of the delivery list on the member's account.
          _fr: Information affichée en haut de la liste des livraisons sur le compte du membre.
          _de: Information, die oben auf der Liste der Lieferungen auf dem Mitgliederkonto angezeigt wird.
          _it: Informazioni visualizzate in alto nella lista delle consegne sul conto del socio.
          _nl: Informatie die bovenaan de leveringslijst op het ledenaccount wordt weergegeven.
        visible:
          _en: Select "No" if the depot is no longer available at registration.
          _fr: Sélectionner "Non" si le dépôt n'est plus disponible lors de l'inscription.
          _de: '"Nein" auswählen, wenn das Depot bei der Registrierung nicht mehr verfügbar ist.'
          _it: Seleziona "No" se il punto di ritiro non è più disponibile durante la registrazione.
          _nl: Selecteer "Nee" als het depot niet meer beschikbaar is bij registratie.
      depot_group:
        information_text:
          _en: Information displayed below the group name on the registration form.
          _fr: Information affichée en dessous du nom du groupe sur le formulaire d'inscription.
          _de: Information, die unter dem Namen der Gruppe auf dem Anmeldeformular angezeigt wird.
          _it: Informazioni visualizzate sotto il nome del gruppo sul modulo di registrazione.
          _nl: Informatie die onder de groepsnaam op het registratieformulier wordt weergegeven.
        member_order_priority:
          _en: Sorted alphabetically by default.
          _fr: Trié par ordre alphabétique par défaut.
          _de: Sortiert standardmäßig alphabetisch.
          _it: Ordinato per impostazione predefinita in ordine alfabetico.
          _nl: Standaard alfabetisch gesorteerd.
      invoice:
        activity_price:
          _en: Amount for a single participation.
          _fr: Montant pour une seule participation.
          _de: Betrag für eine einmalige Teilnahme.
          _it: Importo per una singola partecipazione.
          _nl: Bedrag voor één deelname.
        vat_rate:
          _en: Leave blank if no VAT is applicable.
          _fr: Laisser vide si aucune TVA n'est applicable.
          _de: Leer lassen, wenn keine MwSt. anfällt.
          _it: Lasciare vuoto se nessuna IVA è applicabile.
          _nl: Laat leeg indien geen btw van toepassing is.
      liquid_data_preview_html:
        _en: This <a href='/handbook/emails#data-preview'>data structure</a> is presented as an example and is generated semi-randomly. You can change its values at will to preview your template.
        _fr: Cette <a href='/handbook/emails#data-preview'>structure de données</a> est présentée à titre d'exemple et est générée semi-aléatoirement, vous pouvez modifier ses valeurs à volonté pour prévisualiser votre template.
        _de: Diese <a href='/handbook/emails#data-preview'>Datenstruktur</a> wird als Beispiel vorgestellt und wird halbzufällig generiert. Sie können ihre Werte nach Belieben ändern, um eine Vorschau Ihrer Vorlage zu erhalten.
        _it: Questa <a href='/handbook/emails#data-preview'>struttura dati</a> è presentata come un esempio e viene generata in modo semi-casuale, potete modificarne i valori a piacimento per visualizzare in anteprima il tuo template.
        _nl: Deze <a href='/handbook/emails#data-preview'>datastructuur</a> wordt als voorbeeld gepresenteerd en wordt semi-willekeurig gegenereerd. U kunt de waarden naar believen wijzigen om uw sjabloon te bekijken.
      liquid_html:
        _en: Supports <a href='/handbook/emails#liquid'>Liquid syntax</a> with the data structure defined below.
        _fr: Supporte <a href='/handbook/emails#liquid'>la syntaxe Liquid</a> avec la structure de données définie ci-dessous.
        _de: Unterstützt <a href='/handbook/emails#liquid'>die Liquid-Syntax</a> mit der unten definierten Datenstruktur.
        _it: Supporta <a href='/handbook/emails#liquid'>la sintassi Liquid</a> con la struttura dei dati definita qui.
        _nl: Ondersteunt <a href='/handbook/emails#liquid'>Liquid-syntaxis</a> met de hieronder gedefinieerde datastructuur.
      mail_template:
        active:
          _en: This email is not sent by default, please check its content before activating it.
          _fr: Cet email n'est pas envoyé par défaut, veuillez vérifier son contenu avant de l'activer.
          _de: Diese E-Mail wird standardmäßig nicht gesendet, bitte überprüfen Sie den Inhalt, bevor Sie sie aktivieren.
          _it: Questa email non viene inviata per default, controlla il suo contenuto prima di attivarla
          _nl: Deze e-mail wordt niet standaard verzonden, controleer de inhoud voordat u deze activeert.
        always_active:
          _en: This email is mandatory and cannot be deactivated.
          _fr: Cet email est obligatoire et ne peut pas être désactivé.
          _de: Diese E-Mail ist obligatorisch und kann nicht deaktiviert werden.
          _it: Questo indirizzo e-mail è obbligatorio e non può essere disattivato.
          _nl: Deze e-mail is verplicht en kan niet worden gedeactiveerd.
        delivery_cycle_ids:
          _en: Only send this email to memberships using the selected delivery cycles.
          _fr: Uniquement envoyer cet email aux abonnement utilisant les cycles de livraison sélectionnés.
          _de: Diese E-Mail nur an Abonnements senden, die die ausgewählten Lieferzyklen verwenden.
          _it: Invia questa email solo agli abbonamenti che utilizzano i cicli di consegna selezionati.
          _nl: Stuur deze e-mail alleen naar lidmaatschappen die de geselecteerde leveringscycli gebruiken.
        disabled_settings:
          _en: This email is disabled because of the current settings.
          _fr: Cette email est désactivée en raison des paramètres actuels.
          _de: Diese E-Mail ist deaktiviert, da die aktuellen Einstellungen aktiv sind.
          _it: Questa email è disabilitata a causa delle impostazioni correnti.
          _nl: Deze e-mail is uitgeschakeld vanwege de huidige instellingen.
        invoice_overdue_notice:
          _en: This email will be sent by default once payments are processed automatically.
          _fr: Cet email sera envoyé par défaut une fois que les paiements seront traités automatiquement.
          _de: Diese E-Mail wird standardmäßig gesendet, sobald die Zahlungen automatisch verarbeitet werden.
          _it: Questa email verrà inviata per default una volta che i pagamenti saranno processati automaticamente.
          _nl: Deze e-mail wordt standaard verzonden zodra betalingen automatisch worden verwerkt.
      member:
        annual_fee:
          _en: Leave blank for no annual fee. Setting an amount (even 0) gives the member support status.
          _fr: Laisser vide si aucune cotisation annuelle. Définir un montant (même 0) donne au membre le statut support.
          _de: Leer lassen, wenn kein Jahresbeitrag anfällt. Ein Betrag (auch 0) gibt dem Mitglied den Support-Status.
          _it: Lasciare vuoto se non c'è nessuna quota annuale. Impostare un importo (anche 0) assegna al socio lo stato di supporto.
          _nl: Laat leeg als er geen jaarlijkse bijdrage is. Een bedrag instellen (zelfs 0) geeft het lid de supportstatus.
        billing_email:
          _en: If present, notification emails for new invoices and reminders will be sent to this address instead of the member's email(s).
          _fr: Si présent, les emails de notification pour nouvelle facture et rappel seront envoyés à cette adresse à la place du/des email(s) du membre.
          _de: Wenn vorhanden, werden die Benachrichtigungs-E-Mails für neue Rechnungen und Mahnungen an diese Adresse anstelle der E-Mail(s) des Mitglieds gesendet.
          _it: Se presente, le e-mail di notifica per le nuove fatture e i promemoria saranno inviate a questo indirizzo invece che all'e-mail del socio.
          _nl: Indien aanwezig, worden kennisgevings-e-mails voor nieuwe facturen en herinneringen naar dit adres gestuurd in plaats van naar het e-mailadres van het lid.
        contact_sharing:
          _en: Sharing contacts between members of the same depot.
          _fr: Partage de contact entre membres d'un même dépôt
          _de: Gemeinsame Nutzung von Kontakten zwischen Mitgliedern desselben Depots
          _it: Condivisione dei contatti tra i soci dello stesso punto di ritiro
          _nl: Contact delen tussen leden van hetzelfde depot
        delivery_note:
          _en: Will be displayed on the delivery summary (XLSX) and sheets (PDF) when the "delivery" mode is selected at the depot.
          _fr: Sera affichée sur le récapitulatif (XLSX) et fiches (PDF) de livraisons quand le mode "livraison" est sélectionné sur le dépôt.
          _de: Wird auf der Zusammenfassung (XLSX) und den Blättern (PDF) der Lieferungen angezeigt, wenn der Modus "Lieferung" auf dem Depot ausgewählt ist.
          _it: Verrà visualizzato sul riepilogo di consegna (XLSX) e sui foglia (PDF) quando viene selezionata la modalità "consegna" nel punto di ritiro.
          _nl: Wordt weergegeven op de leveringsbon (XLSX) en bladen (PDF) wanneer de "levering" modus is geselecteerd bij het depot.
        desired_shares_number:
          _en: Allows the member to have more shares than required. They will be billed automatically.
          _fr: Permet au membre d'avoir plus de parts sociales que celles requises. Elles seront facturées automatiquement.
          _de: Erlaubt dem Mitglied, mehr Anteilscheine zu haben als die erforderliche Anzahl. Sie werden automatisch in Rechnung gestellt.
          _it: Consente al socio di avere più quote sociali cooperative di quelle richieste. Saranno fatturate automaticamente.
          _nl: Stelt het lid in staat om meer aandelen te hebben dan vereist. Deze worden automatisch gefactureerd.
        emails:
          _en: Separated by a comma.
          _fr: Séparés par une virgule.
          _de: Durch Komma getrennt.
          _it: Separate da una virgola.
          _nl: Gescheiden door komma's.
        existing_shares_number:
          _en: Useful if some shares were billed outside the system.
          _fr: Utile si certaines parts sociales ont été facturées en dehors du système.
          _de: Nützlich, wenn einige Anteilschein außerhalb des Systems fakturiert wurden.
          _it: Utile se alcune quote sociali cooperative sono state fatturate al di fuori del sistema.
          _nl: Nuttig als sommige aandelen buiten het systeem zijn gefactureerd.
        phones:
          _en: Separated by a comma.
          _fr: Séparés par une virgule.
          _de: Durch Komma getrennt.
          _it: Separate da una virgola.
          _nl: Gescheiden door komma's.
        profession:
          _en: Which could potentially be useful for our activities.
          _fr: Qui pourraient éventuellement s'avérer utiles à nos activités.
          _de: Welche sich möglicherweise als nützlich für unsere Aktivitäten erweisen könnten.
          _it: Che potrebbe essere potenzialmente utile per le nostre attività.
          _nl: Die mogelijk nuttig kunnen zijn voor onze activiteiten.
        required_shares_number/bag_html:
          _en: Allows changing the default number, which depends on the bag size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille du sac de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Taschengrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione della borsa dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de tasgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        required_shares_number/basket_html:
          _en: Allows changing the default number, which depends on the basket size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille du panier de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Korbgrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione della cesta dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de mandgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        required_shares_number/cone_html:
          _en: Allows changing the default number, which depends on the cone size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille du cornet de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Tütengrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione del cono dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de zakgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        required_shares_number/package_html:
          _en: Allows changing the default number, which depends on the package size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille du colis de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Paketgrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione del pacco dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de pakketgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        required_shares_number/share_html:
          _en: Allows changing the default number, which depends on the share size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille de la part de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Anteilsgrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione della parte dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de deelgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        required_shares_number_html:
          _en: Allows changing the default number, which depends on the basket size of the current membership.</br>A negative number indicates that the shares will not be refunded to make the member inactive.
          _fr: Permet de changer le nombre par défaut qui dépends de la taille du panier de l'abonnement en cours.</br>Un nombre négatif permet d'indiquer que les parts ne seront pas remboursées afin de rendre le membre inactif.
          _de: Ermöglicht die Änderung der Standardanzahl, die von der Taschengrösse des aktuellen Abonnements abhängt.
          _it: Consente di modificare il numero predefinito che dipende dalla dimensione della cesta dell'abbonamento corrente.
          _nl: Stelt u in staat het standaardaantal te wijzigen, dat afhangt van de pakketgrootte van het huidige lidmaatschap.</br>Een negatief getal geeft aan dat de aandelen niet worden terugbetaald om het lid inactief te maken.
        send_validation_email_html:
          _en: <a href="%{url}">This email</a> is sent automatically when new members use <a href="%{new_members_url}">the registration form</a> and are validated by an admin.
          _fr: <a href="%{url}">Cet email</a> est envoyé automatiquement lorsque de nouveaux membres utilisent <a href="%{new_members_url}">le formulaire d'inscription</a> et sont validés par un administrateur.
          _de: Diese E-Mail wird automatisch gesendet, wenn neue Mitglieder das <a href="%{new_members_url}">Registrierungsformular</a> verwenden und von einem Administrator validiert werden.
          _it: Questa email verrà inviata automaticamente quando i nuovi soci utilizzano il <a href="%{new_members_url}">modulo di registrazione</a> e vengono validati da un amministratore.
          _nl: Deze e-mail wordt standaard verzonden zodra nieuwe leden het <a href="%{new_members_url}">registratieformulier</a> gebruiken en door een beheerder worden gevalideerd.
        sepa_mandate_id:
          _en: Unique reference number among your members (reusing the member's ID is recommended).
          _fr: Numéro de référence unique parmi vos membres (réutiliser l'ID du membre est recommandé).
          _de: Eindeutige Referenznummer unter Ihren Mitgliedern (die Verwendung der Mitglieds-ID wird empfohlen).
          _it: Numero di riferimento univoco tra i soci (riutilizzare l'ID del socio è consigliato).
          _nl: Uniek referentienummer onder uw leden (hergebruik van het lid-ID wordt aanbevolen).
        shop_depot:
          _en: Allows a member without a membership to place grocery orders.
          _fr: Permet à un membre sans abonnement de passer des commandes d'épicerie.
          _de: Ermöglicht es einem Mitglied ohne Abonnement, Produkte vom Hofladen zu bestellen.
          _it: Consente a un socio senza abbonamento di effettuare ordini di drogheria.
          _nl: Stelt een lid zonder lidmaatschap in staat winkelbestellingen te plaatsen.
        trial_baskets_count/bag:
          _en: Allows you to change the default number of trial bags, useful if, for example, the member has already received bags before registering.
          _fr: Permet de modifier le nombre de sacs d'essai par défaut, pratique si, par exemple, le membre a déjà reçu des sacs avant son inscription.
          _de: Ermöglicht es Ihnen, die Standardanzahl der Probetaschen zu ändern, was nützlich ist, wenn das Mitglied beispielsweise bereits Taschen erhalten hat, bevor es sich angemeldet hat.
          _it: Consente di modificare il numero predefinito di borse di prova, utile se, ad esempio, il socio ha già ricevuto borse prima di registrarsi.
          _nl: Stelt u in staat het standaardaantal proeftassen te wijzigen, handig als het lid bijvoorbeeld al tassen heeft ontvangen voor registratie.
        trial_baskets_count/basket:
          _en: Allows you to change the default number of trial baskets, useful if, for example, the member has already received baskets before registering.
          _fr: Permet de modifier le nombre de paniers d'essai par défaut, pratique si, par exemple, le membre a déjà reçu des paniers avant son inscription.
          _de: Ermöglicht es Ihnen, die Standardanzahl der Probekörbe zu ändern, was nützlich ist, wenn das Mitglied beispielsweise bereits Körbe erhalten hat, bevor es sich angemeldet hat.
          _it: Consente di modificare il numero predefinito di ceste di prova, utile se, ad esempio, il socio ha già ricevuto ceste prima di registrarsi.
          _nl: Stelt u in staat het standaardaantal proefmanden te wijzigen, handig als het lid bijvoorbeeld al manden heeft ontvangen voor registratie.
        trial_baskets_count/cone:
          _en: Allows you to change the default number of trial cones, useful if, for example, the member has already received cones before registering.
          _fr: Permet de modifier le nombre de cornets d'essai par défaut, pratique si, par exemple, le membre a déjà reçu des cornets avant son inscription.
          _de: Ermöglicht es Ihnen, die Standardanzahl der Probetüten zu ändern, was nützlich ist, wenn das Mitglied beispielsweise bereits Tüten erhalten hat, bevor es sich angemeldet hat.
          _it: Consente di modificare il numero predefinito di coni di prova, utile se, ad esempio, il socio ha già ricevuto coni prima di registrarsi.
          _nl: Stelt u in staat het standaardaantal proefzakken te wijzigen, handig als het lid bijvoorbeeld al zakken heeft ontvangen voor registratie.
        trial_baskets_count/package:
          _en: Allows you to change the default number of trial packages, useful if, for example, the member has already received packages before registering.
          _fr: Permet de modifier le nombre de colis d'essai par défaut, pratique si, par exemple, le membre a déjà reçu des colis avant son inscription.
          _de: Ermöglicht es Ihnen, die Standardanzahl der Probepakete zu ändern, was nützlich ist, wenn das Mitglied beispielsweise bereits Pakete erhalten hat, bevor es sich angemeldet hat.
          _it: Consente di modificare il numero predefinito di pacchi di prova, utile se, ad esempio, il socio ha già ricevuto pacchi prima di registrarsi.
          _nl: Stelt u in staat het standaardaantal proefpakketten te wijzigen, handig als het lid bijvoorbeeld al pakketten heeft ontvangen voor registratie.
        trial_baskets_count/share:
          _en: Allows you to change the default number of trial shares, useful if, for example, the member has already received shares before registering.
          _fr: Permet de modifier le nombre de parts d'essai par défaut, pratique si, par exemple, le membre a déjà reçu des parts avant son inscription.
          _de: Ermöglicht es Ihnen, die Standardanzahl der Probeteile zu ändern, was nützlich ist, wenn das Mitglied beispielsweise bereits Anteile erhalten hat, bevor es sich angemeldet hat.
          _it: Consente di modificare il numero predefinito di parti di prova, utile se, ad esempio, il socio ha già ricevuto parti prima di registrarsi.
          _nl: Stelt u in staat het standaardaantal proefdelen te wijzigen, handig als het lid bijvoorbeeld al delen heeft ontvangen voor registratie.
        waiting_alternative_depot_ids/bag:
          _en: You can choose one or more alternative depots if your first choice is already full. By agreeing to temporarily receive your bags at an alternative depot, you should be able to start faster.
          _fr: Vous pouvez choisir un ou plusieurs dépôts alternatifs dans le cas ou votre premier choix serait déjà complet. En acceptant de recevoir temporairement vos sacs dans un dépôt alternatif, vous devriez pouvoir commencer plus rapidement.
          _de: Sie können eine oder mehrere alternative Depots wählen, falls Ihre erste Wahl bereits voll ist. Wenn Sie sich damit einverstanden erklären, Ihre Taschen vorübergehend in einem alternativen Depot zu erhalten, sollten Sie in der Lage sein, schneller zu starten.
          _it: Potete scegliere uno o più punti di ritiro alternativi nel caso in cui la vostra prima scelta fosse già al completo. Accettando di ricevere temporaneamente le vostre borse in un luogo di consegna alternativo, dovreste essere in grado di iniziare più velocemente.
          _nl: U kunt een of meer alternatieve depots kiezen als uw eerste keuze al vol is. Door ermee in te stemmen uw tassen tijdelijk bij een alternatief depot te ontvangen, zou u sneller kunnen starten.
