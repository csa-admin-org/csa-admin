        apply_basket_size_price_percentage/bag:
          _en: When checked, the delivery-level bag size price percentage adjustments will also be applied to this membership's bags.
          _fr: Lorsque coché, les ajustements en pourcentage du prix de la taille sac définis par livraison seront également appliqués aux sacs de cet abonnement.
          _de: Wenn aktiviert, werden die lieferungsbedingten prozentualen Anpassungen des Taschengrösse-Preises auch auf die Taschen dieses Abonnements angewendet.
          _it: Se selezionato, le modifiche percentuali del prezzo della dimensione della borsa definite per consegna verranno applicate anche alle borse di questo abbonamento.
          _nl: Indien aangevinkt, worden de leveringsgerelateerde procentuele aanpassingen van de tasgrootteprijs ook toegepast op de tassen van dit lidmaatschap.
        apply_basket_size_price_percentage/basket:
          _en: When checked, the delivery-level basket size price percentage adjustments will also be applied to this membership's baskets.
          _fr: Lorsque coché, les ajustements en pourcentage du prix de la taille de panier définis par livraison seront également appliqués aux paniers de cet abonnement.
          _de: Wenn aktiviert, werden die lieferungsbedingten prozentualen Anpassungen des Korbgrössepreises auch auf die Körbe dieses Abonnements angewendet.
          _it: Se selezionato, le modifiche percentuali del prezzo della dimensione della cesta definite per consegna verranno applicate anche alle ceste di questo abbonamento.
          _nl: Indien aangevinkt, worden de leveringsgerelateerde procentuele aanpassingen van de mandgrootteprijs ook toegepast op de manden van dit lidmaatschap.
        apply_basket_size_price_percentage/cone:
          _en: When checked, the delivery-level cone size price percentage adjustments will also be applied to this membership's cones.
          _fr: Lorsque coché, les ajustements en pourcentage du prix de la taille cornet définis par livraison seront également appliqués aux cornets de cet abonnement.
          _de: Wenn aktiviert, werden die lieferungsbedingten prozentualen Anpassungen des Tütengrössepreises auch auf die Tüten dieses Abonnements angewendet.
          _it: Se selezionato, le modifiche percentuali del prezzo della dimensione del cono definite per consegna verranno applicate anche ai coni di questo abbonamento.
          _nl: Indien aangevinkt, worden de leveringsgerelateerde procentuele aanpassingen van de zakgrootteprijs ook toegepast op de zakken van dit lidmaatschap.
        apply_basket_size_price_percentage/package:
          _en: When checked, the delivery-level package size price percentage adjustments will also be applied to this membership's packages.
          _fr: Lorsque coché, les ajustements en pourcentage du prix de la taille colis définis par livraison seront également appliqués aux colis de cet abonnement.
          _de: Wenn aktiviert, werden die lieferungsbedingten prozentualen Anpassungen des Paketgrössepreises auch auf die Pakete dieses Abonnements angewendet.
          _it: Se selezionato, le modifiche percentuali del prezzo della dimensione del pacco definite per consegna verranno applicate anche ai pacchi di questo abbonamento.
          _nl: Indien aangevinkt, worden de leveringsgerelateerde procentuele aanpassingen van de pakketgrootteprijs ook toegepast op de pakketten van dit lidmaatschap.
        apply_basket_size_price_percentage/share:
          _en: When checked, the delivery-level share size price percentage adjustments will also be applied to this membership's shares.
          _fr: Lorsque coché, les ajustements en pourcentage du prix de la taille part définis par livraison seront également appliqués aux parts de cet abonnement.
          _de: Wenn aktiviert, werden die lieferungsbedingten prozentualen Anpassungen des Anteilsgrössepreises auch auf die Anteile dieses Abonnements angewendet.
          _it: Se selezionato, le modifiche percentuali del prezzo della dimensione della parte definite per consegna verranno applicate anche alle parti di questo abbonamento.
          _nl: Indien aangevinkt, worden de leveringsgerelateerde procentuele aanpassingen van de deelgrootteprijs ook toegepast op de delen van dit lidmaatschap.
        basket_complements_annual_price_change/bag:
          _en: Changes the final amount, regardless of the number of bags/complements.
          _fr: Modifie le montant final, peu importe le nombre de sacs/compléments.
          _de: Verändert den Schlussbetrag, unabhängig von der Anzahl der Taschen/Zusätze.
          _it: Modifica l'importo finale, indipendentemente dal numero di borse / aggiunte alle borse.
