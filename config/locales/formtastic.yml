          _fr: Sélectionner "Non" si la taille colis n'est pas disponible lors de l'inscription.
          _de: Nein" auswählen, wenn die Paketgrösse bei der Registrierung nicht verfügbar ist.
          _it: Seleziona "No" se la dimensione del pacco non è disponibile durante la registrazione.
          _nl: Selecteer "Nee" als de pakketgrootte niet beschikbaar is tijdens registratie.
        visible/share:
