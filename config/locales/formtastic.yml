        basket_update_limit_in_days/bag:
          _en: Members can modify their bag until midnight, X days before the delivery date (e.g., 3 days = Sunday midnight for a Wednesday delivery). Zero means changes are possible on the day of delivery.
          _fr: 'Les membres peuvent modifier leur sac jusqu''à minuit, X jours avant la date de livraison (ex: 3 jours = dimanche minuit pour une livraison mercredi). Zéro signifie que la modification est possible le jour même de la livraison.'
          _de: Mitglieder können ihren Korb bis Mitternacht ändern, X Tage vor dem Lieferdatum (z.B. 3 Tage = Sonntag Mitternacht für eine Mittwochslieferung). Null bedeutet, dass Änderungen am Liefertag möglich sind.
          _it: 'I soci possono modificare il loro borsa fino a mezzanotte, X giorni prima della data di consegna (es: 3 giorni = domenica mezzanotte per una consegna di mercoledì). Zero significa che la modifica è possibile il giorno della consegna.'
          _nl: Leden kunnen hun tas wijzigen tot middernacht, X dagen voor de leveringsdatum (bijv. 3 dagen = zondag middernacht voor een levering op woensdag). Nul betekent dat wijzigingen mogelijk zijn op de dag van levering.
