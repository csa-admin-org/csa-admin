          _nl: Stelt ondersteunende leden in staat het bedrag van hun jaarlijkse bijdrage bij registratie te kiezen. Actieve leden (die een deelgrootte kiezen) kunnen dit bedrag niet wijzigen.
        annual_fee_support_member_only/bag:
          _en: If enabled, only supporting members will have the annual fee applied by default at registration. Active members (choosing a bag size) will not have it.
          _fr: Si activé, seuls les membres de soutien auront la cotisation annuelle appliquée par défaut lors de leur l'inscription. Les membres actifs (choisissant une taille sac) n'en auront pas.
          _de: Wenn aktiviert, wird der Jahresbeitrag standardmässig nur für Fördermitglieder bei der Anmeldung angewendet. Aktive Mitglieder (die eine Taschengrösse wählen) erhalten ihn nicht.
          _it: Se attivato, solo i soci sostenitori avranno la quota annuale applicata per impostazione predefinita all'iscrizione. I soci attivi (che scelgono una dimensione della borsa) non lo avranno.
          _nl: Indien ingeschakeld, zullen alleen ondersteunende leden de jaarlijkse bijdrage standaard toegepast krijgen bij registratie. Actieve leden (die een tasgrootte kiezen) zullen deze niet hebben.
