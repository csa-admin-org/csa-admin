          _it: Permette di cambiare dinamicamente il prezzo applicato in base a diversi criteri come la dimensione del cesto.<br/> Supporta <a href='/handbook/emails#liquid'>la sintassi Liquid</a> con gli oggetti "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }} e "{{ deliveries_count }}".
          _nl: Stelt u in staat de prijs dynamisch te wijzigen op basis van verschillende criteria zoals de grootte van het pakket.<br/> Ondersteunt <a href='/handbook/emails#liquid'>de Liquid-syntaxis</a> met de objecten "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }}" en "{{ deliveries_count }}".
        basket_price_extra_label_details_html:
          _en: Supports <a href='/handbook/emails#liquid'>the Liquid syntax</a> with the objects "{{ extra }}" and "{{ full_year_price }}".
          _fr: Supporte <a href='/handbook/emails#liquid'>la syntaxe Liquid</a> avec les objets "{{ extra }}" et "{{ full_year_price }}".
          _de: Unterstützt <a href='/handbook/emails#liquid'>die Liquid-Syntax</a> mit den Objekten "{{ extra }}" und "{{ full_year_price }}".
