        basket_i18n_scopes_html:
          _en: Determines the terminology used for "basket" throughout the application.<br/>⚠️ <a href="/mail_templates">Automatic emails</a> and <a href="/newsletter_templates">Newsletter templates</a> contents are not automatically updated and must be revised manually.
          _fr: Détermine la terminologie utilisée pour «panier» dans toute l'application.<br/>⚠️ Les contenus des <a href="/mail_templates">Emails automatiques</a> et des <a href="/newsletter_templates">Templates de newsletters</a> ne sont pas mis à jour automatiquement et doivent être révisés manuellement.
          _de: Bestimmt die Bezeichnung für «Korb» in der gesamten Anwendung.<br/>⚠️ Die Inhalte der <a href="/mail_templates">Automatische E-Mails</a> und <a href="/newsletter_templates">Newsletter-Vorlagen</a> werden nicht automatisch aktualisiert und müssen manuell überarbeitet werden.
          _it: Determina la terminologia utilizzata per «cesta» in tutta l'applicazione.<br/>⚠️ I contenuti delle <a href="/mail_templates">Email automatiche</a> e dei <a href="/newsletter_templates">Templates di newsletter</a> non vengono aggiornati automaticamente e devono essere rivisti manualmente.
          _nl: Bepaalt de terminologie die wordt gebruikt voor «mand» in de hele applicatie.<br/>⚠️ De inhoud van <a href="/mail_templates">Automatische e-mails</a> en <a href="/newsletter_templates">Nieuwsbriefsjablonen</a> wordt niet automatisch bijgewerkt en moet handmatig worden herzien.
        basket_price_extra_dynamic_pricing/bag_html:
          _en: Allows changing the price dynamically based on various criteria such as the size of the bag.<br/> Supports <a href='/handbook/emails#liquid'>the Liquid syntax</a> with the objects "{{ extra }}", "{{ bag_size_id }}", "{{ bag_size_price }}", "{{ complements_price }}", and "{{ deliveries_count }}".
          _fr: Permet de changer dynamiquement le prix en fonction de différents critères tels que la taille du sac.<br/> Supporte <a href='/handbook/emails#liquid'>la syntaxe Liquid</a> avec les objets "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }} et "{{ deliveries_count }}".
          _de: Erlaubt es, den Preis dynamisch zu ändern, basierend auf verschiedenen Kriterien wie der Grösse der Tasche.<br/> Unterstützt <a href='/handbook/emails#liquid'>die Liquid-Syntax</a> mit den Objekten "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }} und "{{ deliveries_count }}".
          _it: Permette di cambiare dinamicamente il prezzo applicato in base a diversi criteri come la dimensione della borsa.<br/> Supporta <a href='/handbook/emails#liquid'>la sintassi Liquid</a> con gli oggetti "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }} e "{{ deliveries_count }}".
          _nl: Stelt u in staat de prijs dynamisch te wijzigen op basis van verschillende criteria zoals de grootte van het tas.<br/> Ondersteunt <a href='/handbook/emails#liquid'>de Liquid-syntaxis</a> met de objecten "{{ extra }}", "{{ basket_size_id }}", "{{ basket_size_price }}", "{{ complements_price }}" en "{{ deliveries_count }}".
