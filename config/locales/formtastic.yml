          _fr: Un prix à 0.00 signifie "compléments uniquement"; la quantité de part sera automatiquement mise à 0.
          _de: Ein Preis von 0.00 bedeutet "nur Zusätze"; die Korbmenge wird automatisch auf 0 gesetzt.
          _it: Un prezzo di 0.00 significa "solo aggiunte"; la quantità della parte sarà automaticamente impostata a 0.
          _nl: Een prijs van 0.00 betekent "alleen aanvullingen"; de deelaantal wordt automatisch op 0 gezet.
        visible/bag:
          _en: Select "No" if the bag size is not available during registration.
          _fr: Sélectionner "Non" si la taille sac n'est pas disponible lors de l'inscription.
          _de: Nein" auswählen, wenn die Taschengrösse bei der Registrierung nicht verfügbar ist.
          _it: Seleziona "No" se la dimensione della borsa non è disponibile durante la registrazione.
          _nl: Selecteer "Nee" als de tasgrootte niet beschikbaar is tijdens registratie.
        visible/basket:
          _en: Select "No" if the basket size is not available during registration.
          _fr: Sélectionner "Non" si la taille de panier n'est pas disponible lors de l'inscription.
          _de: Nein" auswählen, wenn die Korbgrösse bei der Registrierung nicht verfügbar ist.
          _it: Seleziona "No" se la dimensione della cesta non è disponibile durante la registrazione.
          _nl: Selecteer "Nee" als de mandgrootte niet beschikbaar is tijdens registratie.
        visible/cone:
          _en: Select "No" if the cone size is not available during registration.
          _fr: Sélectionner "Non" si la taille cornet n'est pas disponible lors de l'inscription.
          _de: Nein" auswählen, wenn die Tütengrösse bei der Registrierung nicht verfügbar ist.
          _it: Seleziona "No" se la dimensione del cono non è disponibile durante la registrazione.
          _nl: Selecteer "Nee" als de zakgrootte niet beschikbaar is tijdens registratie.
        visible/package:
