          _fr: Gère le produit comme un complément colis, les commandes de ce produit seront alors comptées dans les fiches (PDF) et le récapitulatif (XLSX) de la livraison des colis. Une seule variante par produit est autorisée.
          _de: Verwaltet das Produkt als Zusatz, Bestellungen für dieses Produkt werden dann in den Blättern (PDF) und der Zusammenfassung (XLSX) der Paketelieferung gezählt. Nur eine Variante pro Produkt ist erlaubt.
          _it: Gestisce il prodotto come componente aggiuntivo del carrello. Gli ordini per questo prodotto saranno quindi conteggiati nel foglio di consegna del carrello (PDF) e nel riepilogo (XLSX). È consentita una sola variante per prodotto.
          _nl: Beheert het product als pakketaanvulling, bestellingen voor dit product worden dan meegeteld in de leveringsbladen (PDF) en het leveringsoverzicht (XLSX). Slechts één variant per product is toegestaan.
        basket_complement/share:
          _en: Manages the product as a share supplement, orders for this product will then be counted in the delivery sheets (PDF) and the delivery summary (XLSX). Only one variant per product is allowed.
          _fr: Gère le produit comme un complément part, les commandes de ce produit seront alors comptées dans les fiches (PDF) et le récapitulatif (XLSX) de la livraison des parts. Une seule variante par produit est autorisée.
          _de: Verwaltet das Produkt als Zusatz, Bestellungen für dieses Produkt werden dann in den Blättern (PDF) und der Zusammenfassung (XLSX) der Anteilslieferung gezählt. Nur eine Variante pro Produkt ist erlaubt.
          _it: Gestisce il prodotto come componente aggiuntivo del carrello. Gli ordini per questo prodotto saranno quindi conteggiati nel foglio di consegna del carrello (PDF) e nel riepilogo (XLSX). È consentita una sola variante per prodotto.
          _nl: Beheert het product als deelaanvulling, bestellingen voor dit product worden dan meegeteld in de leveringsbladen (PDF) en het leveringsoverzicht (XLSX). Slechts één variant per product is toegestaan.
        display_in_delivery_sheets:
          _en: Only possible if the product has only one variant.
          _fr: Uniquement possible si le produit n'a qu'une seule variante.
          _de: Nur möglich, wenn das Produkt nur eine Variante hat.
          _it: Possibile solo se il prodotto ha una sola variante.
          _nl: Alleen mogelijk als het product slechts één variant heeft.
      shop/product_variant:
        stock:
          _en: Leave blank if stock is not managed.
          _fr: Laisser vide si le stock n'est pas géré.
          _de: Leer lassen, wenn der Lagerbestand nicht verwaltet wird.
          _it: Lasciare vuoto se lo stock non è gestito.
          _nl: Laat leeg als de voorraad niet wordt beheerd.
        weight_in_kg:
          _en: Leave blank if not included in the total weight of the order.
          _fr: Laisser vide si ne compte pas dans le poids total de la commande.
          _de: Leer lassen, wenn nicht im Gesamtgewicht der Bestellung enthalten.
          _it: Lasciare vuoto se non è incluso nel peso totale dell'ordine.
          _nl: Laat leeg als het niet wordt meegeteld in het totale gewicht van de bestelling.
      shop/special_delivery:
        products:
          _en: The individual availability of the selected products is ignored here.
          _fr: La disponibilité individuelle des produits sélectionnés est ici ignorée.
          _de: Die individuelle Verfügbarkeit der ausgewählten Produkte wird hier ignoriert.
          _it: La disponibilità individuale dei prodotti selezionati è ignorata qui.
          _nl: De individuele beschikbaarheid van de geselecteerde producten wordt hier genegeerd.
      support_ticket:
        context:
          _en: For a quick resolution of your request, please provide direct links, IDs (member, subscription, invoice, etc.) or screenshots (below).
          _fr: Pour une résolution rapide de votre demande, merci de fournir des liens directs, IDs (membre, abonnement, facture, etc.) ou captures d'écran (ci-dessous).
          _de: Für eine schnelle Lösung Ihrer Anfrage geben Sie bitte direkte Links, IDs (Mitglied, Abonnement, Rechnung usw.) oder Screenshots (unterhalb) an.
          _it: Per una risoluzione rapida della richiesta, fornisca link diretti, ID (socio, abbonamento, fattura, ecc.) o screenshot (sotto).
          _nl: Voor een snel oplossen van uw aanvraag, geef alstublieft directe links, IDs (lid, abonnement, factuur, etc.) of schermafdrukken (onder).
        emails:
          _en: Replies will be sent to your admin email (%{to}), but you can add other email addresses in CC.
          _fr: Les réponses seront envoyées à votre adresse e-mail d'admin (%{to}), mais vous pouvez ajouter d'autres adresses e-mail en CC.
          _de: Antworten werden an Ihre Admin-E-Mail (%{to}) gesendet, aber Sie können andere E-Mail-Adressen in CC hinzufügen.
          _it: Le risposte verranno inviate alla sua email admin (%{to}), ma può aggiungere altri indirizzi email in CC.
          _nl: Antwoorden worden verzonden naar uw admin-e-mail (%{to}), maar u kunt andere e-mailadressen toevoegen in CC.
        subject:
          _en: Briefly describe your issue or request.
          _fr: Décrivez brièvement votre problème ou votre demande.
          _de: Beschreiben Sie kurz Ihr Problem oder Ihre Anfrage.
          _it: Descrivi brevemente il tuo problema o la tua richiesta.
          _nl: Beschrijf kort uw probleem of uw verzoek.
