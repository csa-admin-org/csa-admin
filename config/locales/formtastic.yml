        basket_price_extra_public_title:
          _en: If present, replaces the title displayed for members (registration form, invoice, ...).
          _fr: Si présent, remplace le titre affiché pour les membres (formulaire d'inscription, facture, ...).
          _de: Wenn vorhanden, ersetzt den für Mitglieder angezeigten Titel (Anmeldeformular, Rechnung, ...).
          _it: Se presente, sostituisce il titolo visualizzato per i soci (modulo di registrazione, fattura, ...).
          _nl: Indien aanwezig, vervangt de titel die wordt weergegeven voor leden (registratieformulier, factuur, ...).
        basket_price_extra_text:
          _en: This optional text is inserted after the heading in the registration form.
          _fr: Ce texte optionnel est inséré après le titre dans le formulaire d'inscription.
          _de: Dieser optionale Text wird im Anmeldeformular nach der Überschrift eingefügt.
          _it: Questo testo opzionale è inserito dopo il titolo nel modulo di registrazione.
          _nl: Deze optionele tekst wordt ingevoegd na de kop in het registratieformulier.
        basket_price_extras:
          _en: Separated by commas. It's recommended to use 6 options or fewer for a better registration experience.
          _fr: Séparé par des virgules. Il est recommandé d'utiliser 6 options ou moins pour une meilleure expérience d'inscription.
          _de: Durch Komma getrennt. Es wird empfohlen, 6 oder weniger Optionen für ein besseres Anmeldeerlebnis zu verwenden.
          _it: Separate da una virgola. Si raccomanda di utilizzare 6 opzioni o meno per una migliore esperienza di registrazione.
          _nl: Gescheiden door komma's. Het is aanbevolen om 6 of minder opties te gebruiken voor een betere registratie-ervaring.
        basket_shift_deadline_in_weeks_html:
          _en: Number of weeks after the end or before the beginning of the absence during which a shift is possible. In any case, a shift is not possible outside the current subscription.<br/>Leave empty to not impose a deadline for shifts.
          _fr: Nombre de semaines, suivant la fin ou le début de l'absence, ou un déplacement est possible. Dans tous les cas le déplacement n'est pas possible en dehors de l'abonnement en cours.<br/>Laisser vide pour ne pas imposer de délai maximum pour les déplacements.
          _de: Anzahl der Wochen nach dem Ende oder vor dem Beginn der Abwesenheit, in denen eine Verschiebung möglich ist. In jedem Fall ist eine Verschiebung außerhalb des aktuellen Abonnements nicht möglich.<br/>Lassen Sie leer, um keine Deadline für Verschiebungen zu erzwingen.
          _it: Numero di settimane dopo la fine o prima dell'inizio dell'assenza durante le quali è possibile effettuare uno spostamento. In ogni caso, uno spostamento non è possibile al di fuori dell'abbonamento corrente.<br/>Lasciare vuoto per non impostare un limite massimo per gli spostamenti.
          _nl: Aantal weken na het einde of voor het begin van de afwezigheid waarin een verschuiving mogelijk is. In elk geval is een verschuiving niet mogelijk buiten het huidige lidmaatschap.<br/>Laat leeg om geen deadline op te leggen voor verschuivingen.
        basket_shifts_annually/bag_html:
          _en: Allows members to shift the content of their bag during their absence to another delivery from their account.<br/>Leave empty to not impose a limit on the number of possible shifts.
          _fr: Permet aux membres de déplacer le contenu de leur sac durant leur absence vers une autre livraison depuis leur compte.<br/>Laisser vide pour ne pas imposer de limite au nombre de déplacements possibles.
          _de: Erlaubt Mitgliedern, den Inhalt ihrer Tasche während ihrer Abwesenheit auf eine andere Lieferung aus ihrem Konto zu verschieben.<br/>Lassen Sie leer, um keine Begrenzung für die Anzahl möglicher Verschiebungen zu erzwingen.
          _it: Permette ai soci di spostare il contenuto del loro borsa durante la loro assenza a un'altra consegna dal loro account.<br/>Lasciare vuoto per non impostare un limite al numero di spostamenti possibili.
          _nl: Stelt leden in staat de inhoud van hun tas tijdens hun afwezigheid te verschuiven naar een andere levering vanuit hun account.<br/>Laat leeg om geen limiet op te leggen aan het aantal mogelijke verschuivingen.
