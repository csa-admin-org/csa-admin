_:
  sepa_mandate:
    authorisation:
      _en: By signing this mandate form, you authorise %{creditor_name} to send instructions to your bank to debit your account, and your bank to debit your account in accordance with the instructions from %{creditor_name}.
      _fr: En signant ce formulaire de mandat, vous autorisez %{creditor_name} à envoyer des instructions à votre banque pour débiter votre compte, et votre banque à débiter votre compte conformément aux instructions de %{creditor_name}.
      _de: Ich ermächtige %{creditor_name}, wiederkehrende Zahlungen von meinem Konto mittels SEPA-Lastschrift einzuziehen. Zugleich weise ich mein Kreditinstitut an, die von %{creditor_name} auf mein Konto gezogenen Lastschriften einzulösen.
      _it: La sottoscrizione del presente mandato comporta l'autorizzazione a %{creditor_name} a richiedere alla banca del debitore l'addebito del suo conto e l'autorizzazione alla banca di procedere a tale addebito conformemente alle disposizioni impartite da %{creditor_name}.
      _nl: Door ondertekening van dit formulier geef je toestemming aan %{creditor_name} om doorlopend incasso-opdrachten te sturen naar je bank om een bedrag van je rekening af te schrijven en aan je bank om doorlopend een bedrag van je rekening af te schrijven overeenkomstig de opdracht van %{creditor_name}.
    creditor_identifier_line:
      _en: 'Creditor Identifier: %{sepa_creditor_identifier}'
      _fr: 'Identifiant créancier SEPA (ICS) : %{sepa_creditor_identifier}'
      _de: 'Gläubiger-Identifikationsnummer: %{sepa_creditor_identifier}'
      _it: 'Identificativo del creditore SEPA: %{sepa_creditor_identifier}'
      _nl: 'Incassant ID: %{sepa_creditor_identifier}'
    creditor_line:
      _en: 'Creditor: %{creditor_name}, %{creditor_street}, %{creditor_zip} %{creditor_city}'
