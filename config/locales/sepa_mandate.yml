    refund_notice:
      _en: 'Note: As part of your rights, you are entitled to a refund from your bank under the terms and conditions of your agreement with your bank. A refund must be claimed within 8 weeks starting from the date on which your account was debited.'
      _fr: 'Note : Vous bénéficiez du droit d''être remboursé par votre banque selon les conditions décrites dans la convention que vous avez passée avec elle. Toute demande de remboursement doit être présentée dans les 8 semaines suivant la date de débit de votre compte.'
      _de: 'Hinweis: Ich kann innerhalb von acht Wochen, beginnend mit dem Belastungsdatum, die Erstattung des belasteten Betrags verlangen. Es gelten dabei die mit meinem Kreditinstitut vereinbarten Bedingungen.'
      _it: 'Nota: Il debitore ha diritto al rimborso dalla propria banca secondo gli accordi ed alle condizioni che regolano il rapporto con quest''ultima. Se del caso, il rimborso deve essere richiesto nel termine di 8 settimane a decorrere dalla data di addebito in conto.'
      _nl: 'Let op: Als je het niet eens bent met deze afschrijving kun je deze laten terugboeken. Neem hiervoor binnen acht weken na afschrijving contact op met je bank. Vraag je bank naar de voorwaarden.'
