      _de: 'Zahlungsempfänger: %{creditor_name}, %{creditor_street}, %{creditor_zip} %{creditor_city}'
      _it: 'Creditore: %{creditor_name}, %{creditor_street}, %{creditor_zip} %{creditor_city}'
      _nl: 'Incassant: %{creditor_name}, %{creditor_street}, %{creditor_zip} %{creditor_city}'
    mandate_reference_line:
