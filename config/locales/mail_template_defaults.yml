        _de: Zugang zu meiner Mitgliederseite
        _it: Accedere alla mia pagina di socio
        _nl: Toegang tot mijn ledenpagina
      resubscribe_paragraph:
        _en: If you ever wish to subscribe again in the future, don't hesitate to get in touch.
        _fr: Si vous souhaitez vous réabonner à l'avenir, n'hésitez pas à nous contacter.
        _de: Sollten Sie in Zukunft erneut abonnieren wollen, können Sie sich gerne bei uns melden.
        _it: Se in futuro desiderate abbonarvi nuovamente, non esitate a contattarci.
        _nl: Mocht u zich in de toekomst opnieuw willen abonneren, neem dan gerust contact met ons op.
      thank_you_paragraph:
        _en: We wanted to thank you for having been a member. We hope your experience was a positive one.
