      view_billing_paragraph:
        _en: You can always view your invoices and payments from your member page.
        _fr: Vous pouvez consulter à tout moment vos factures et paiements depuis votre page de membre.
        _de: Schauen Sie Ihre Rechnungen und Einzahlungen auf Ihrer Mitgliederseite nach.
        _it: In qualsiasi momento, dalla pagina di socio, potete consultare le vostre fatture e i vostri pagamenti.
        _nl: U kunt uw facturen en betalingen altijd bekijken vanaf uw ledenpagina.
    invoice_created:
      invoice_closed_notice:
        _en: Considering previous payments, this invoice is considered paid and is sent for informational purposes only.
        _fr: En tenant compte des paiements précédents, cette facture est considérée comme payée et est envoyée uniquement à titre d'information.
        _de: Unter Berücksichtigung der bisherigen Einzahlungen gilt diese Rechnung als bezahlt und wird nur informativ geschickt.
        _it: Tenendo conto dei pagamenti precedenti, questa fattura è considerata pagata e viene inviata solo a titolo informativo.
        _nl: Gezien eerdere betalingen wordt deze factuur als betaald beschouwd en wordt alleen ter informatie verzonden.
      invoice_partially_paid_notice:
        _en: 'Considering previous payments, the remaining amount to be paid is: {{ invoice.missing_amount }}'
        _fr: 'En tenant compte des paiements précédents, le montant restant à payer est de: {{ invoice.missing_amount }}'
        _de: Unter Berücksichtigung der bisherigen Einzahlungen muss der restliche Betrag von {{ invoice.missing_amount }} noch beglichen werden.
        _it: 'Tenendo conto dei pagamenti precedenti, il montante che deve essere ancora pagato è di: {{ invoice.missing_amount }}'
        _nl: 'Gezien eerdere betalingen is het resterende te betalen bedrag: {{ invoice.missing_amount }}'
