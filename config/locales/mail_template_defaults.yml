        _it: Il vostro impegno era di {{ bidding_round_pledge.basket_size_price }} per parte.
        _nl: U heeft {{ bidding_round_pledge.basket_size_price }} per deel geboden.
      review_membership_paragraph:
        _en: You can review the details of your membership at any time.
        _fr: Vous pouvez consulter les détails de votre abonnement à tout moment.
        _de: Die Details der Mitgliedschaft können jederzeit eingesehen werden.
        _it: Potete consultare in qualsiasi momento i dettagli del vostro abbonamento.
        _nl: U kunt de details van uw lidmaatschap op elk moment bekijken.
      round_failed_paragraph:
        _en: 'Bidding round #{{ bidding_round.number }} did not reach its target.'
        _fr: Le tour d'engagement n°{{ bidding_round.number }} n'a pas atteint son objectif.
        _de: Die Beitragsrunde Nr. {{ bidding_round.number }} hat ihr Ziel nicht erreicht.
        _it: Il turno di impegno n°{{ bidding_round.number }} non ha raggiunto il suo obiettivo.
        _nl: 'Biedronde #{{ bidding_round.number }} heeft zijn doel niet bereikt.'
    bidding_round_opened:
      make_pledge_paragraph:
        _en: You can make your pledge for the coming year directly from your account.
        _fr: Vous pouvez fixer votre montant pour l'année à venir directement depuis votre compte.
        _de: Den Beitrag für das kommende Jahr jetzt direkt im Mitgliedskonto festlegen.
        _it: Potete fissare il vostro importo per il prossimo anno direttamente dal vostro account.
        _nl: U kunt uw bod voor het komende jaar direct vanaf uw account uitbrengen.
      pledge_button:
