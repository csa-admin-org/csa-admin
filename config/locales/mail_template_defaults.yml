        _it: Ecco la vostra nuova fattura, per il suo ordine N° {{ invoice.entity_number }}, tutti i dettagli si trovano nel PDF allegato.
        _nl: Hier is uw nieuwe factuur voor uw bestelling nummer {{ invoice.entity_number }}, alle details staan in de bijgevoegde PDF.
      new_invoice_paragraph:
