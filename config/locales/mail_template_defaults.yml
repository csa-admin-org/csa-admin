        _it: 'Promemoria: il turno di impegno n°{{ bidding_round.number }} è ancora aperto.'
        _nl: 'Herinnering: biedronde #{{ bidding_round.number }} is nog steeds open.'
    invoice_cancelled:
      contact_paragraph:
        _en: Feel free to contact us if you have any questions.
        _fr: N'hésitez pas à nous contacter si vous avez des questions.
        _de: Bitte zögern Sie nicht, uns zu kontaktieren, wenn Sie Fragen haben.
        _it: Non esiti a contattarci per qualsiasi domanda.
        _nl: Neem gerust contact met ons op als u vragen heeft.
      invoice_cancelled_paragraph:
        _en: 'Your invoice #{{ invoice.number }} from {{ invoice.date }} has been cancelled.'
        _fr: 'Votre facture #{{ invoice.number }} du {{ invoice.date }} vient d''être annulée.'
        _de: 'Ihre Rechnung #{{ invoice.number }} vom {{ invoice.date }} wurde soeben storniert.'
        _it: 'La vostra fattura #{{ invoice.number }} datata {{ invoice.date }} è stata appena annullata.'
        _nl: 'Uw factuur #{{ invoice.number }} van {{ invoice.date }} is geannuleerd.'
