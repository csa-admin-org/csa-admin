        _fr: Fixer mon montant
        _de: Beitrag festlegen
        _it: Imposta il mio importo
        _nl: Breng uw bod uit
      round_opened_paragraph:
        _en: 'Bidding round #{{ bidding_round.number }} is now open.'
        _fr: Le tour d'engagement n°{{ bidding_round.number }} est maintenant ouvert.
        _de: Die Beitragsrunde Nr. {{ bidding_round.number }} ist jetzt geöffnet.
        _it: Il turno di impegno n°{{ bidding_round.number }} è ora aperto.
        _nl: 'Biedronde #{{ bidding_round.number }} is nu open.'
    bidding_round_opened_reminder:
      no_pledge_yet_paragraph:
        _en: You haven't made a pledge yet. It only takes a minute to set yours now.
        _fr: Vous n'avez pas encore fixé de montant. Cela ne prend qu'une minute pour le définir maintenant.
        _de: Es wurde noch kein Beitrag zugesagt. Es dauert nur eine Minute, den Beitrag jetzt festzulegen.
        _it: Non avete ancora fissato un importo. Ci vuole solo un minuto per impostarlo ora.
        _nl: U heeft nog geen bod uitgebracht. Het duurt slechts een minuut om uw bod nu in te stellen.
