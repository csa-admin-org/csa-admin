    invoice_overdue_notice:
      already_paid_paragraph:
        _en: If your payment has already been made, please disregard this notice.
        _fr: Si votre paiement s'est croisé avec ce rappel, nous vous saurions gré de ne pas en tenir compte.
        _de: Wenn Sie die Rechnung in der Zwischenzeit eingezahlt haben, können Sie diese Mahnung ignorieren.
        _it: Se il vostro pagamento nel frattempo è già stato eseguito vi chidiamo di non considerare questo richiamo.
        _nl: Als uw betaling reeds is verricht, gelieve deze kennisgeving te negeren.
      member_page_button:
        _en: Access my member page
        _fr: Accéder à ma page de membre
        _de: Zugang zu meiner Mitgliederseite
        _it: Accedere alla mia pagina di socio
        _nl: Toegang tot mijn ledenpagina
      overdue_notice_paragraph:
        _en: 'Unless there is an error or omission on our part, we have not received full payment for invoice #{{ invoice.number }} dated {{ invoice.date }}.'
        _fr: 'Sauf erreur ou omission de notre part, le paiement de la facture #{{ invoice.number }} datée du {{ invoice.date }} ne nous est pas complètement parvenu.'
        _de: 'Irrtum vorbehalten wurde die Rechnung #{{ invoice.number }} vom {{ invoice.date }} nicht vollständig bezahlt.'
        _it: 'Salvo errori o omissioni da parte nostra, il pagamento della fattura #{{ invoice.number }} datata {{ invoice.date }} non ci è parvenuto completamene.'
        _nl: 'Tenzij er een fout of verzuim van onze kant is, hebben wij geen volledige betaling ontvangen voor factuur #{{ invoice.number }} gedateerd {{ invoice.date }}.'
      please_pay_paragraph:
        _en: Please proceed with the payment as soon as possible. Attached is a duplicate of this invoice for your reference.
        _fr: Nous vous prions de bien vouloir procéder à son règlement dans les meilleurs délais, et vous adressons, à toutes fins utiles, un duplicata de cette facture en pièce jointe.
        _de: Begleichen Sie bitte diesen Betrag so schnell wie möglich. Sie finden im Anhang noch eine Kopie dieser Rechnung.
        _it: Vi preghiamo gentilmente di procedere al pagamento il più presto possibile e per praticità vi inviamo in allegato un duplicato della fattura in questione.
        _nl: Gelieve zo spoedig mogelijk over te gaan tot betaling. Bijgevoegd is een duplicaat van deze factuur ter referentie.
      remaining_amount_notice:
        _en: 'The remaining amount to be paid is: {{ invoice.missing_amount }}'
        _fr: 'Le montant restant à payer est de: {{ invoice.missing_amount }}'
        _de: Der restliche Betrag von {{ invoice.missing_amount }} muss beglichen werden.
        _it: 'Il montante che deve essere ancora pagato è di: {{ invoice.missing_amount }}'
        _nl: 'Het resterende te betalen bedrag is: {{ invoice.missing_amount }}'
      thank_you_paragraph:
        _en: Thank you in advance for your prompt payment. If you have any questions, please feel free to contact us.
        _fr: Nous vous remercions par avance pour votre prochain règlement, et restons à votre entière disposition pour toute question.
        _de: Vielen Dank im Voraus für Ihre Einzahlung. Bei Fragen stehen wir Ihnen gerne zur Verfügung.
        _it: Vi ringraziamo anticipatamente per il vostro prossimo pagamento e rimaniamo a vostra disposizione per qualsiasi domanda.
        _nl: Dank u bij voorbaat voor uw snelle betaling. Indien u vragen heeft, aarzel niet om contact met ons op te nemen.
      view_billing_paragraph:
