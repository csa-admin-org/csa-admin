        _de: Bitte füllen Sie das Verlängerungsformular aus, um zu bestätigen, ob Sie Ihr Abonnement fortsetzen möchten oder nicht.
        _it: Vi preghiamo di compilare il modulo di rinnovo per confermare se desiderate continuare o meno.
