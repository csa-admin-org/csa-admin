    basket_final:
      final_basket_paragraph/bag:
        _en: Today is the delivery day of your final bag.
        _fr: C'est le jour de livraison de votre tout dernier sac.
        _de: Heute ist der Liefertag Ihrer letzten Tasche.
        _it: Oggi è il giorno di consegna della vostra ultima borsa.
        _nl: Vandaag is de leveringsdag van uw laatste tas.
      final_basket_paragraph/basket:
        _en: Today is the delivery day of your final basket.
        _fr: C'est le jour de livraison de votre tout dernier panier.
        _de: Heute ist der Liefertag Ihres letzten Korbs.
        _it: Oggi è il giorno di consegna della vostra ultima cesta.
        _nl: Vandaag is de leveringsdag van uw laatste mand.
      final_basket_paragraph/cone:
        _en: Today is the delivery day of your final cone.
        _fr: C'est le jour de livraison de votre tout dernier cornet.
        _de: Heute ist der Liefertag Ihrer letzten Tüte.
        _it: Oggi è il giorno di consegna del vostro ultimo cono.
        _nl: Vandaag is de leveringsdag van uw laatste zak.
      final_basket_paragraph/package:
        _en: Today is the delivery day of your final package.
        _fr: C'est le jour de livraison de votre tout dernier colis.
        _de: Heute ist der Liefertag Ihres letzten Pakets.
        _it: Oggi è il giorno di consegna del vostro ultimo pacco.
        _nl: Vandaag is de leveringsdag van uw laatste pakket.
      final_basket_paragraph/share:
        _en: Today is the delivery day of your final share.
        _fr: C'est le jour de livraison de votre toute dernière part.
        _de: Heute ist der Liefertag Ihres letzten Anteils.
        _it: Oggi è il giorno di consegna della vostra ultima parte.
        _nl: Vandaag is de leveringsdag van uw laatste deel.
      member_page_button:
