    absence_included_reminder:
      absences_included_paragraph:
        _en: Your membership includes {{ membership.absences_included }} absences, and you still have {{ membership.absences_remaining }} unused.
        _fr: Votre abonnement inclut {{ membership.absences_included }} absences, et il vous en reste {{ membership.absences_remaining }} non utilisée(s).
        _de: Ihr Abonnement umfasst {{ membership.absences_included }} Abwesenheiten, und Sie haben noch {{ membership.absences_remaining }} ungenutzt.
        _it: Il vostro abbonamento include {{ membership.absences_included }} assenze, e ve ne restano ancora {{ membership.absences_remaining }} non utilizzate.
        _nl: Uw lidmaatschap omvat {{ membership.absences_included }} afwezigheden, en u heeft er nog {{ membership.absences_remaining }} ongebruikt.
      manage_absences_button:
        _en: Manage my absences
        _fr: Gérer mes absences
        _de: Meine Abwesenheiten verwalten
        _it: Gestisci le mie assenze
        _nl: Mijn afwezigheden beheren
      provisional_absence_baskets_paragraph/bag:
        _en: These bags will <strong>not be delivered</strong> unless you request them. If you would like to receive any of these deliveries, you can do so from your account.
        _fr: Ces sacs <strong>ne seront pas livrés</strong> sauf si vous en faites la demande. Si vous souhaitez recevoir certaines de ces livraisons, vous pouvez le faire depuis votre compte.
        _de: Diese Taschen werden <strong>nicht geliefert</strong>, es sei denn, Sie fordern sie an. Wenn Sie eine dieser Lieferungen erhalten möchten, können Sie dies über Ihr Konto tun.
        _it: Queste borse <strong>non saranno consegnate</strong> a meno che non le richiediate. Se desiderate ricevere alcune di queste consegne, potete farlo dal vostro account.
        _nl: Deze tassen worden <strong>niet geleverd</strong> tenzij u ze aanvraagt. Als u een van deze leveringen wilt ontvangen, kunt u dit doen via uw account.
      provisional_absence_baskets_paragraph/basket:
        _en: These baskets will <strong>not be delivered</strong> unless you request them. If you would like to receive any of these deliveries, you can do so from your account.
        _fr: Ces paniers <strong>ne seront pas livrés</strong> sauf si vous en faites la demande. Si vous souhaitez recevoir certaines de ces livraisons, vous pouvez le faire depuis votre compte.
        _de: Diese Körbe werden <strong>nicht geliefert</strong>, es sei denn, Sie fordern sie an. Wenn Sie eine dieser Lieferungen erhalten möchten, können Sie dies über Ihr Konto tun.
        _it: Queste ceste <strong>non saranno consegnate</strong> a meno che non le richiediate. Se desiderate ricevere alcune di queste consegne, potete farlo dal vostro account.
        _nl: Deze manden worden <strong>niet geleverd</strong> tenzij u ze aanvraagt. Als u een van deze leveringen wilt ontvangen, kunt u dit doen via uw account.
      provisional_absence_baskets_paragraph/cone:
        _en: These cones will <strong>not be delivered</strong> unless you request them. If you would like to receive any of these deliveries, you can do so from your account.
        _fr: Ces cornets <strong>ne seront pas livrés</strong> sauf si vous en faites la demande. Si vous souhaitez recevoir certaines de ces livraisons, vous pouvez le faire depuis votre compte.
        _de: Diese Tüten werden <strong>nicht geliefert</strong>, es sei denn, Sie fordern sie an. Wenn Sie eine dieser Lieferungen erhalten möchten, können Sie dies über Ihr Konto tun.
        _it: Questi coni <strong>non saranno consegnati</strong> a meno che non li richiediate. Se desiderate ricevere alcune di queste consegne, potete farlo dal vostro account.
        _nl: Deze zakken worden <strong>niet geleverd</strong> tenzij u ze aanvraagt. Als u een van deze leveringen wilt ontvangen, kunt u dit doen via uw account.
      provisional_absence_baskets_paragraph/package:
        _en: These packages will <strong>not be delivered</strong> unless you request them. If you would like to receive any of these deliveries, you can do so from your account.
        _fr: Ces colis <strong>ne seront pas livrés</strong> sauf si vous en faites la demande. Si vous souhaitez recevoir certaines de ces livraisons, vous pouvez le faire depuis votre compte.
        _de: Diese Pakete werden <strong>nicht geliefert</strong>, es sei denn, Sie fordern sie an. Wenn Sie eine dieser Lieferungen erhalten möchten, können Sie dies über Ihr Konto tun.
        _it: Questi pacchi <strong>non saranno consegnati</strong> a meno che non li richiediate. Se desiderate ricevere alcune di queste consegne, potete farlo dal vostro account.
        _nl: Deze pakketten worden <strong>niet geleverd</strong> tenzij u ze aanvraagt. Als u een van deze leveringen wilt ontvangen, kunt u dit doen via uw account.
      provisional_absence_baskets_paragraph/share:
        _en: These shares will <strong>not be delivered</strong> unless you request them. If you would like to receive any of these deliveries, you can do so from your account.
        _fr: Ces parts <strong>ne seront pas livrées</strong> sauf si vous en faites la demande. Si vous souhaitez recevoir certaines de ces livraisons, vous pouvez le faire depuis votre compte.
        _de: Diese Anteile werden <strong>nicht geliefert</strong>, es sei denn, Sie fordern sie an. Wenn Sie eine dieser Lieferungen erhalten möchten, können Sie dies über Ihr Konto tun.
        _it: Queste parti <strong>non saranno consegnate</strong> a meno che non le richiediate. Se desiderate ricevere alcune di queste consegne, potete farlo dal vostro account.
        _nl: Deze delen worden <strong>niet geleverd</strong> tenzij u ze aanvraagt. Als u een van deze leveringen wilt ontvangen, kunt u dit doen via uw account.
      provisional_absence_paragraph:
        _en: 'Since you haven''t used all your absences, the following deliveries will be skipped:'
        _fr: 'Comme vous n''avez pas utilisé toutes vos absences, les livraisons suivantes seront ignorées :'
        _de: 'Da Sie nicht alle Ihre Abwesenheiten genutzt haben, werden die folgenden Lieferungen übersprungen:'
        _it: 'Poiché non avete utilizzato tutte le vostre assenze, le seguenti consegne saranno saltate:'
        _nl: 'Aangezien u niet al uw afwezigheden heeft gebruikt, worden de volgende leveringen overgeslagen:'
      provisional_delivery_absence_paragraph:
        _en: If you do not wish to receive some of these deliveries, you can still report an absence from your account.
        _fr: Si vous ne souhaitez pas recevoir certaines de ces livraisons, vous pouvez encore signaler une absence depuis votre compte.
        _de: Wenn Sie einige dieser Lieferungen nicht erhalten möchten, können Sie über Ihr Konto noch eine Abwesenheit melden.
        _it: Se non desiderate ricevere alcune di queste consegne, potete ancora segnalare un'assenza dal vostro account.
        _nl: Als u sommige van deze leveringen niet wilt ontvangen, kunt u nog steeds een afwezigheid melden via uw account.
      provisional_delivery_paragraph:
        _en: 'Since you haven''t used all your absences, the following deliveries will now <strong>be delivered and billed</strong>:'
        _fr: 'Comme vous n''avez pas utilisé toutes vos absences, les livraisons suivantes seront désormais <strong>livrées et facturées</strong> :'
        _de: 'Da Sie nicht alle Ihre Abwesenheiten genutzt haben, werden die folgenden Lieferungen nun <strong>geliefert und berechnet</strong>:'
        _it: 'Poiché non avete utilizzato tutte le vostre assenze, le seguenti consegne saranno ora <strong>consegnate e fatturate</strong>:'
        _nl: 'Aangezien u niet al uw afwezigheden heeft gebruikt, zullen de volgende leveringen nu <strong>geleverd en gefactureerd</strong> worden:'
      view_deliveries_button:
        _en: View my deliveries
        _fr: Voir mes livraisons
        _de: Meine Lieferungen anzeigen
        _it: Visualizza le mie consegne
        _nl: Mijn leveringen bekijken
