      _fr: Permet de facturer un certain montant (par ex. pour des cagettes réutilisables) aux nouveaux membres (après leur éventuelle période d'essai).
      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Kisten) von neuen Mitgliedern zu berechnen (nach der eventuellen Probezeit).
      _it: Permette di fatturare un importo fisso (ad es. per cassette riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare kratten) aan nieuwe leden aan te rekenen (na de eventuele proefperiode).
