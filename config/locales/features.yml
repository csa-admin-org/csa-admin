      _fr: Permet aux membres de commander des produits supplémentaires à chaque livraison de cagettes.
      _de: Ermöglicht es Mitgliedern, bei jeder Lieferung von Kisten zusätzliche Produkte zu bestellen.
      _it: Permette ai soci di ordinare prodotti aggiuntivi con ogni consegna della cassetta.
