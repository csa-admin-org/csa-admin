    basket_price_extra_hint/bag:
      _en: Allows members to pay an additional amount for each bag.<br/>Please <a href="/handbook/basket_price_extra">consult the manual</a> for more information.
      _fr: Permet de proposer aux membres de payer un montant supplémentaire pour chaque sac.<br/>Merci de <a href="/handbook/basket_price_extra">consulter le manuel</a> pour plus d'informations.
      _de: Ermöglicht es Mitgliedern, einen zusätzlichen Betrag für jede Tasche zu zahlen.<br/>Bitte <a href="/handbook/basket_price_extra">konsultieren Sie das Handbuch</a> für weitere Informationen.
