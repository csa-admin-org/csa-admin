    bidding_round_hint/bag:
      _en: Enables members to pledge their bag size price through organized bidding rounds.<br/>Please <a href="/handbook/bidding_round">consult the manual</a> for more information.
      _fr: Permet aux membres de s'engager sur le prix de leur sac en organisant des tours d'engagement.<br/>Merci de <a href="/handbook/bidding_round">consulter le manuel</a> pour plus d'informations.
