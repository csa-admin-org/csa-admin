    basket_content_hint/bag:
      _en: Provides a tool to calculate the content and value of bags for each delivery.<br/>Please <a href="/handbook/basket_content">consult the manual</a> for more information.
      _fr: Fournit un outil pour calculer le contenu et la valeur des sacs pour chaque livraison.<br/>Merci de <a href="/handbook/basket_content">consulter le manuel</a> pour plus d'informations.
