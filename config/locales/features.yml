    vat:
      _en: VAT
      _fr: TVA
      _de: MwSt.
      _it: IVA
      _nl: Btw
    vat_hint:
      _en: Allows configuring VAT numbers and rates when invoices must include VAT.
      _fr: Permet de configurer les numéros et taux de TVA lorsque les factures doivent inclure la TVA.
      _de: Ermöglicht die Konfiguration von MwSt.-Nummern und -Sätzen, wenn Rechnungen MwSt. enthalten müssen.
      _it: Permette di configurare numeri e aliquote IVA quando le fatture devono includere l'IVA.
      _nl: Maakt het mogelijk btw-nummers en -tarieven te configureren wanneer facturen btw moeten bevatten.
