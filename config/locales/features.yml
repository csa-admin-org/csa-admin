_:
  features:
    absence:
      _en: Absence
      _fr: Absence
      _de: Abwesenheit
      _it: Assenza
      _nl: Afwezigheid
    absence_hint:
      _en: Allows managing member absences. Members can also announce their absences from their account.
      _fr: Permet de gérer les absences des membres. Les membres peuvent également annoncer leurs absences depuis leur compte.
      _de: Ermöglicht es, die Abwesenheiten von Mitgliedern zu verwalten. Mitglieder können ihre Abwesenheiten auch von ihrem Konto aus ankündigen.
      _it: Permette di gestire le assenze dei soci. I soci possono anche annunciare le loro assenze dal loro account.
      _nl: Maakt het mogelijk om afwezigheden van leden te beheren. Leden kunnen ook zelf afwezigheden melden vanuit het account.
    activity:
      _en: Member participation
      _fr: Participation des membres
      _de: Beteiligung der Mitglieder
      _it: Partecipazione dei soci
      _nl: Deelname van leden
    activity_hint:
      _en: Allows managing activities carried out by members.
      _fr: Permet de gérer des activités effectuées par les membres.
      _de: Ermöglicht die Verwaltung von Aktivitäten, die von Mitgliedern durchgeführt werden.
      _it: Permette di gestire le attività svolte dai soci.
      _nl: Maakt het mogelijk om activiteiten die door leden worden uitgevoerd te beheren.
    annual_fee:
      _en: Annual fee
      _fr: Cotisation annuelle
      _de: Jahresbeitrag
      _it: Quota annuale
      _nl: Jaarlijkse bijdrage
    annual_fee_hint:
      _en: Allows billing an annual fee to support members and/or active members alongside their membership.
      _fr: Permet de facturer une cotisation annuelle aux membres de soutien et/ou aux membres actifs en complément de leur abonnement.
      _de: Ermöglicht die Verrechnung eines Jahresbeitrags an Fördermitglieder und/oder aktive Mitglieder zusätzlich zu ihrem Abonnement.
      _it: Permette di fatturare una quota annuale ai soci sostenitori e/o ai soci attivi in aggiunta al loro abbonamento.
      _nl: Maakt het mogelijk een jaarlijkse bijdrage te factureren aan steunleden en/of actieve leden naast hun lidmaatschap.
    basket_content/bag:
      _en: Bag content
      _fr: Contenu sac
      _de: Tascheninhalt
      _it: Contenuto borsa
      _nl: Tasinhoud
    basket_content/basket:
      _en: Basket content
      _fr: Contenu panier
      _de: Korbinhalt
      _it: Contenuto cesta
      _nl: Mandinhoud
    basket_content/cone:
      _en: Cone content
      _fr: Contenu cornet
      _de: Tüteninhalt
      _it: Contenuto cono
      _nl: Zakinhoud
    basket_content/crate:
      _en: Crate content
      _fr: Contenu cagette
      _de: Kisteninhalt
      _it: Contenuto cassetta
      _nl: Kratinhoud
    basket_content/package:
      _en: Package content
      _fr: Contenu colis
      _de: Paketinhalt
      _it: Contenuto pacco
      _nl: Pakketinhoud
    basket_content/share:
      _en: Share content
      _fr: Contenu part
      _de: Anteilsinhalt
      _it: Contenuto parte
      _nl: Deelinhoud
    basket_content_hint/bag:
      _en: Provides a tool to calculate the content and value of bags for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des sacs pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Taschen für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore delle borse per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van tassen voor elke levering te berekenen.
    basket_content_hint/basket:
      _en: Provides a tool to calculate the content and value of baskets for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des paniers pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Körbe für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore delle ceste per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van manden voor elke levering te berekenen.
    basket_content_hint/cone:
      _en: Provides a tool to calculate the content and value of cones for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des cornets pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Tüten für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore dei coni per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van zakken voor elke levering te berekenen.
    basket_content_hint/crate:
      _en: Provides a tool to calculate the content and value of crates for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des cagettes pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Kisten für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore delle cassette per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van kratten voor elke levering te berekenen.
    basket_content_hint/package:
      _en: Provides a tool to calculate the content and value of packages for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des colis pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Pakete für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore dei pacchi per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van pakketten voor elke levering te berekenen.
    basket_content_hint/share:
      _en: Provides a tool to calculate the content and value of shares for each delivery.
      _fr: Fournit un outil pour calculer le contenu et la valeur des parts pour chaque livraison.
      _de: Bietet ein Tool zur Berechnung des Inhalts und des Werts der Anteile für jede Lieferung.
      _it: Fornisce uno strumento per calcolare il contenuto e il valore delle parti per ogni consegna.
      _nl: Biedt een hulpmiddel om de inhoud en waarde van delen voor elke levering te berekenen.
    basket_price_extra:
      _en: Extra price
      _fr: Prix extra
      _de: Preis Extra
      _it: Prezzo extra
      _nl: Extra prijs
    basket_price_extra_hint:
      _en: Allows members to pay an additional amount for each delivery.
      _fr: Permet de proposer aux membres de payer un montant supplémentaire pour chaque livraison.
      _de: Ermöglicht es Mitgliedern, einen zusätzlichen Betrag für jede Lieferung zu zahlen.
      _it: Permette ai soci di pagare un importo supplementare per ogni consegna.
      _nl: Stelt leden in staat een extra bedrag te betalen voor elke levering.
    bidding_round:
      _en: Bidding round
      _fr: Tour d'engagement
      _de: Beitragsrunde
      _it: Turno di impegno
      _nl: Toezeggingsronde
    bidding_round_hint/bag:
      _en: Enables members to pledge their bag size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur sac en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Taschengrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione della loro borsa tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun tasgrootteprijs toe te zeggen.
    bidding_round_hint/basket:
      _en: Enables members to pledge their basket size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur panier en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Korbgrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione della loro cesta tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun mandgrootteprijs toe te zeggen.
    bidding_round_hint/cone:
      _en: Enables members to pledge their cone size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur cornet en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Tütengrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione del loro cono tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun zakgrootteprijs toe te zeggen.
    bidding_round_hint/crate:
      _en: Enables members to pledge their crate size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur cagette en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Kistengrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione della loro cassetta tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun kratgrootteprijs toe te zeggen.
    bidding_round_hint/package:
      _en: Enables members to pledge their package size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur colis en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Paketgrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione del loro pacco tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun pakketgrootteprijs toe te zeggen.
    bidding_round_hint/share:
      _en: Enables members to pledge their share size price through organized bidding rounds.
      _fr: Permet aux membres de s'engager sur le prix de leur part en organisant des tours d'engagement.
      _de: Ermöglicht Mitgliedern, den Beitrag für ihre Anteilsgrösse über organisierte Beitragsrunden selbst festzulegen.
      _it: Consente ai soci di fissare il prezzo della dimensione della loro parte tramite turni di impegno organizzati.
      _nl: Stelt leden in staat om via georganiseerde toezeggingsrondes hun deelgrootteprijs toe te zeggen.
    contact_sharing:
      _en: Contact sharing
      _fr: Copaniérage
      _de: Freigeben von Kontaktinformationen
      _it: Condivisione di informazioni di contatto
      _nl: Delen van contactgegevens
    contact_sharing_hint:
      _en: Allows sharing contact information between members of the same depot.
      _fr: Rends possible le partage des coordonnées entre membres d'un même dépôt.
      _de: Ermöglicht das Teilen von Kontaktdaten zwischen Mitgliedern desselben Depots.
      _it: Rende possibile la condivisione dei dati di contatto tra i soci dello stesso punto di ritiro.
      _nl: Maakt het delen van contactgegevens mogelijk tussen leden van hetzelfde depot.
    local_currency:
      _en: Local currency
      _fr: Monnaie locale
      _de: Regionalwährung
      _it: Valuta locale
      _nl: Lokale valuta
    local_currency_hint:
      _en: Allows to create invoices in a local currency in addition to the national currency.
      _fr: Permet de créer des factures en monnaie locale en plus de la monnaie nationale.
      _de: Ermöglicht das Erstellen von Rechnungen in einer regionalen Währung zusätzlich zur nationalen Währung.
      _it: Consente di creare fatture in valuta locale oltre alla valuta nazionale.
      _nl: Stelt in staat om facturen in lokale valuta te creëren, naast de nationale valuta.
    member_information:
      _en: Information Page
      _fr: Page d'information
      _de: Informationsseite
      _it: Pagina informativa
      _nl: Informatiepagina
    member_information_hint:
      _en: Allows showing an information page in the member account to share texts with your members, for example confidential information.
      _fr: Permet d'afficher une page d'information dans le compte membre afin de partager des textes avec vos membres, par exemple des informations confidentielles.
      _de: Ermöglicht die Anzeige einer Informationsseite im Mitgliederkonto, um Texte mit Mitgliedern zu teilen, zum Beispiel vertrauliche Informationen.
      _it: Permette di mostrare una pagina informativa nell'account del socio per condividere testi con i soci, ad esempio informazioni riservate.
      _nl: Maakt het mogelijk een informatiepagina in het ledenaccount te tonen om teksten met je leden te delen, bijvoorbeeld vertrouwelijke informatie.
    new_member_fee:
      _en: New member fee
      _fr: Frais d'adhésion
      _de: Teilnahmegebühr
      _it: Quota di adesione
      _nl: Inschrijvingskosten voor nieuwe leden
    new_member_fee_hint/bag:
      _en: Allows charging a specific amount (e.g., for reusable bags) to new members (after their potential trial period).
      _fr: Permet de facturer un certain montant (par ex. pour des sacs réutilisables) aux nouveaux membres (après leur éventuelle période d'essai).
      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Taschen) von neuen Mitgliedern zu berechnen (nach der eventuellen Probezeit).
      _it: Permette di fatturare un importo fisso (ad es. per borse riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare tassen) aan nieuwe leden aan te rekenen (na de eventuele proefperiode).
