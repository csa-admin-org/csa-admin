      _en: Allows charging a specific amount (e.g., for reusable packages) to new members (after their potential trial period).
      _fr: Permet de facturer un certain montant (par ex. pour des colis réutilisables) aux nouveaux membres (après leur éventuelle période d'essai).
      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Pakete) von neuen Mitgliedern zu berechnen (nach der eventuellen Probezeit).
      _it: Permette di fatturare un importo fisso (ad es. per pacchi riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare pakketten) aan nieuwe leden aan te rekenen (na de eventuele proefperiode).
    new_member_fee_hint/share:
      _en: Allows charging a specific amount (e.g., for reusable containers) to new members (after their potential trial period).
      _fr: Permet de facturer un certain montant (par ex. pour des contenants réutilisables) aux nouveaux membres (après leur éventuelle période d'essai).
      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Behälter) von neuen Mitgliedern zu berechnen (nach der eventuellen Probezeit).
      _it: Permette di fatturare un importo fisso (ad es. per contenitori riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare houders) aan nieuwe leden aan te rekenen (na de eventuele proefperiode).
    sepa:
      _en: SEPA
      _fr: SEPA
      _de: SEPA
      _it: SEPA
      _nl: SEPA
    sepa_hint:
      _en: Allows configuring SEPA creditor settings for direct debit.
      _fr: Permet de configurer les paramètres créancier SEPA pour le prélèvement automatique.
      _de: Ermöglicht die Konfiguration von SEPA-Gläubigereinstellungen für Lastschriften.
      _it: Permette di configurare le impostazioni creditore SEPA per l'addebito diretto.
      _nl: Maakt het mogelijk SEPA-crediteurinstellingen te configureren voor automatische incasso.
    shares:
      _en: Cooperative shares
      _fr: Parts sociales
      _de: Anteilscheine
      _it: Quote sociali
      _nl: Aandelen
    shares_hint:
      _en: Allows billing the cooperative shares members are required to hold.
      _fr: Permet de facturer les parts sociales que les membres doivent détenir.
      _de: Ermöglicht die Verrechnung der Anteilscheine, die Mitglieder halten müssen.
      _it: Permette di fatturare le quote sociali cooperative che i soci devono detenere.
      _nl: Maakt het mogelijk de coöperatieve aandelen te factureren die leden moeten hebben.
    shop:
      _en: Shop
      _fr: Épicerie
      _de: Hofladen
      _it: Bottega
      _nl: Winkel
    shop_hint/bag:
      _en: Allows members to order additional products with each bag delivery.
      _fr: Permet aux membres de commander des produits supplémentaires à chaque livraison de sacs.
      _de: Ermöglicht es Mitgliedern, bei jeder Lieferung von Taschen zusätzliche Produkte zu bestellen.
      _it: Permette ai soci di ordinare prodotti aggiuntivi con ogni consegna della borsa.
      _nl: Stelt leden in staat om extra producten te bestellen bij elke taslevering.
    shop_hint/basket:
      _en: Allows members to order additional products with each basket delivery.
      _fr: Permet aux membres de commander des produits supplémentaires à chaque livraison de paniers.
      _de: Ermöglicht es Mitgliedern, bei jeder Lieferung von Körben zusätzliche Produkte zu bestellen.
      _it: Permette ai soci di ordinare prodotti aggiuntivi con ogni consegna della cesta.
      _nl: Stelt leden in staat om extra producten te bestellen bij elke mandlevering.
    shop_hint/cone:
