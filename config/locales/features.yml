    new_member_fee_hint/bag:
      _en: Allows charging a specific amount (e.g., for reusable bags) to new members (after their potential trial period).<br/>Please <a href="/handbook/new_member_fee">consult the manual</a> for more information.
      _fr: Permet de facturer un certain montant (par ex. pour des sacs réutilisables) aux nouveaux membres (après leur éventuelle période d'essai).<br/>Merci de <a href="/handbook/new_member_fee">consulter le manuel</a> pour plus d'informations.
      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Taschen) von neuen Mitgliedern zu berechnen (nach ihrer eventuellen Probezeit).<br/>Bitte <a href="/handbook/new_member_fee">konsultieren Sie das Handbuch</a> für weitere Informationen.
      _it: Permette di fatturare un importo fisso (ad es. per borse riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).<br/>Si prega <a href="/handbook/new_member_fee">di consultare il manuale</a> per ulteriori informazioni.
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare tassen) aan nieuwe leden aan te rekenen (na hun eventuele proefperiode).<br/>Raadpleeg <a href="/handbook/new_member_fee">de handleiding</a> voor meer informatie.
