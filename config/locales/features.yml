      _de: Ermöglicht es, einen bestimmten Betrag (z.B. für wiederverwendbare Körbe) von neuen Mitgliedern zu berechnen (nach der eventuellen Probezeit).
      _it: Permette di fatturare un importo fisso (ad es. per ceste riutilizzabili) ai nuovi soci (dopo il loro eventuale periodo di prova).
      _nl: Maakt het mogelijk een specifiek bedrag (bijv. voor herbruikbare manden) aan nieuwe leden aan te rekenen (na de eventuele proefperiode).
