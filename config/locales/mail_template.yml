        _fr: Envoyé le jour de la livraison du dernier colis de chaque abonnement, uniquement si l'abonnement est renouvelé.
        _de: Wird gesendet am Tag der Auslieferung des letzten Pakets jedes Abonnements, nur wenn das Abonnement verlängert wird.
        _it: Inviato il giorno della consegna dell'ultimo pacco di ogni abbonamento, solo se l'abbonamento viene rinnovato.
        _nl: Verzonden op de leveringsdag van het laatste pakket van elk lidmaatschap, alleen als het lidmaatschap wordt vernieuwd.
      basket_last/share:
        _en: Sent on the delivery day of the last share of each membership, only if the membership is renewed.
        _fr: Envoyé le jour de la livraison de la dernière part de chaque abonnement, uniquement si l'abonnement est renouvelé.
        _de: Wird gesendet am Tag der Auslieferung des letzten Anteils jedes Abonnements, nur wenn das Abonnement verlängert wird.
        _it: Inviato il giorno della consegna dell'ultima parte di ogni abbonamento, solo se l'abbonamento viene rinnovato.
        _nl: Verzonden op de leveringsdag van het laatste deel van elk lidmaatschap, alleen als het lidmaatschap wordt vernieuwd.
      basket_last_trial/bag:
        _en: Sent on the day of delivery of the last trial bag to ask the member if they wish to continue their membership until the end of the fiscal year.
        _fr: Envoyé le jour de la livraison du dernier sac à l'essai afin de demander au membre si il désire continuer son abonnement jusqu'à la fin de l'année fiscale.
        _de: Wird gesendet am Tag der Auslieferung der letzten Probe-Tasche, um das Mitglied zu fragen, ob es sein Abonnement bis zum Ende des Geschäftsjahres fortsetzen möchte.
        _it: Inviato il giorno della consegna dell'ultima borsa di prova per chiedere al socio se desidera continuare il suo abbonamento fino alla fine dell'anno fiscale.
        _nl: Verzonden op de leveringsdag van de laatste proeftas om het lid te vragen of ze hun lidmaatschap tot het einde van het boekjaar willen voortzetten.
      basket_last_trial/basket:
        _en: Sent on the day of delivery of the last trial basket to ask the member if they wish to continue their membership until the end of the fiscal year.
        _fr: Envoyé le jour de la livraison du dernier panier à l'essai afin de demander au membre si il désire continuer son abonnement jusqu'à la fin de l'année fiscale.
        _de: Wird gesendet am Tag der Auslieferung des letzten Probe-Korbs, um das Mitglied zu fragen, ob es sein Abonnement bis zum Ende des Geschäftsjahres fortsetzen möchte.
        _it: Inviato il giorno della consegna dell'ultima cesta di prova per chiedere al socio se desidera continuare il suo abbonamento fino alla fine dell'anno fiscale.
        _nl: Verzonden op de leveringsdag van de laatste proefmand om het lid te vragen of ze hun lidmaatschap tot het einde van het boekjaar willen voortzetten.
      basket_last_trial/cone:
        _en: Sent on the day of delivery of the last trial cone to ask the member if they wish to continue their membership until the end of the fiscal year.
        _fr: Envoyé le jour de la livraison du dernier cornet à l'essai afin de demander au membre si il désire continuer son abonnement jusqu'à la fin de l'année fiscale.
        _de: Wird gesendet am Tag der Auslieferung der letzten Probe-Tüte, um das Mitglied zu fragen, ob es sein Abonnement bis zum Ende des Geschäftsjahres fortsetzen möchte.
        _it: Inviato il giorno della consegna dell'ultimo cono di prova per chiedere al socio se desidera continuare il suo abbonamento fino alla fine dell'anno fiscale.
        _nl: Verzonden op de leveringsdag van de laatste proefzak om het lid te vragen of ze hun lidmaatschap tot het einde van het boekjaar willen voortzetten.
      basket_last_trial/package:
        _en: Sent on the day of delivery of the last trial package to ask the member if they wish to continue their membership until the end of the fiscal year.
        _fr: Envoyé le jour de la livraison du dernier colis à l'essai afin de demander au membre si il désire continuer son abonnement jusqu'à la fin de l'année fiscale.
        _de: Wird gesendet am Tag der Auslieferung des letzten Probe-Pakets, um das Mitglied zu fragen, ob es sein Abonnement bis zum Ende des Geschäftsjahres fortsetzen möchte.
        _it: Inviato il giorno della consegna dell'ultimo pacco di prova per chiedere al socio se desidera continuare il suo abbonamento fino alla fine dell'anno fiscale.
        _nl: Verzonden op de leveringsdag van het laatste proefpakket om het lid te vragen of ze hun lidmaatschap tot het einde van het boekjaar willen voortzetten.
      basket_last_trial/share:
        _en: Sent on the day of delivery of the last trial share to ask the member if they wish to continue their membership until the end of the fiscal year.
        _fr: Envoyé le jour de la livraison de la dernière part à l'essai afin de demander au membre si il désire continuer son abonnement jusqu'à la fin de l'année fiscale.
        _de: Wird gesendet am Tag der Auslieferung des letzten Probe-Anteils, um das Mitglied zu fragen, ob es sein Abonnement bis zum Ende des Geschäftsjahres fortsetzen möchte.
        _it: Inviato il giorno della consegna dell'ultima parte di prova per chiedere al socio se desidera continuare il suo abbonamento fino alla fine dell'anno fiscale.
        _nl: Verzonden op de leveringsdag van het laatste proefdeel om het lid te vragen of ze hun lidmaatschap tot het einde van het boekjaar willen voortzetten.
      basket_second_last_trial/bag:
        _en: Sent on the day of delivery of the second to last trial bag, one bag earlier than the last trial bag email.
        _fr: Envoyé le jour de la livraison de l'avant-dernier sac à l'essai, un sac avant l'email du dernier sac à l'essai.
        _de: Wird gesendet am Tag der Auslieferung der vorletzten Probe-Tasche, eine Tasche früher als die E-Mail der letzten Probe-Tasche.
        _it: Inviato il giorno della consegna della penultima borsa di prova, una borsa prima dell'email dell'ultima borsa di prova.
        _nl: Verzonden op de leveringsdag van de voorlaatste proeftas, één tas eerder dan de e-mail van de laatste proeftas.
      basket_second_last_trial/basket:
        _en: Sent on the day of delivery of the second to last trial basket, one basket earlier than the last trial basket email.
        _fr: Envoyé le jour de la livraison de l'avant-dernier panier à l'essai, un panier avant l'email du dernier panier à l'essai.
        _de: Wird gesendet am Tag der Auslieferung des vorletzten Probe-Korbs, einen Korb früher als die E-Mail des letzten Probe-Korbs.
        _it: Inviato il giorno della consegna della penultima cesta di prova, una cesta prima dell'email dell'ultima cesta di prova.
        _nl: Verzonden op de leveringsdag van de voorlaatste proefmand, één mand eerder dan de e-mail van de laatste proefmand.
      basket_second_last_trial/cone:
        _en: Sent on the day of delivery of the second to last trial cone, one cone earlier than the last trial cone email.
        _fr: Envoyé le jour de la livraison de l'avant-dernier cornet à l'essai, un cornet avant l'email du dernier cornet à l'essai.
        _de: Wird gesendet am Tag der Auslieferung der vorletzten Probe-Tüte, eine Tüte früher als die E-Mail der letzten Probe-Tüte.
        _it: Inviato il giorno della consegna del penultimo cono di prova, un cono prima dell'email dell'ultimo cono di prova.
        _nl: Verzonden op de leveringsdag van de voorlaatste proefzak, één zak eerder dan de e-mail van de laatste proefzak.
      basket_second_last_trial/package:
        _en: Sent on the day of delivery of the second to last trial package, one package earlier than the last trial package email.
        _fr: Envoyé le jour de la livraison de l'avant-dernier colis à l'essai, un colis avant l'email du dernier colis à l'essai.
        _de: Wird gesendet am Tag der Auslieferung des vorletzten Probe-Pakets, ein Paket früher als die E-Mail des letzten Probe-Pakets.
        _it: Inviato il giorno della consegna del penultimo pacco di prova, un pacco prima dell'email dell'ultimo pacco di prova.
        _nl: Verzonden op de leveringsdag van het voorlaatste proefpakket, één pakket eerder dan de e-mail van het laatste proefpakket.
      basket_second_last_trial/share:
        _en: Sent on the day of delivery of the second to last trial share, one share earlier than the last trial share email.
        _fr: Envoyé le jour de la livraison de l'avant-dernière part à l'essai, une part avant l'email de la dernière part à l'essai.
        _de: Wird gesendet am Tag der Auslieferung des vorletzten Probe-Anteils, einen Anteil früher als die E-Mail des letzten Probe-Anteils.
        _it: Inviato il giorno della consegna della penultima parte di prova, una parte prima dell'email dell'ultima parte di prova.
        _nl: Verzonden op de leveringsdag van het voorlaatste proefdeel, één deel eerder dan de e-mail van het laatste proefdeel.
      bidding_round_completed:
        _en: Sent to notify the members that the bidding round has been completed with success. Sent to all eligible members, even if they have not pledged.
        _fr: Envoyé pour informer les membres que le tour d'engagement est terminé avec succès. Envoyé à tous les membres concernés, même s'ils n'ont pas fixé leur montant.
        _de: Wird gesendet, um die Mitglieder zu informieren, dass die Beitragsrunde erfolgreich abgeschlossen wurde. An alle berechtigten Mitglieder gesendet, auch wenn sie keinen Betrag zugesagt haben.
        _it: Inviato per informare i soci che il turno di impegno è stato completato con successo. Inviato a tutti i soci eleggibili, anche se non hanno promesso un importo.
        _nl: Verzonden om de leden te informeren dat de biedronde succesvol is afgerond. Verzonden naar alle berechtigde leden, zelfs als ze geen bedrag hebben toegezegd.
      bidding_round_failed:
        _en: Sent to notify the members that the bidding round has failed. Sent to all eligible members, even if they have not pledged.
        _fr: Envoyé pour informer les membres que le tour d'engagement a échoué. Envoyé à tous les membres concernés, même s'ils n'ont pas fixé leur montant.
        _de: Wird gesendet, um die Mitglieder zu informieren, dass die Beitragsrunde fehlgeschlagen ist. An alle berechtigten Mitglieder gesendet, auch wenn sie keinen Betrag zugesagt haben.
        _it: Inviato per informare i soci che il turno di impegno è fallito. Inviato a tutti i soci eleggibili, anche se non hanno promesso un importo.
        _nl: Verzonden om de leden te informeren dat de biedronde is mislukt. Verzonden naar alle berechtigde leden, zelfs als ze geen bedrag hebben toegezegd.
      bidding_round_opened:
        _en: Sent when a bidding round is opened to all eligible members.
        _fr: Envoyé quand un tour d'engagement est ouvert à tous les membres concernés.
        _de: Wird gesendet, wenn eine Beitragsrunde für alle berechtigten Mitglieder geöffnet wird.
        _it: Inviato quando un turno di impegno viene aperto a tutti i soci eleggibili.
        _nl: Verzonden wanneer een biedronde wordt geopend voor alle berechtigde leden.
      bidding_round_opened_reminder:
        _en: Sent to remind the members that they have not yet pledged for the open bidding round (see <a href='/settings#bidding_round'>settings</a> for the deadline).
        _fr: Envoyé pour rappeler aux membres qu'ils n'ont pas encore fixé leur montant au tour d'engagement ouvert (voir <a href='/settings#bidding_round'>paramètres</a> pour la date limite).
        _de: Gesendet, um die Mitglieder daran zu erinnern, dass sie für die offene Beitragsrunde noch keinen Betrag zugesagt haben (siehe <a href='/settings#bidding_round'>die Einstellungen</a> für die Frist).
        _it: Inviato per ricordare al socio che non ha ancora promesso un importo per il turno di impegno aperto (vedi <a href='/settings#bidding_round'>parametri</a> per le scadenze).
        _nl: Verzonden om de leden eraan te herinneren dat ze nog geen bedrag hebben toegezegd voor de open biedronde (zie <a href='/settings#bidding_round'>instellingen</a> voor de deadline).
      invoice_cancelled:
        _en: Sent when an open invoice is cancelled.
        _fr: Envoyé quand une facture encore ouverte est annulée.
        _de: Wird gesendet, wenn eine noch offene Rechnung storniert wird.
        _it: Inviato quando una fattura ancora aperta viene annullata.
        _nl: Verzonden wanneer een openstaande factuur wordt geannuleerd.
      invoice_created:
        _en: Sent when an invoice is automatically created or when the "Send" button of a manually created invoice is pressed.
        _fr: Envoyé lors de la création automatique d'une facture ou quand le bouton "Envoyer" d'une facture créée manuellement est pressé.
        _de: Wird gesendet, wenn eine Rechnung automatisch erstellt wird oder wenn die Schaltfläche "Senden" einer manuell erstellten Rechnung gedrückt wird.
        _it: Inviato durante la creazione automatica di una fattura o quando si preme il pulsante "Invia" di una fattura creata manualmente.
        _nl: Verzonden wanneer een factuur automatisch wordt aangemaakt of wanneer de "Verzenden" knop van een handmatig aangemaakte factuur wordt ingedrukt.
      invoice_overdue_notice:
        _en: Sent automatically when an invoice is still open 35 days after its creation or last reminder.</br><i>Disabled when payments are not processed automatically (EBICS).</i>
        _fr: Envoyé automatiquement quand une facture est toujours ouverte 35 jours après sa création ou son dernier rappel.</br><i>Désactivé quand les paiements ne sont pas traités automatiquement (EBICS).</i>
        _de: Wird automatisch gesendet, wenn eine Rechnung 35 Tage nach ihrer Erstellung oder letzten Mahnung noch offen ist.</br><i>Deaktiviert, wenn die Zahlungen nicht automatisch verarbeitet werden (EBICS).</i>
        _it: Inviato automaticamente quando una fattura è ancora aperta 35 giorni dopo la sua creazione o il suo ultimo promemoria.</br><i>Disattivato quando i pagamenti non vengono elaborati automaticamente (EBICS).</i>
        _nl: Automatisch verzonden wanneer een factuur nog open staat 35 dagen na aanmaak of laatste herinnering.</br><i>Uitgeschakeld wanneer betalingen niet automatisch worden verwerkt (EBICS).</i>
      member_activated:
        _en: Sent when a member becomes active for the first time as soon as their first (current or future) membership is created.
        _fr: Envoyé quand un membre devient actif, pour la première fois, dès que son premier abonnement (en cours ou futur) est créé.
        _de: Wird gesendet, wenn ein Mitglied zum ersten Mal aktiv wird, sobald sein erstes (aktuelles oder zukünftiges) Abonnement erstellt wird.
        _it: Inviato quando un socio diventa attivo, per la prima volta, non appena viene creato il suo primo abbonamento (attuale o futuro).
        _nl: Verzonden wanneer een lid voor de eerste keer actief wordt zodra hun eerste (huidige of toekomstige) lidmaatschap wordt aangemaakt.
      member_validated:
        _en: Sent when the registration of a new member is validated.
        _fr: Envoyé quand l'inscription d'un nouveau membre est validée.
        _de: Wird gesendet, wenn die Registrierung eines neuen Mitglieds validiert wurde.
        _it: Inviato quando la registrazione di un nuovo socio viene convalidata.
        _nl: Verzonden wanneer de registratie van een nieuw lid wordt gevalideerd.
      membership_renewal:
        _en: Sent to ask the member via the form on their member page whether they wish to renew their membership or not.
        _fr: Envoyé afin de demander au membre si il désire ou non renouveler son abonnement via le formulaire sur sa page de membre.
        _de: Wird gesendet, um das Mitglied über das Formular auf seiner Mitgliederseite zu fragen, ob es sein Abonnement erneuern möchte oder nicht.
        _it: Inviato per chiedere al socio se desidera o meno rinnovare il suo abbonamento tramite il modulo nella sua pagina socio.
        _nl: Verzonden om het lid via het formulier op hun ledenpagina te vragen of ze hun lidmaatschap willen vernieuwen of niet.
      membership_renewal_reminder:
        _en: Sent to remind the member that they have not yet completed the membership renewal form (see <a href='/settings#membership_renewal'>settings</a> for the deadline).
        _fr: Envoyé afin de rappeler au membre qu'il n'a pas encore rempli le formulaire de renouvellement de son abonnement (voir <a href='/settings#membership_renewal'>les paramètres</a> pour le délai).
        _de: Gesendet, um das Mitglied daran zu erinnern, dass es das Abonnementserneuerungsformular noch nicht ausgefüllt hat (siehe <a href='/settings#membership_renewal'>die Einstellungen</a> für die Frist).
        _it: Inviato per ricordare al socio che non ha ancora completato il modulo di rinnovo dell'abbonamento (vedi <a href='/settings#membership_renewal'>parametri</a> per le scadenze).
        _nl: Verzonden om het lid eraan te herinneren dat ze het formulier voor lidmaatschapsvernieuwing nog niet hebben ingevuld (zie <a href='/settings#membership_renewal'>instellingen</a> voor de deadline).
