      basket_last/bag:
        _en: Sent on the delivery day of the last bag of each membership, only if the membership is renewed.
        _fr: Envoyé le jour de la livraison du dernier sac de chaque abonnement, uniquement si l'abonnement est renouvelé.
        _de: Wird gesendet am Tag der Auslieferung der letzten Tasche jedes Abonnements, nur wenn das Abonnement verlängert wird.
        _it: Inviato il giorno della consegna dell'ultima borsa di ogni abbonamento, solo se l'abbonamento viene rinnovato.
        _nl: Verzonden op de leveringsdag van de laatste tas van elk lidmaatschap, alleen als het lidmaatschap wordt vernieuwd.
      basket_last/basket:
        _en: Sent on the delivery day of the last basket of each membership, only if the membership is renewed.
        _fr: Envoyé le jour de la livraison du dernier panier de chaque abonnement, uniquement si l'abonnement est renouvelé.
