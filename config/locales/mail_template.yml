    description:
      absence_baskets_shifted/bag:
        _en: Sent when one or more bags are shifted during an absence, by a member or an admin.
        _fr: Envoyé quand un ou plusieurs sacs sont déplacés durant une absence, par un membre ou un admin.
        _de: Wird gesendet, wenn eine oder mehrere Taschen während einer Abwesenheit von einem Mitglied oder einem Admin verschoben werden.
        _it: Inviato quando una o più borse vengono spostate durante un'assenza, da un socio o da un admin.
        _nl: Verzonden wanneer een of meer tassen worden verschoven tijdens een afwezigheid, door een lid of een beheerder.
      absence_baskets_shifted/basket:
        _en: Sent when one or more baskets are shifted during an absence, by a member or an admin.
        _fr: Envoyé quand un ou plusieurs paniers sont déplacés durant une absence, par un membre ou un admin.
        _de: Wird gesendet, wenn eine oder mehrere Körbe während einer Abwesenheit von einem Mitglied oder einem Admin verschoben werden.
        _it: Inviato quando una o più ceste vengono spostate durante un'assenza, da un socio o da un admin.
        _nl: Verzonden wanneer een of meer manden worden verschoven tijdens een afwezigheid, door een lid of een beheerder.
      absence_baskets_shifted/cone:
        _en: Sent when one or more cones are shifted during an absence, by a member or an admin.
        _fr: Envoyé quand un ou plusieurs cornets sont déplacés durant une absence, par un membre ou un admin.
        _de: Wird gesendet, wenn eine oder mehrere Tüten während einer Abwesenheit von einem Mitglied oder einem Admin verschoben werden.
        _it: Inviato quando uno o più coni vengono spostati durante un'assenza, da un socio o da un admin.
        _nl: Verzonden wanneer een of meer zakken worden verschoven tijdens een afwezigheid, door een lid of een beheerder.
      absence_baskets_shifted/package:
        _en: Sent when one or more packages are shifted during an absence, by a member or an admin.
        _fr: Envoyé quand un ou plusieurs colis sont déplacés durant une absence, par un membre ou un admin.
        _de: Wird gesendet, wenn eine oder mehrere Pakete während einer Abwesenheit von einem Mitglied oder einem Admin verschoben werden.
        _it: Inviato quando uno o più pacchi vengono spostati durante un'assenza, da un socio o da un admin.
        _nl: Verzonden wanneer een of meer pakketten worden verschoven tijdens een afwezigheid, door een lid of een beheerder.
      absence_baskets_shifted/share:
        _en: Sent when one or more shares are shifted during an absence, by a member or an admin.
        _fr: Envoyé quand une ou plusieurs parts sont déplacées durant une absence, par un membre ou un admin.
        _de: Wird gesendet, wenn eine oder mehrere Anteile während einer Abwesenheit von einem Mitglied oder einem Admin verschoben werden.
        _it: Inviato quando uno o più parti vengono spostati durante un'assenza, da un socio o da un admin.
        _nl: Verzonden wanneer een of meer delen worden verschoven tijdens een afwezigheid, door een lid of een beheerder.
      absence_created:
        _en: Sent when an absence is created, by a member or an admin.
        _fr: Envoyé quand une absence est créée, par un membre ou un admin.
        _de: Wird gesendet, wenn eine Abwesenheit erstellt wird, von einem Mitglied oder einem Admin.
        _it: Inviato quando una assenza è creata, da un socio o da un admin.
        _nl: Verzonden wanneer een afwezigheid wordt aangemaakt, door een lid of een beheerder.
      absence_included_reminder:
        _en: Sent automatically when the reminder date for unused included absences is reached (see <a href='/settings#absence'>settings</a> for configuration).
        _fr: Envoyé automatiquement lorsque la date de rappel pour les absences incluses non utilisées est atteinte (voir <a href='/settings#absence'>les paramètres</a> pour la configuration).
        _de: Wird automatisch gesendet, wenn das Erinnerungsdatum für ungenutzte inkludierte Abwesenheiten erreicht ist (siehe <a href='/settings#absence'>Einstellungen</a> für die Konfiguration).
        _it: Inviato automaticamente quando viene raggiunta la data di promemoria per le assenze incluse non utilizzate (vedi <a href='/settings#absence'>impostazioni</a> per la configurazione).
        _nl: Automatisch verzonden wanneer de herinneringsdatum voor ongebruikte inbegrepen afwezigheden is bereikt (zie <a href='/settings#absence'>instellingen</a> voor configuratie).
      activity_participation_rejected:
        _en: Sent when participation in an activity is rejected.
        _fr: Envoyé quand une participation à une activité est refusée.
        _de: Wird gesendet, wenn die Teilnahme an einer Aktivität abgelehnt wird.
        _it: Inviato quando la partecipazione a un'attività viene rifiutata.
        _nl: Verzonden wanneer deelname aan een activiteit wordt afgewezen.
      activity_participation_reminder:
        _en: Sent to remind the member of their registration for an activity 3 days before it.
        _fr: Envoyé pour rappeler au membre son inscription à une activité 3 jours avant celle-ci.
        _de: Wird gesendet, um das Mitglied 3 Tage vorher an seine Registrierung für eine Aktivität zu erinnern.
        _it: Inviato per ricordare al socio la sua partecipazione a un'attività 3 giorni prima dell'attività.
        _nl: Verzonden om het lid te herinneren aan zijn registratie voor een activiteit 3 dagen ervoor.
      activity_participation_validated:
        _en: Sent when participation in an activity is confirmed.
        _fr: Envoyé quand une participation à une activité est validée.
        _de: Wird gesendet, wenn die Teilnahme an einer Aktivität bestätigt wird.
        _it: Inviato quando viene convalidata una partecipazione a un'attività.
        _nl: Verzonden wanneer deelname aan een activiteit wordt bevestigd.
      basket_final/bag:
        _en: Sent on the delivery day of the member's very last bag, in case the membership is canceled.
        _fr: Envoyé le jour de la livraison du tout dernier sac du membre, dans le cas où l'abonnement est résilié.
        _de: Wird gesendet am Tag der Auslieferung der allerletzten Tasche des Mitglieds, falls das Abonnement gekündigt wird.
        _it: Inviato il giorno della consegna dell'ultima borsa del socio, nel caso in cui l'abbonamento viene terminato.
        _nl: Verzonden op de leveringsdag van de allerlaatste tas van het lid, indien het lidmaatschap wordt opgezegd.
      basket_final/basket:
        _en: Sent on the delivery day of the member's very last basket, in case the membership is canceled.
        _fr: Envoyé le jour de la livraison du tout dernier panier du membre, dans le cas où l'abonnement est résilié.
        _de: Wird gesendet am Tag der Auslieferung des allerletzten Korbs des Mitglieds, falls das Abonnement gekündigt wird.
        _it: Inviato il giorno della consegna dell'ultima cesta del socio, nel caso in cui l'abbonamento viene terminato.
        _nl: Verzonden op de leveringsdag van de allerlaatste mand van het lid, indien het lidmaatschap wordt opgezegd.
      basket_final/cone:
        _en: Sent on the delivery day of the member's very last cone, in case the membership is canceled.
        _fr: Envoyé le jour de la livraison du tout dernier cornet du membre, dans le cas où l'abonnement est résilié.
        _de: Wird gesendet am Tag der Auslieferung der allerletzten Tüte des Mitglieds, falls das Abonnement gekündigt wird.
        _it: Inviato il giorno della consegna dell'ultimo cono del socio, nel caso in cui l'abbonamento viene terminato.
        _nl: Verzonden op de leveringsdag van de allerlaatste zak van het lid, indien het lidmaatschap wordt opgezegd.
      basket_final/package:
        _en: Sent on the delivery day of the member's very last package, in case the membership is canceled.
        _fr: Envoyé le jour de la livraison du tout dernier colis du membre, dans le cas où l'abonnement est résilié.
        _de: Wird gesendet am Tag der Auslieferung des allerletzten Pakets des Mitglieds, falls das Abonnement gekündigt wird.
        _it: Inviato il giorno della consegna dell'ultimo pacco del socio, nel caso in cui l'abbonamento viene terminato.
        _nl: Verzonden op de leveringsdag van het allerlaatste pakket van het lid, indien het lidmaatschap wordt opgezegd.
      basket_final/share:
        _en: Sent on the delivery day of the member's very last share, in case the membership is canceled.
        _fr: Envoyé le jour de la livraison de la toute dernière part du membre, dans le cas où l'abonnement est résilié.
        _de: Wird gesendet am Tag der Auslieferung des allerletzten Anteils des Mitglieds, falls das Abonnement gekündigt wird.
        _it: Inviato il giorno della consegna dell'ultima parte del socio, nel caso in cui l'abbonamento viene terminato.
        _nl: Verzonden op de leveringsdag van het allerlaatste deel van het lid, indien het lidmaatschap wordt opgezegd.
      basket_first/bag:
        _en: Sent on the delivery day of the first bag of each membership, each fiscal year.
        _fr: Envoyé le jour de la livraison du premier sac de chaque abonnement, chaque année fiscale.
        _de: Wird gesendet am Tag der Auslieferung der ersten Tasche jedes Abonnements, jedes Geschäftsjahr.
        _it: Inviato il giorno della consegna della prima borsa di ogni abbonamento, ogni anno fiscale.
        _nl: Verzonden op de leveringsdag van de eerste tas van elk lidmaatschap, elk boekjaar.
      basket_first/basket:
        _en: Sent on the delivery day of the first basket of each membership, each fiscal year.
        _fr: Envoyé le jour de la livraison du premier panier de chaque abonnement, chaque année fiscale.
        _de: Wird gesendet am Tag der Auslieferung des ersten Korbs jedes Abonnements, jedes Geschäftsjahr.
        _it: Inviato il giorno della consegna della prima cesta di ogni abbonamento, ogni anno fiscale.
        _nl: Verzonden op de leveringsdag van de eerste mand van elk lidmaatschap, elk boekjaar.
      basket_first/cone:
        _en: Sent on the delivery day of the first cone of each membership, each fiscal year.
        _fr: Envoyé le jour de la livraison du premier cornet de chaque abonnement, chaque année fiscale.
        _de: Wird gesendet am Tag der Auslieferung der ersten Tüte jedes Abonnements, jedes Geschäftsjahr.
        _it: Inviato il giorno della consegna del primo cono di ogni abbonamento, ogni anno fiscale.
        _nl: Verzonden op de leveringsdag van de eerste zak van elk lidmaatschap, elk boekjaar.
      basket_first/package:
        _en: Sent on the delivery day of the first package of each membership, each fiscal year.
        _fr: Envoyé le jour de la livraison du premier colis de chaque abonnement, chaque année fiscale.
        _de: Wird gesendet am Tag der Auslieferung des ersten Pakets jedes Abonnements, jedes Geschäftsjahr.
        _it: Inviato il giorno della consegna del primo pacco di ogni abbonamento, ogni anno fiscale.
        _nl: Verzonden op de leveringsdag van het eerste pakket van elk lidmaatschap, elk boekjaar.
      basket_first/share:
