_:
  admin_mailer:
    delivery_list_email:
      attachments_paragraph:
        _en: Attached are the summary file (XLSX) and the sheets (PDF) for the delivery on {{ delivery.date }}.
        _fr: Voici, en pièces jointes, le fichier récapitulatif (XLSX) et les fiches (PDF) pour la livraison du {{ delivery.date }}.
        _de: Hier sind als Anhänge die Zusammenfassung (XLSX) und die Blätter (PDF) für die Lieferung am {{ delivery.date }}.
        _it: In allegato il file di riepilogo (XLSX) e i fogli (PDF) per la consegna {{ delivery.date }}.
        _nl: Bijgevoegd zijn het samenvattingsbestand (XLSX) en de lijsten (PDF) voor de levering op {{ delivery.date }}.
      delivery_page_button:
        _en: Access the delivery page
        _fr: Accéder à la page de la livraison
        _de: Zur Lieferungsseite gehen
        _it: Accedere alla pagina di consegna
        _nl: Toegang tot de leveringspagina
      greeting:
        _en: Hello {{ admin.name }},
        _fr: Salut {{ admin.name }},
        _de: Hallo {{ admin.name }},
        _it: Ciao {{ admin.name }},
        _nl: Hallo {{ admin.name }},
      subject:
        _en: Delivery list of %{date}
        _fr: Liste livraison du %{date}
        _de: Lieferungsliste vom %{date}
        _it: Lista di consegna del %{date}
        _nl: Leveringslijst van %{date}
    demo_follow_up_email:
      exploration_paragraph:
        _en: How's the exploration of the CSA Admin demo going? I hope the program looks useful to you! I'd love to hear your first impressions.
        _fr: Comment est-ce que se passe l'exploration de la démo de CSA Admin? J'espère que le programme vous semble utile! J'aimerais beaucoup connaître vos premières impressions.
        _de: Wie läuft die Erkundung der CSA Admin Demo? Ich hoffe, das Programm scheint nützlich! Ich würde gerne die ersten Eindrücke erfahren.
        _it: Come va l'esplorazione della demo di CSA Admin? Spero che il programma vi sembri utile! Mi piacerebbe molto conoscere le vostre prime impressioni.
        _nl: Hoe gaat het met het verkennen van de CSA Admin demo? Ik hoop dat het programma nuttig lijkt! Ik zou graag de eerste indrukken horen.
      greeting:
        _en: Hello {{ admin.name }},
        _fr: Salut {{ admin.name }},
        _de: Hallo {{ admin.name }},
        _it: Ciao {{ admin.name }},
        _nl: Hallo {{ admin.name }},
      questions_paragraph:
        _en: If you have any questions, would like a guided tour, or want to discuss how CSA Admin could work for your CSA, just reply to this email.
        _fr: Si vous avez des questions, aimeriez une visite guidée ou souhaitez discuter de comment CSA Admin pourrait fonctionner pour votre ACP, répondez simplement à cet e-mail.
        _de: Bei Fragen, für eine geführte Tour oder um zu besprechen, wie CSA Admin für die Solawi funktionieren könnte, einfach auf diese E-Mail antworten.
        _it: Se avete domande, desiderate una visita guidata o volete discutere di come CSA Admin potrebbe funzionare per la vostra ACP, rispondete semplicemente a questa e-mail.
        _nl: Bij vragen, voor een rondleiding of om te bespreken hoe CSA Admin voor de CSA zou kunnen werken, gewoon deze e-mail beantwoorden.
      setup_button:
        _en: Setup
        _fr: Mise en place
        _de: Einrichtung
        _it: Configurazione
        _nl: Configuratie
      setup_paragraph:
        _en: 'If you''re already ready to get started, the <a href="{{ setup_handbook_url }}">Setup</a> handbook page explains the few simple steps needed:'
        _fr: 'Si vous êtes déjà prêt·e à vous lancer, la page <a href="{{ setup_handbook_url }}">Mise en place</a> du manuel explique les quelques étapes nécessaires:'
        _de: 'Wer bereits bereit ist loszulegen, findet auf der Handbuchseite <a href="{{ setup_handbook_url }}">Einrichtung</a> die wenigen nötigen Schritte:'
        _it: 'Se siete già pronti a partire, la pagina <a href="{{ setup_handbook_url }}">Configurazione</a> del manuale spiega i pochi passaggi necessari:'
        _nl: 'Om meteen te beginnen, legt de handleidingpagina <a href="{{ setup_handbook_url }}">Configuratie</a> de paar benodigde stappen uit:'
      subject:
        _en: How's it going with the demo?
        _fr: Comment ça se passe avec la démo?
        _de: Wie läuft es mit der Demo?
        _it: Come va con la demo?
        _nl: Hoe gaat het met de demo?
    depot_delivery_list_email:
      members_list_paragraph:
        _en: 'Here is the list of members:'
        _fr: 'Voici la liste des membres:'
        _de: 'Nachfolgend die Mitgliederliste:'
        _it: 'Ecco la lista dei soci:'
        _nl: 'Hier is de lijst van leden:'
      see_attachments_paragraph:
        _en: See the attachments for more details, thank you.
        _fr: Voir les pièces jointes pour plus de détails, merci.
        _de: Siehe Anhänge für mehr Details, vielen Dank.
        _it: Consultare gli allegati per maggiori dettagli, grazie.
        _nl: Zie de bijlagen voor meer details, bedankt.
      subject:
        _en: Delivery list of %{date} (%{depot})
        _fr: Liste livraison du %{date} (%{depot})
        _de: Lieferungsliste vom %{date} (%{depot})
        _it: Lista di consegna del %{date} (%{depot})
        _nl: Leveringslijst van %{date} (%{depot})
    invitation_email:
      admin_account_paragraph:
        _en: An admin account for {{ organization.name }} has been created for you, please use your email (<strong>{{ admin.email }}</strong>) to log in.
        _fr: Un compte admin pour {{ organization.name }} vient de vous être créé, merci d'utiliser votre e-mail (<strong>{{ admin.email }}</strong>) pour vous connecter.
        _de: Ein Admin-Konto für {{ organization.name }} wurde gerade erstellt. Bitte mit der E-Mail-Adresse (<strong>{{ admin.email }}</strong>) anmelden.
        _it: Un conto admin per {{ organization.name }} è appena stato creato, per connetterti accedi con la tua e-mail (<strong>{{ admin.email }}</strong>).
        _nl: Er is een admin-account voor {{ organization.name }} aangemaakt. Gebruik het e-mailadres (<strong>{{ admin.email }}</strong>) om in te loggen.
      admin_button:
        _en: Access the admin of {{ organization.name }}
        _fr: Accéder à l'admin de {{ organization.name }}
        _de: Zum Admin von {{ organization.name }} gehen
        _it: Accedere all'admin di {{ organization.name }}
        _nl: Toegang tot de admin van {{ organization.name }}
      demo_button:
        _en: Access the demo
        _fr: Accéder à la démo
        _de: Zur Demo
        _it: Accedi alla demo
        _nl: Naar de demo
      demo_explore_paragraph:
        _en: Your account is ready. Feel free to click around, create members, play with the settings, ... everything resets weekly, so you can't break anything.
        _fr: Votre compte est prêt. N'hésitez pas à cliquer partout, créer des membres, jouez avec les réglages, ... tout est réinitialisé chaque semaine, donc impossible de casser quoi que ce soit.
        _de: Das Konto ist bereit. Einfach durchklicken, Mitglieder erstellen, die Einstellungen ausprobieren, ... alles wird wöchentlich zurückgesetzt, es kann also nichts kaputt gehen.
        _it: Il vostro account è pronto. Cliccate ovunque, create soci, provate le impostazioni, ... tutto viene reimpostato ogni settimana, quindi non potete rompere nulla.
        _nl: Het account is klaar. Gerust rondklikken, leden aanmaken, de instellingen uitproberen, ... alles wordt wekelijks gereset, dus er kan niets kapot gaan.
      demo_questions_paragraph:
        _en: If you have any questions or would like a personal walkthrough, just reply to this email, I'm always happy to help.
        _fr: Si vous avez des questions ou souhaitez une présentation personnalisée, répondez simplement à cet e-mail, je suis là pour vous aider.
        _de: Bei Fragen oder für eine persönliche Führung einfach auf diese E-Mail antworten, ich helfe immer gerne.
        _it: Se avete domande o desiderate una presentazione personalizzata, rispondete semplicemente a questa e-mail, sono sempre felice di aiutarvi.
        _nl: Bij vragen of voor een persoonlijke rondleiding gewoon deze e-mail beantwoorden, ik help altijd graag.
      demo_welcome_paragraph:
        _en: I'm Thibaud, the developer of CSA Admin. Welcome to the demo!
        _fr: Je suis Thibaud, le développeur de CSA Admin. Bienvenue sur la démo!
        _de: Ich bin Thibaud, der Entwickler von CSA Admin. Willkommen zur Demo!
        _it: Sono Thibaud, lo sviluppatore di CSA Admin. Benvenuto nella demo!
        _nl: Ik ben Thibaud, de ontwikkelaar van CSA Admin. Welkom bij de demo!
      greeting:
        _en: Hello {{ admin.name }},
        _fr: Salut {{ admin.name }},
        _de: Hallo {{ admin.name }},
        _it: Ciao {{ admin.name }},
        _nl: Hallo {{ admin.name }},
      subject:
        _en: Invitation to the %{org} admin
        _fr: Invitation à l'admin de %{org}
        _de: Einladung an den %{org} Admin
        _it: Invito all'admin di %{org}
        _nl: Uitnodiging voor de admin van %{org}
      subject_demo:
        _en: Invitation to the CSA Admin demo
        _fr: Invitation à la démo de CSA Admin
        _de: Einladung zu der CSA Admin Demo
        _it: Invito a la demo di CSA Admin
        _nl: Uitnodiging voor de CSA Admin demo
