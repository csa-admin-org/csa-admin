_:
  sessions:
    flash:
      created:
        _en: You are now logged in.
        _fr: Vous êtes maintenant connecté.
        _de: Anmeldung erfolgreich.
        _it: Ora siete connessi.
        _nl: Nu ingelogd.
      deleted:
        _en: You are now logged out.
        _fr: Vous êtes maintenant déconnecté.
        _de: Abmeldung erfolgreich.
        _it: Ora siete disconnessi.
        _nl: Nu uitgelogd.
      expired:
        _en: Your session has expired, please log in again.
        _fr: Votre session a expirée, merci de vous authentifier à nouveau.
        _de: Die Sitzung ist abgelaufen, bitte erneut anmelden.
        _it: La vostra sessione è scaduta, per favore autenticatevi di nuovo.
        _nl: De sessie is verlopen, gelieve opnieuw in te loggen.
      initiated:
        _en: Check your email! A login link has been sent to you.
        _fr: Vérifiez vos emails! Un lien de connexion vous a été envoyé.
        _de: Bitte die E-Mails überprüfen! Ein Anmeldelink wurde zugesandt.
        _it: Controllate la vostra e-mail! Vi è stato inviato un link di accesso.
        _nl: Controleer de e-mail! Er is een inloglink verzonden.
      invalid:
        _en: Your login link is no longer valid. Please request a new one.
        _fr: Votre lien de connexion n'est plus valide, merci d'en demander un nouveau.
        _de: Der Anmeldelink ist nicht mehr gültig. Bitte einen neuen anfordern.
        _it: Il vostro link di connessione non è più valido, richiedetene uno nuovo.
        _nl: De inloglink is niet meer geldig. Gelieve een nieuwe aan te vragen.
      required:
        _en: Please log in to access your account.
        _fr: Merci de vous authentifier pour accéder à votre compte.
        _de: Bitte anmelden, um zum Konto zu gelangen.
        _it: Autenticatevi per accedere al vostro account.
        _nl: Gelieve in te loggen om toegang te krijgen tot het account.
    new:
      email_input:
        _en: Email
        _fr: Email
        _de: E-Mail
        _it: E-mail
        _nl: E-mail
      form_text:
        _en: Access to your admin account is password-free via a login link. This link will be sent to you via email using the form below.
        _fr: La connexion à votre compte admin ne nécessite pas de mot de passe, et s'effectue en recevant un lien de connexion par email à l'aide du formulaire ci-dessous.
        _de: Der Zugang zum Admin-Konto erfolgt ohne Passwort über einen Anmeldelink. Dieser Link wird über das untenstehende Formular per E-Mail zugestellt.
        _it: La connessione al vostro account amministratore non richiede una password e viene eseguita ricevendo un link di connessione tramite e-mail utilizzando il modulo sottostante.
        _nl: Toegang tot het admin-account is wachtwoordvrij via een inloglink. Deze link wordt per e-mail toegestuurd via onderstaand formulier.
      no_account_html:
        _en: No account yet? <a href="%{register_url}">Register for the demo</a>
        _fr: Pas encore de compte? <a href="%{register_url}">S'inscrire à la démo</a>
        _de: Noch kein Konto? <a href="%{register_url}">Für die Demo registrieren</a>
        _it: Non avete ancora un account? <a href="%{register_url}">Registratevi per la demo</a>
        _nl: Nog geen account? <a href="%{register_url}">Registreer voor de demo</a>
      submit:
        _en: Submit
        _fr: Envoyer
        _de: Senden
        _it: Inviare
        _nl: Verzenden
      title:
        _en: Admin Login
        _fr: Connexion Admin
        _de: Admin-Anmeldung
        _it: Connessione Admin
        _nl: Admin Login
